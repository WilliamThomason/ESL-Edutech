<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Friends — Topic Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0f2f1;
            --primary: #2e7d32;
            --accent: #ff8f00;
            --text: #1b5e20;
            --font-display: 'Fredoka One', cursive;
            --font-main: 'Quicksand', sans-serif;
        }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .forest-header { text-align: center; font-size: 40px; font-family: var(--font-display); color: var(--primary); margin-bottom: 40px; }
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .topic-card { background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--primary); text-align: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 6px 0 #2e7d32; }
        .topic-card:hover { transform: scale(1.05); background: #f0fdf4; }
        .topic-title { font-family: var(--font-display); font-size: 18px; margin-bottom: 10px; }
        .topic-count { font-size: 12px; color: var(--text-muted); background: #e0f2f1; padding: 4px 8px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 class="forest-header">🌳 Choose Your Forest Adventure!</h1>
    <div class="topic-grid" id="topic-grid"></div>

    <script>
        const topics = [
            "Animals", "Colors", "Numbers", "Family", "Food", "School", "Home", "Clothes", 
            "Weather", "Body", "Sports", "Music", "Nature", "Transport", "Hobbies", "States", 
            "Jobs", "Time", "Feelings", "Holidays", "Space", "Ocean", "Garden", "My Day"
        ];
        
        const grid = document.getElementById('topic-grid');
        topics.forEach(t => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `<div class="topic-title">${t}</div><div class="topic-count">20 Questions</div>`;
            card.onclick = () => window.location.href = 'forest-friends.html?topic=' + encodeURIComponent(t);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
