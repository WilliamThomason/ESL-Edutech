<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Friends — English Adventure</title>
    <style>
        :root {
            --bg: #f0fdf4;
            --primary: #15803d;
            --accent: #f59e0b;
            --text: #064e3b;
        }
        body { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        .forest-header { background: var(--primary); color: white; width: 100%; padding: 20px; text-align: center; font-size: 24px; border-bottom: 5px solid #166534; }
        
        #game-area { width: 90%; max-width: 800px; margin-top: 30px; background: white; padding: 40px; border-radius: 30px; border: 4px solid #15803d; box-shadow: 0 10px 0 #166534; }
        
        .character { width: 150px; height: 150px; background: #e2e8f0; border-radius: 50%; margin: 0 auto; display: flex; justify-content: center; align-items: center; border: 4px solid #333; }
        
        .word-activity { font-size: 32px; font-weight: bold; text-align: center; margin: 30px 0; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn { padding: 20px; font-size: 20px; border-radius: 15px; border: none; background: #dcfce7; cursor: pointer; transition: transform 0.2s; }
        .option-btn:hover { transform: scale(1.05); background: #bbf7d0; }
        .correct { background: #86efac !important; border: 4px solid #15803d; }
        .wrong { background: #fca5a5 !important; border: 4px solid #991b1b; }
    </style>
</head>
<body>

    <div class="forest-header">🌳 Forest Friends: English Adventure</div>

    <div id="game-area">
        <div class="character" id="char">🧑‍🤝‍🧑</div>
        <div class="word-activity" id="activity">Loading...</div>
        <div class="options" id="options"></div>
    </div>

    <script>
        const activities = [
            { question: "What is this animal?", word: "Rabbit", options: ["Rabbit", "Lion", "Bear", "Dog"] },
            { question: "Where do birds live?", word: "Tree", options: ["Tree", "River", "Cave", "House"] },
            // ... add more to reach 10
        ];
        
        let currentIdx = 0;
        
        function loadActivity() {
            const a = activities[currentIdx];
            document.getElementById('activity').innerText = a.question;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            a.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, a.word, btn);
                optDiv.appendChild(btn);
            });
        }
        
        function checkAnswer(selected, correct, btn) {
            if (selected === correct) {
                btn.classList.add('correct');
                setTimeout(() => { currentIdx++; loadActivity(); }, 1000);
            } else {
                btn.classList.add('wrong');
            }
        }
        
        loadActivity();
    </script>
</body>
</html>
