<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Signal Flow Tester</title>
<style>
body{font-family:monospace;background:#0a0e1a;color:#e0f2fe;padding:20px;max-width:800px;margin:0 auto}
h1{color:#22d3ee;text-shadow:0 0 10px #22d3ee}
h2{color:#a78bfa;margin-top:30px}
.test{background:#111827;border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin:8px 0;display:flex;align-items:center;gap:10px}
.pass{border-left:4px solid #34d399}
.fail{border-left:4px solid #fb7185}
.warn{border-left:4px solid #fbbf24}
.icon{font-size:1.5rem}
.msg{flex:1}
.detail{font-size:.75rem;color:#94a3b8;margin-top:4px}
button{background:#1e3a5f;border:1px solid #22d3ee;color:#22d3ee;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:1rem;margin:5px}
button:hover{background:#22d3ee;color:#0a0e1a}
#log{margin-top:20px;background:#0a0e1a;border:1px solid #1e3a5f;border-radius:8px;padding:12px;max-height:400px;overflow-y:auto;font-size:.8rem}
.log-line{padding:2px 0;border-bottom:1px solid #111827}
.log-pass{color:#34d399}
.log-fail{color:#fb7185}
.log-warn{color:#fbbf24}
.log-info{color:#94a3b8}
</style>
</head>
<body>

<h1>🔊 Audio Signal Flow Tester</h1>
<p>Tests the Alien Metronome audio engine for correct signal routing.</p>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin:20px 0">
  <button onclick="runAllTests()">▶ Run All Tests</button>
  <button onclick="testStartPlayback()">▶ Test Start Playback</button>
  <button onclick="testEffectChain()">▶ Test Effect Chain Live</button>
  <button onclick="clearLog()">Clear Log</button>
</div>

<div id="results"></div>
<div id="log"></div>

<script>
var logEl = document.getElementById('log');
var resultsEl = document.getElementById('results');

function log(msg, type) {
  var line = document.createElement('div');
  line.className = 'log-line log-' + (type || 'info');
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() { logEl.innerHTML = ''; resultsEl.innerHTML = ''; }

function addResult(name, pass, detail) {
  var d = document.createElement('div');
  d.className = 'test ' + (pass ? 'pass' : 'fail');
  d.innerHTML = '<span class="icon">' + (pass ? '✅' : '❌') + '</span><div class="msg"><strong>' + name + '</strong><div class="detail">' + (detail || '') + '</div></div>';
  resultsEl.appendChild(d);
}

function addWarn(name, detail) {
  var d = document.createElement('div');
  d.className = 'test warn';
  d.innerHTML = '<span class="icon">⚠️</span><div class="msg"><strong>' + name + '</strong><div class="detail">' + (detail || '') + '</div></div>';
  resultsEl.appendChild(d);
}

// ═══ TEST 1: AudioContext creation ═══
function testAudioContext() {
  log('Test: AudioContext creation', 'info');
  var AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) { addResult('AudioContext support', false, 'No AudioContext or webkitAudioContext'); return false; }
  var ctx = null;
  try { ctx = new AC(); } catch(e) { addResult('AudioContext creation', false, e.message); return false; }
  addResult('AudioContext creation', true, 'sampleRate=' + ctx.sampleRate + ' state=' + ctx.state);
  ctx.close();
  return true;
}

// ═══ TEST 2: Gain node basics ═══
function testGainNode() {
  log('Test: Gain node basics', 'info');
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var g = ctx.createGain();
  if (!g) { addResult('GainNode creation', false, 'createGain returned null'); ctx.close(); return false; }
  g.gain.value = 0.5;
  addResult('GainNode creation', true, 'gain.value=' + g.gain.value);
  
  // Test connect
  var g2 = ctx.createGain();
  try { g.connect(g2); addResult('GainNode connect', true, 'g -> g2 connected'); }
  catch(e) { addResult('GainNode connect', false, e.message); }
  
  // Test disconnect
  try { g.disconnect(); addResult('GainNode disconnect', true, 'disconnected'); }
  catch(e) { addResult('GainNode disconnect', false, e.message); }
  
  ctx.close();
  return true;
}

// ═══ TEST 3: Delay node basics ═══
function testDelayNode() {
  log('Test: Delay node basics', 'info');
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var d = ctx.createDelay(5.0);
  if (!d) { addResult('DelayNode creation', false, 'createDelay returned null'); ctx.close(); return false; }
  
  // Test NaN handling
  d.delayTime.value = NaN;
  addResult('DelayNode NaN handling', d.delayTime.value !== d.delayTime.value, 'delayTime=NaN, isNaN=' + (d.delayTime.value !== d.delayTime.value) + ' (browser may clamp to 0)');
  
  // Test normal value
  d.delayTime.value = 0.25;
  addResult('DelayNode normal value', d.delayTime.value === 0.25, 'delayTime=' + d.delayTime.value);
  
  // Test feedback loop
  var g = ctx.createGain();
  g.gain.value = 0.5;
  try {
    d.connect(g);
    g.connect(d);
    addResult('DelayNode feedback loop', true, 'delay -> gain -> delay connected');
  } catch(e) {
    addResult('DelayNode feedback loop', false, e.message);
  }
  
  ctx.close();
  return true;
}

// ═══ TEST 4: Convolver node basics ═══
function testConvolverNode() {
  log('Test: Convolver node basics', 'info');
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var conv = ctx.createConvolver();
  if (!conv) { addResult('ConvolverNode creation', false, 'createConvolver returned null'); ctx.close(); return false; }
  
  // Create impulse
  var rate = ctx.sampleRate;
  var length = rate * 0.5;
  var impulse = ctx.createBuffer(2, length, rate);
  for (var ch = 0; ch < 2; ch++) {
    var data = impulse.getChannelData(ch);
    for (var i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
    }
  }
  conv.buffer = impulse;
  addResult('ConvolverNode impulse', true, '2ch ' + length + ' samples');
  
  ctx.close();
  return true;
}

// ═══ TEST 5: Oscillator → Gain → Destination chain ═══
function testBasicChain() {
  log('Test: Basic oscillator chain', 'info');
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 440;
  gain.gain.value = 0.01; // very quiet
  
  try {
    osc.start();
    addResult('Oscillator chain', true, 'osc -> gain -> destination, started');
    osc.stop(ctx.currentTime + 0.05);
  } catch(e) {
    addResult('Oscillator chain', false, e.message);
  }
  
  ctx.close();
  return true;
}

// ═══ TEST 6: Parallel send/return architecture ═══
function testParallelSendReturn() {
  log('Test: Parallel send/return architecture', 'info');
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  
  var master = ctx.createGain();
  master.gain.value = 1;
  
  // Dry
  var dry = ctx.createGain();
  dry.gain.value = 0.5;
  master.connect(dry);
  dry.connect(ctx.destination);
  
  // Send 1: delay
  var send1 = ctx.createGain();
  send1.gain.value = 0.5;
  master.connect(send1);
  var delay = ctx.createDelay(5.0);
  delay.delayTime.value = 0.1;
  var fb = ctx.createGain();
  fb.gain.value = 0.4;
  var ret1 = ctx.createGain();
  ret1.gain.value = 1;
  send1.connect(delay);
  delay.connect(fb);
  fb.connect(delay);
  delay.connect(ret1);
  ret1.connect(ctx.destination);
  
  // Send 2: convolver
  var send2 = ctx.createGain();
  send2.gain.value = 0.3;
  master.connect(send2);
  var conv = ctx.createConvolver();
  var imp = ctx.createBuffer(2, ctx.sampleRate * 0.3, ctx.sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var d = imp.getChannelData(ch);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2);
  }
  conv.buffer = imp;
  var ret2 = ctx.createGain();
  ret2.gain.value = 1;
  send2.connect(conv);
  conv.connect(ret2);
  ret2.connect(ctx.destination);
  
  // Test: create oscillator and verify it produces output
  var osc = ctx.createOscillator();
  var oscGain = ctx.createGain();
  oscGain.gain.value = 0.01;
  osc.connect(oscGain);
  oscGain.connect(master);
  osc.frequency.value = 880;
  
  try {
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
    addResult('Parallel send/return', true, 'dry(0.5) + delay(0.5,fb=0.4) + reverb(0.3) -> destination');
  } catch(e) {
    addResult('Parallel send/return', false, e.message);
  }
  
  ctx.close();
  return true;
}

// ═══ TEST 7: beatDuration calculation ═══
function testBeatDuration() {
  log('Test: beatDuration calculation', 'info');
  var bpm = 72;
  var beatDuration = 60.0 / bpm;
  var expected = 60.0 / 72; // 0.8333...
  
  addResult('beatDuration at 72 BPM', Math.abs(beatDuration - expected) < 0.001, beatDuration + 's (expected ' + expected.toFixed(4) + 's)');
  
  // Test what happens with undefined
  var undefinedBeat = undefined;
  var delayTime = undefinedBeat * 0.75;
  addResult('undefined beatDuration', isNaN(delayTime), 'undefined * 0.75 = ' + delayTime + ' (NaN breaks DelayNode)');
  
  // Test NaN in delay
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var d = ctx.createDelay(5.0);
  d.delayTime.value = NaN;
  var isNaNDelay = d.delayTime.value !== d.delayTime.value;
  addResult('DelayNode with NaN', true, 'delayTime.value = NaN, isNaN=' + isNaNDelay + ' — this SILENTLY BREAKS the delay effect');
  ctx.close();
  
  return true;
}

// ═══ TEST 8: Verify the actual metronome file's syncDelayToBPM ═══
function testMetronomeSyncDelay() {
  log('Test: Metronome syncDelayToBPM function', 'info');
  
  // Read the actual file and check for beatDuration declaration
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'index.html', false);
  try {
    xhr.send();
    var content = xhr.responseText;
    
    // Check if beatDuration is declared in syncDelayToBPM
    var funcMatch = content.match(/function\s+syncDelayToBPM\s*\(\s*\)\s*\{([\s\S]*?)\n\}/);
    if (!funcMatch) {
      addResult('syncDelayToBPM found', false, 'Could not find function in index.html');
      return false;
    }
    
    var funcBody = funcMatch[1];
    var hasBeatDuration = funcBody.indexOf('beatDuration') !== -1;
    addResult('beatDuration declared in syncDelayToBPM', hasBeatDuration, hasBeatDuration ? 'Found beatDuration variable' : 'MISSING — beatDuration is undefined, delayTime will be NaN');
    
    // Check for var keyword
    var hasVar = /\bvar\s+beatDuration/.test(funcBody);
    addResult('beatDuration has var keyword', hasVar, hasVar ? 'Properly scoped' : 'No var — implicit global');
    
  } catch(e) {
    addResult('File read', false, e.message);
  }
  
  return true;
}

// ═══ TEST 9: Live effect chain test on actual metronome ═══
function testEffectChain() {
  log('Test: Live effect chain verification', 'info');
  resultsEl.innerHTML = '';
  
  // Check if metronome globals are available
  if (typeof audioCtx === 'undefined' && typeof window.audioCtx === 'undefined') {
    addResult('Metronome loaded', false, 'Open this tester in the same page as the metronome, or load metronome first');
    return false;
  }
  
  var ctx = window.audioCtx;
  if (!ctx) { addResult('audioCtx exists', false, 'audioCtx is null/undefined'); return false; }
  addResult('audioCtx exists', true, 'state=' + ctx.state);
  
  // Check masterGain
  if (typeof masterGain === 'undefined' || !masterGain) {
    addResult('masterGain exists', false, 'Press Play first to initialize');
    return false;
  }
  addResult('masterGain exists', true, 'gain=' + masterGain.gain.value);
  
  // Check dryGain
  var hasDry = typeof dryGain !== 'undefined' && dryGain;
  addResult('dryGain exists', hasDry, hasDry ? 'gain=' + dryGain.gain.value : 'No effects active — chain is master->destination');
  
  // Check sends
  var hasDelaySend = typeof delaySend !== 'undefined' && delaySend;
  var hasReverbSend = typeof reverbSend !== 'undefined' && reverbSend;
  var hasRingSend = typeof ringSend !== 'undefined' && ringSend;
  
  addResult('delaySend exists', hasDelaySend, hasDelaySend ? 'gain=' + delaySend.gain.value : 'null');
  addResult('reverbSend exists', hasReverbSend, hasReverbSend ? 'gain=' + reverbSend.gain.value : 'null');
  addResult('ringSend exists', hasRingSend, hasRingSend ? 'gain=' + ringSend.gain.value : 'null');
  
  // Check delay node
  var hasDelayNode = typeof delayNode !== 'undefined' && delayNode;
  if (hasDelayNode) {
    var dt = delayNode.delayTime.value;
    var isNaNDelay = dt !== dt;
    addResult('delayNode.delayTime', !isNaNDelay, 'delayTime=' + dt + (isNaNDelay ? ' ← NaN! BROKEN!' : ' OK'));
  } else {
    addResult('delayNode', false, 'null');
  }
  
  // Check returns
  var hasDelayReturn = typeof delayReturn !== 'undefined' && delayReturn;
  var hasReverbReturn = typeof reverbReturn !== 'undefined' && reverbReturn;
  var hasRingReturn = typeof ringReturn !== 'undefined' && ringReturn;
  
  addResult('delayReturn exists', hasDelayReturn, hasDelayReturn ? 'gain=' + delayReturn.gain.value : 'null');
  addResult('reverbReturn exists', hasReverbReturn, hasReverbReturn ? 'gain=' + reverbReturn.gain.value : 'null');
  addResult('ringReturn exists', hasRingReturn, hasRingReturn ? 'gain=' + ringReturn.gain.value : 'null');
  
  // Check ring osc
  var hasRingOsc = typeof ringOsc !== 'undefined' && ringOsc;
  addResult('ringOsc running', hasRingOsc, hasRingOsc ? 'freq=' + ringOsc.frequency.value + 'Hz' : 'null');
  
  // Check reverb convolver
  var hasConvolver = typeof reverbConvolver !== 'undefined' && reverbConvolver;
  addResult('reverbConvolver', hasConvolver, hasConvolver ? 'buffer=' + (reverbConvolver.buffer ? reverbConvolver.buffer.numberOfChannels + 'ch' : 'null') : 'null');
  
  return true;
}

// ═══ TEST 10: Start playback test ═══
function testStartPlayback() {
  log('Test: Start playback and verify chain', 'info');
  resultsEl.innerHTML = '';
  
  if (typeof togglePlay === 'undefined') {
    addResult('Metronome loaded', false, 'togglePlay not found — open in same page as metronome');
    return false;
  }
  
  // If not playing, start
  if (!isPlaying) {
    togglePlay();
    addResult('Playback started', isPlaying, isPlaying ? 'isPlaying=true' : 'FAILED to start');
  } else {
    addResult('Already playing', true, 'isPlaying=true');
  }
  
  // Now run chain test
  setTimeout(testEffectChain, 100);
  return true;
}

// ═══ RUN ALL ═══
function runAllTests() {
  resultsEl.innerHTML = '';
  log('═══ Running all tests ═══', 'info');
  
  testAudioContext();
  testGainNode();
  testDelayNode();
  testConvolverNode();
  testBasicChain();
  testParallelSendReturn();
  testBeatDuration();
  testMetronomeSyncDelay();
  
  log('═══ Static tests complete. Use "Test Start Playback" for live chain test. ═══', 'info');
}
</script>
</body>
</html>
