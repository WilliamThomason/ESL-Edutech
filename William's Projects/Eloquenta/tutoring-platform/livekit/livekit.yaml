# LiveKit server configuration
# Docs: https://docs.livekit.io/livekit-server/configuration/

port: 7880
bind_addresses: ["0.0.0.0"]

# RTC configuration
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 51000
  use_external_ip: true
  enable_loopback_candidate: true

# TURN server configuration (using coturn as external TURN)
turn:
  enabled: true
  domain: ${LIVEKIT_DOMAIN:-localhost}
  cert_file: ""
  key_file: ""
  tls_port: 5349
  udp_port: 3478
  relay_range_start: 49152
  relay_range_end: 65535

# Keys for API authentication
keys:
  "${LIVEKIT_API_KEY:-devkey}": "${LIVEKIT_API_SECRET:-secret}"

# Logging
log_level: info
development: false

# Room defaults
room:
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 50
  enabled_codecs:
    - mime: audio/opus
    - mime: video/VP8
    - mime: video/H264

# Webhooks (optional — for session events)
# webhook:
#   urls:
#     - http://api:4000/api/webhooks/livekit
#   api_key: ${LIVEKIT_API_KEY:-devkey}
