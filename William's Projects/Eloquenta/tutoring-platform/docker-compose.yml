version: "3.8"

services:
  # ── Reverse Proxy + SSL ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - calcom
      - livekit
      - minio
      - api
    restart: unless-stopped

  # ── SSL Certificates (Let's Encrypt) ─────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Cal.com (Booking + Dashboards + Scheduling) ───────────
  calcom:
    image: calcom/cal.com:latest
    expose:
      - "3000"
    environment:
      DATABASE_URL: "postgresql://calcom:calcom_pass@postgres:5432/calcom"
      DATABASE_DIRECT_URL: "postgresql://calcom:calcom_pass@postgres:5432/calcom"
      NEXTAUTH_SECRET: "${CALCOM_NEXTAUTH_SECRET:-change-me-to-random-32-chars}"
      ENCRYPTION_KEY: "${CALCOM_ENCRYPTION_KEY:-change-me-to-random-32-chars}"
      NEXT_PUBLIC_WEBAPP_URL: "https://${DOMAIN:-localhost}"
      NEXT_PUBLIC_WEBSITE_URL: "https://${DOMAIN:-localhost}"
      NEXT_PUBLIC_CONSOLE_URL: "https://${DOMAIN:-localhost}"
      NEXT_PUBLIC_EMBED_LIB_URL: "https://${DOMAIN:-localhost}/embed/embed.js"
      LIVEKIT_API_URL: "wss://${DOMAIN:-localhost}:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
      EMAIL_FROM: "noreply@${DOMAIN:-localhost}"
      EMAIL_HOST: "${SMTP_HOST:-localhost}"
      EMAIL_PORT: "${SMTP_PORT:-587}"
      EMAIL_USERNAME: "${SMTP_USER:-}"
      EMAIL_PASSWORD: "${SMTP_PASS:-}"
      EMAIL_SECURE: "true"
    depends_on:
      - postgres
    restart: unless-stopped

  # ── LiveKit (WebRTC SFU — Voice/Video/Screen Share) ──────
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-51000:50000-51000/udp"
    volumes:
      - ./livekit/livekit.yaml:/livekit.yaml:ro
    command: --config /livekit.yaml
    restart: unless-stopped

  # ── coturn (TURN/STUN — NAT Traversal) ───────────────────
  coturn:
    image: coturn/coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"
    command: >
      --log-file=stdout
      --external-ip=${SERVER_IP:-auto}
      --realm=${DOMAIN:-localhost}
      --fingerprint
      --lt-cred-mech
      --user=livekit:${TURN_SECRET:-turn-secret-change-me}
      --no-multicast-peers
      --no-cli
      --min-port=49152
      --max-port=65535
      --no-tls
      --no-dtls
    restart: unless-stopped

  # ── PostgreSQL (Database) ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: calcom_pass
      POSTGRES_DB: calcom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis (Caching + Sessions) ───────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── MinIO (File Storage — S3 Compatible) ─────────────────
  minio:
    image: minio/minio:latest
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ── Custom API (Chat, File Sharing, Session Management) ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "4000"
    environment:
      DATABASE_URL: "postgresql://calcom:calcom_pass@postgres:5432/calcom"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_API_URL: "http://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MINIO_BUCKET: "tutoring"
      JWT_SECRET: "${JWT_SECRET:-jwt-secret-change-me}"
      FRONTEND_URL: "https://${DOMAIN:-localhost}"
    depends_on:
      - postgres
      - redis
      - livekit
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
