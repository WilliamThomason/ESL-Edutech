<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Race</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0f1a;
    --bg2: #111827;
    --bg3: #1e293b;
    --border: #374151;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --accent: #22d3ee;
    --green: #34d399;
    --amber: #fbbf24;
    --violet: #a78bfa;
    --rose: #fb7185;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px;
  }

  /* Setup screen */
  .setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    max-width: 600px;
    width: 100%;
  }
  .setup-title {
    font-size: 36px;
    font-weight: 800;
    text-align: center;
    color: var(--text);
  }
  .setup-subtitle {
    font-size: 16px;
    color: var(--text-dim);
    text-align: center;
    margin-top: -16px;
  }

  .difficulty-selector {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diff-btn {
    padding: 12px 24px;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .diff-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .diff-btn.active {
    border-color: var(--accent);
    background: rgba(34, 211, 238, 0.1);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
  }

  .start-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    border: none;
    border-radius: 12px;
    color: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(34, 211, 238, 0.3);
  }

  /* Game screen */
  .game-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    max-width: 700px;
    width: 100%;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 12px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  /* Timer bar */
  .timer-bar-container {
    width: 100%;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.1s linear, background 0.3s;
    width: 100%;
  }
  .timer-bar.warning {
    background: linear-gradient(90deg, var(--amber), var(--rose));
  }

  /* Word display */
  .word-display {
    width: 100%;
    padding: 40px;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-height: 200px;
    justify-content: center;
  }
  .word-display.waiting {
    border-color: var(--accent);
    animation: pulse-border 1.5s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(34,211,238,0); }
    50% { border-color: var(--accent); box-shadow: 0 0 20px 4px rgba(34,211,238,0.15); }
  }
  .current-word {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1.2;
    word-break: break-all;
    text-align: center;
    font-variant-nums: tabular-nums;
  }
  .char-correct { color: var(--green); }
  .char-incorrect { color: var(--rose); text-decoration: underline; }
  .char-current {
    background: rgba(34, 211, 238, 0.2);
    border-bottom: 3px solid var(--accent);
    color: var(--text);
    border-radius: 2px;
  }
  .char-pending { color: var(--text-muted); }

  .word-count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* Input field */
  .input-container {
    width: 100%;
  }
  .typing-input {
    width: 100%;
    padding: 16px 20px;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  .typing-input:focus {
    border-color: var(--accent);
  }
  .typing-input::placeholder {
    color: var(--text-muted);
  }

  /* Results screen */
  .results-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    max-width: 600px;
    width: 100%;
  }
  .results-title {
    font-size: 36px;
    font-weight: 800;
    text-align: center;
  }
  .results-ranking {
    font-size: 64px;
    font-weight: 800;
    text-align: center;
  }
  .results-ranking.r1 { color: var(--amber); }
  .results-ranking.r2 { color: var(--text-dim); }
  .results-ranking.r3 { color: var(--amber); opacity: 0.7; }
  .results-ranking.r4 { color: var(--violet); }
  .results-ranking.r5 { color: var(--accent); }
  .results-ranking.r6 { color: var(--text-muted); }

  .results-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
  }
  .result-stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .result-stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }
  .result-stat-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .results-ranking-text {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    color: var(--text-dim);
  }

  .restart-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    border: none;
    border-radius: 12px;
    color: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(34, 211, 238, 0.3);
  }

  /* Difficulty badge */
  .diff-badge {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(34, 211, 238, 0.1);
    color: var(--accent);
    border: 1px solid rgba(34, 211, 238, 0.2);
  }

  /* Utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">&larr; Back</a>
    <span class="header-title">Typing Race</span>
  </div>
  <div class="diff-badge" id="setupDiffBadge">Beginner</div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-title">Ready to Race?</div>
    <div class="setup-subtitle">Choose your difficulty and test your typing speed</div>
    <div class="difficulty-selector">
      <button class="diff-btn active" data-diff="beginner">Beginner</button>
      <button class="diff-btn" data-diff="common">Common</button>
      <button class="diff-btn" data-diff="intermediate">Intermediate</button>
      <button class="diff-btn" data-diff="advanced">Advanced</button>
    </div>
    <button class="start-btn" id="startBtn">Start Race</button>
  </div>

  <!-- Game Screen -->
  <div class="game-screen" id="gameScreen">
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value accent" id="timerDisplay">60</span>
      </div>
      <div class="stat">
        <span class="stat-label">WPM</span>
        <span class="stat-value" id="wpmDisplay">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Accuracy</span>
        <span class="stat-value green" id="accuracyDisplay">100%</span>
      </div>
      <div class="stat">
        <span class="stat-label">Words</span>
        <span class="stat-value amber" id="wordsDisplay">0</span>
      </div>
    </div>
    <div class="timer-bar-container">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="word-display waiting" id="wordDisplay">
      <div class="current-word" id="wordText"></div>
      <div class="word-count" id="wordCount"></div>
    </div>
    <div class="input-container">
      <input type="text" class="typing-input" id="typingInput" placeholder="Type the word here..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen">
    <div class="results-title">Race Complete!</div>
    <div class="results-ranking" id="rankingDisplay"></div>
    <div class="results-ranking-text" id="rankingText"></div>
    <div class="results-stats">
      <div class="result-stat-card">
        <div class="result-stat-value" id="finalWpm">0</div>
        <div class="result-stat-label">Words/Min</div>
      </div>
      <div class="result-stat-card">
        <div class="result-stat-value" id="finalAccuracy">0%</div>
        <div class="result-stat-label">Accuracy</div>
      </div>
      <div class="result-stat-card">
        <div class="result-stat-value" id="finalWords">0</div>
        <div class="result-stat-label">Words Typed</div>
      </div>
      <div class="result-stat-card">
        <div class="result-stat-value" id="finalChars">0</div>
        <div class="result-stat-label">Characters</div>
      </div>
    </div>
    <button class="restart-btn" id="restartBtn">Race Again</button>
  </div>

</div>

      "international","interpolation","interrogation","interruption","intervention","involuntarily","jurisdiction","kaleidoscope","kinesiology","labyrinthine","lexicographer","magnanimous","manifestation","manufacturer",
      "mathematician","metamorphosis","miscellaneous","misconception","mischievous","modernization","monarchical","multifaceted","municipality","nationality","necessitating","negligible","nonconformist",
      "notification","nullification","obfuscation","onomatopoeia","opportunistic","optimization","orchestrate","organization","ostentatious","parliamentary","pedestrianize","penitentiary","perpendicular","personification",
      "pharmaceutical","philosophical","photosynthesis","pneumonoultramicroscopicsilicovolcanoconiosis","politician","predominantly","prestidigitation","procrastinate","professional","prognostication","proportionate",
      "psychoanalysis","qualification","quarterback","quintessential","rapprochement","realization","rearrangeable","recalibration","reconciliation","reconstruction","rehabilitation","reincarnation","relentlessness",
      "reorganization","representation","responsibility","retroactive","revolutionary","serendipity","simultaneously","soliloquy","sovereignty","specification","straightforward","substantiation","superintendent",
      "superlative","surreptitious","susceptibility","symbiosis","technological","telecommunications","temperamental","thermodynamics","totalitarianism","transformation","transplantation","tribunal","triumphant",
      "ubiquitous","unambiguous","unanimous","unavailability","unconscious","unconventional","undergraduate","undermine","understandable","unforgettable","unprecedented","utilitarian","ventriloquist",
      "vernacular","vociferous","watershed","xenophobia","xylophone","yesterday","zeitgeist","zoological"
    ]
  };

  // ---- Ranking thresholds (WPM) ----
  var RANKINGS = [
    { min: 0, label: "Beginner", rankClass: "r6", desc: "Keep practicing, you will improve!" },
    { min: 15, label: "Getting There", rankClass: "r5", desc: "Good start! Keep building your speed." },
    { min: 25, label: "Intermediate Typer", rankClass: "r4", desc: "Solid typing skills!" },
    { min: 35, label: "Advanced Typer", rankClass: "r3", desc: "Great speed and control!" },
    { min: 45, label: "Fast Typer", rankClass: "r2", desc: "Excellent typing skills!" },
    { min: 60, label: "Speed Master", rankClass: "r1", desc: "Outstanding! You are a typing champion!" }
  ];

  // ---- State ----
  var difficulty = "beginner";
  var words = [];
  var currentWordIndex = 0;
  var totalCorrectChars = 0;
  var totalCharsTyped = 0;
  var correctWords = 0;
  var totalWordsAttempted = 0;
  var timeLeft = 60;
  var gameActive = false;
  var timerInterval = null;
  var startTime = 0;

  // ---- DOM refs ----
  var setupScreen = document.getElementById("setupScreen");
  var gameScreen = document.getElementById("gameScreen");
  var resultsScreen = document.getElementById("resultsScreen");
  var wordText = document.getElementById("wordText");
  var wordDisplay = document.getElementById("wordDisplay");
  var wordCount = document.getElementById("wordCount");
  var typingInput = document.getElementById("typingInput");
  var timerDisplay = document.getElementById("timerDisplay");
  var timerBar = document.getElementById("timerBar");
  var wpmDisplay = document.getElementById("wpmDisplay");
  var accuracyDisplay = document.getElementById("accuracyDisplay");
  var wordsDisplay = document.getElementById("wordsDisplay");
  var setupDiffBadge = document.getElementById("setupDiffBadge");
  var startBtn = document.getElementById("startBtn");
  var restartBtn = document.getElementById("restartBtn");
  var diffBtns = document.querySelectorAll(".diff-btn");

  // ---- Difficulty selection ----
  diffBtns.forEach(function(btn) {
    btn.addEventListener("click", function() {
      diffBtns.forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      difficulty = btn.getAttribute("data-diff");
      setupDiffBadge.textContent = btn.textContent;
    });
  });

  // ---- Start game ----
  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", startGame);

  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function startGame() {
    words = shuffleArray(WORD_LISTS[difficulty] || WORD_LISTS.beginner);
    currentWordIndex = 0;
    totalCorrectChars = 0;
    totalCharsTyped = 0;
    correctWords = 0;
    totalWordsAttempted = 0;
    timeLeft = 60;
    gameActive = true;

    setupScreen.style.display = "none";
    gameScreen.style.display = "flex";
    resultsScreen.style.display = "none";

    renderWord();
    updateStats();
    renderTimer();

    if (timerInterval) clearInterval(timerInterval);
    startTime = Date.now();
    timerInterval = setInterval(tick, 100);

    typingInput.value = "";
    typingInput.focus();
  }

  function tick() {
    var elapsed = (Date.now() - startTime) / 1000;
    timeLeft = Math.max(0, 60 - elapsed);
    renderTimer();
    updateStats();

    if (timeLeft <= 0) {
      endGame();
    }
  }

  function renderTimer() {
    timerDisplay.textContent = Math.ceil(timeLeft);
    var pct = (timeLeft / 60) * 100;
    timerBar.style.width = pct + "%";
    if (timeLeft <= 15) {
      timerBar.classList.add("warning");
    } else {
      timerBar.classList.remove("warning");
    }
  }

  function renderWord() {
    if (currentWordIndex >= words.length) {
      words = shuffleArray(WORD_LISTS[difficulty] || WORD_LISTS.beginner);
      currentWordIndex = 0;
    }
    var word = words[currentWordIndex];
    var typed = typingInput.value;
    var html = "";

    for (var i = 0; i < word.length; i++) {
      var ch = word[i];
      var cls = "char-pending";
      if (i < typed.length) {
        cls = (typed[i] === ch) ? "char-correct" : "char-incorrect";
      } else if (i === typed.length) {
        cls = "char-current";
      }
      html += '<span class="' + cls + '">' + ch + "</span>";
    }

    wordText.innerHTML = html;
    wordCount.textContent = "Word " + (currentWordIndex + 1);
    wordDisplay.classList.remove("waiting");
  }

  function updateStats() {
    var elapsed = (Date.now() - startTime) / 1000;
    var minutes = elapsed > 0 ? elapsed / 60 : 0.0001;
    var wpm = Math.round(correctWords / minutes) || 0;
    var accuracy = totalCharsTyped > 0 ? Math.round((totalCorrectChars / totalCharsTyped) * 100) : 100;

    wpmDisplay.textContent = wpm;
    accuracyDisplay.textContent = accuracy + "%";
    wordsDisplay.textContent = correctWords;
  }

  // ---- Input handling ----
  typingInput.addEventListener("input", function() {
    if (!gameActive) return;
    renderWord();
  });

  typingInput.addEventListener("keydown", function(e) {
    if (!gameActive) return;

    if (e.key === " ") {
      e.preventDefault();
      submitWord();
    }

    if (e.key === "Enter") {
      e.preventDefault();
      submitWord();
    }
  });

  function submitWord() {
    if (!gameActive) return;
    var word = words[currentWordIndex];
    var typed = typingInput.value.trim();

    if (typed.length === 0) return;

    totalWordsAttempted++;

    for (var i = 0; i < typed.length; i++) {
      totalCharsTyped++;
      if (i < word.length && typed[i] === word[i]) {
        totalCorrectChars++;
      }
    }

    // Count as correct word only if exact match
    if (typed === word) {
      correctWords++;
      totalCorrectChars = word.length + (i < word.length ? 0 : 0);
    }

    currentWordIndex++;
    typingInput.value = "";
    renderWord();
    updateStats();
  }

  // ---- End game ----
  function endGame() {
    gameActive = false;
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    var elapsed = 60; // Always 60 seconds
    var minutes = elapsed / 60;
    var finalWpm = Math.round(correctWords / minutes) || 0;
    var finalAccuracy = totalCharsTyped > 0 ? Math.round((totalCorrectChars / totalCharsTyped) * 100) : 0;

    // Rankings
    var rank = RANKINGS[0];
    for (var i = RANKINGS.length - 1; i >= 0; i--) {
      if (finalWpm >= RANKINGS[i].min) {
        rank = RANKINGS[i];
        break;
      }
    }

    document.getElementById("rankingDisplay").className = "results-ranking " + rank.rankClass;
    document.getElementById("rankingDisplay").textContent = rank.label;
    document.getElementById("rankingText").textContent = rank.desc;
    document.getElementById("finalWpm").textContent = finalWpm;
    document.getElementById("finalAccuracy").textContent = finalAccuracy + "%";
    document.getElementById("finalWords").textContent = correctWords;
    document.getElementById("finalChars").textContent = totalCharsTyped;

    gameScreen.style.display = "none";
    resultsScreen.style.display = "flex";
  }

  // ---- Focus input on click anywhere on game screen ----
  gameScreen.addEventListener("click", function(e) {
    if (gameActive && e.target !== typingInput) {
      typingInput.focus();
    }
  });

})();
</script>
</body>
</html>
