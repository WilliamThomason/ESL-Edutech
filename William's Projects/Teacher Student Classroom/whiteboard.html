<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Whiteboard — Teacher Student Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--bg2:#111827;--bg3:#1e293b;--border:#374151;--text:#f1f5f9;--dim:#94a3b8;--muted:#64748b;--cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;--rose:#fb7185}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh}
.header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);height:50px}
.back{color:var(--dim);text-decoration:none;font-size:13px;font-weight:600;padding:6px 10px;border-radius:6px;border:1px solid var(--border)}
.back:hover{color:var(--cyan);border-color:var(--cyan)}
.title{font-size:15px;font-weight:700;flex:1}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:4px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tool-group{display:flex;align-items:center;gap:2px;padding-right:8px;margin-right:8px;border-right:1px solid var(--border)}
.tool-group:last-child{border-right:none}
.tbtn{width:36px;height:36px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;position:relative}
.tbtn:hover{background:var(--bg3);color:var(--text)}
.tbtn.active{background:rgba(34,211,238,.12);color:var(--cyan);border-color:rgba(34,211,238,.25)}
.tbtn .tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;z-index:20}
.tbtn:hover .tip{opacity:1}

/* Color swatches */
.colors{display:flex;gap:3px;align-items:center}
.swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .1s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:var(--text)}

/* Brush slider */
.brush-control{display:flex;align-items:center;gap:6px}
.brush-control input{width:50px;accent-color:var(--cyan)}
.brush-dot{border-radius:50%;background:var(--cyan);flex-shrink:0}

/* Canvas area */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#111827;display:flex;align-items:center;justify-content:center}
canvas{cursor:crosshair;background:#111827;box-shadow:0 0 0 1px var(--border)}

/* Layout */
.layout{display:flex;flex-direction:column;height:calc(100vh - 50px)}

/* Text input overlay */
.text-overlay{display:none;position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;z-index:10}
.text-overlay.active{display:block}
.text-overlay input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif}
.text-overlay input:focus{border-color:var(--cyan)}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">&larr; Back</a>
  <div class="title">Whiteboard</div>
  <span style="font-size:11px;color:var(--muted)">Solo Mode</span>
</div>

<div class="layout">
  <div class="toolbar">
    <div class="tool-group">
      <button class="tbtn active" data-tool="pen" title="Pen"><span class="tip">Pen</span>&#9999;</button>
      <button class="tbtn" data-tool="line" title="Line"><span class="tip">Line</span>&#9472;</button>
      <button class="tbtn" data-tool="rect" title="Rectangle"><span class="tip">Rect</span>&#9633;</button>
      <button class="tbtn" data-tool="circle" title="Circle"><span class="tip">Circle</span>&#9675;</button>
      <button class="tbtn" data-tool="arrow" title="Arrow"><span class="tip">Arrow</span>&#8594;</button>
      <button class="tbtn" data-tool="text" title="Text"><span class="tip">Text</span>&#65;</button>
    </div>
    <div class="tool-group">
      <button class="tbtn" data-tool="eraser" title="Eraser"><span class="tip">Eraser</span>&#9083;</button>
    </div>
    <div class="tool-group colors" id="colorSwatches"></div>
    <div class="tool-group brush-control">
      <div class="brush-dot" id="brushDot" style="width:6px;height:6px"></div>
      <input type="range" id="brushSize" min="1" max="20" value="3" oninput="updateBrush()">
    </div>
    <div class="tool-group" style="margin-left:auto">
      <button class="tbtn" onclick="undoDraw()" title="Undo"><span class="tip">Undo</span>&#8630;</button>
      <button class="tbtn" onclick="redoDraw()" title="Redo"><span class="tip">Redo</span>&#8631;</button>
      <button class="tbtn" onclick="clearCanvas()" title="Clear"><span class="tip">Clear</span>&#10005;</button>
      <button class="tbtn" onclick="saveCanvas()" title="Save PNG"><span class="tip">Save</span>&#128190;</button>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="text-overlay" id="textOverlay">
      <input type="text" id="textInput" placeholder="Type text..." onkeydown="if(event.key==='Enter')placeText()">
    </div>
  </div>
</div>

<script>
var canvas,ctx,tool='pen',drawing=false;
var colors=['#f1f5f9','#22d3ee','#34d399','#fbbf24','#fb7185','#a78bfa','#64748b','#ef4444'];
var annColor='#22d3ee',brushSize=3;
var undoStack=[],redoStack=[],startX,startY;
var textX=0,textY=0;

(function(){
  var sw=document.getElementById('colorSwatches');
  colors.forEach(function(c,i){
    var s=document.createElement('div');
    s.className='swatch'+(i===1?' active':'');
    s.style.background=c;
    s.onclick=function(){annColor=c;document.querySelectorAll('.swatch').forEach(function(x){x.classList.remove('active')});s.classList.add('active');updateBrush();};
    sw.appendChild(s);
  });
})();

function updateBrush(){
  brushSize=parseInt(document.getElementById('brushSize').value);
  var d=Math.max(4,brushSize*2);
  document.getElementById('brushDot').style.width=d+'px';
  document.getElementById('brushDot').style.height=d+'px';
}

document.querySelectorAll('.tbtn[data-tool]').forEach(function(btn){
  btn.onclick=function(){
    document.querySelectorAll('.tbtn[data-tool]').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');tool=btn.dataset.tool;
    canvas.style.cursor=tool==='text'?'text':'crosshair';
  };
});

function initCanvas(){
  canvas=document.getElementById('mainCanvas');
  ctx=canvas.getContext('2d');
  var wrap=document.getElementById('canvasWrap');
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.fillStyle='#111827';ctx.fillRect(0,0,canvas.width,canvas.height);
  saveUndo();
  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);
  canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];var r=canvas.getBoundingClientRect();startDraw({offsetX:t.clientX-r.left,offsetY:t.clientY-r.top});});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var t=e.touches[0];var r=canvas.getBoundingClientRect();draw({offsetX:t.clientX-r.left,offsetY:t.clientY-r.top});});
  canvas.addEventListener('touchend',endDraw);
}
window.addEventListener('resize',function(){
  if(!canvas)return;
  var w=canvas.toDataURL();
  var wrap=document.getElementById('canvasWrap');
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  var img=new Image();
  img.onload=function(){ctx.drawImage(img,0,0);};
  img.src=w;
});

function startDraw(e){
  if(tool==='text'){showTextInput(e.offsetX,e.offsetY);return;}
  drawing=true;startX=e.offsetX;startY=e.offsetY;
  if(tool==='pen'||tool==='eraser'){
    ctx.beginPath();ctx.moveTo(startX,startY);
  }
}

function draw(e){
  if(!drawing)return;
  var x=e.offsetX,y=e.offsetY;
  ctx.lineCap='round';ctx.lineJoin='round';
  if(tool==='pen'){
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=annColor;ctx.lineWidth=brushSize;ctx.globalAlpha=1;
    ctx.lineTo(x,y);ctx.stroke();
  } else if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.lineWidth=brushSize*4;
    ctx.lineTo(x,y);ctx.stroke();
  }
}

function endDraw(e){
  if(!drawing)return;
  if(tool==='text')return;
  drawing=false;
  var x=e.offsetX,y=e.offsetY;
  ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle=annColor;ctx.lineWidth=brushSize;ctx.globalAlpha=1;
  if(tool==='line'){
    ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
  } else if(tool==='arrow'){
    ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
    drawArrow(startX,startY,x,y);
  } else if(tool==='rect'){
    ctx.strokeRect(startX,startY,x-startX,y-startY);
  } else if(tool==='circle'){
    var rx=Math.abs(x-startX)/2,ry=Math.abs(y-startY)/2;
    var cx=startX+(x-startX)/2,cy=startY+(y-startY)/2;
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
  }
  saveUndo();
}

function drawArrow(x1,y1,x2,y2){
  var angle=Math.atan2(y2-y1,x2-x1);
  var head=12;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6),y2-head*Math.sin(angle-Math.PI/6));
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6),y2-head*Math.sin(angle+Math.PI/6));
  ctx.stroke();
}

function showTextInput(x,y){
  textX=x;textY=y;
  var ov=document.getElementById('textOverlay');
  ov.style.left=x+'px';ov.style.top=y+'px';
  ov.classList.add('active');
  document.getElementById('textInput').value='';
  document.getElementById('textInput').focus();
}

function placeText(){
  var txt=document.getElementById('textInput').value;
  if(txt){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=annColor;ctx.font=brushSize*5+'px Inter';
    ctx.fillText(txt,textX,textY+brushSize*4);
    saveUndo();
  }
  document.getElementById('textOverlay').classList.remove('active');
}

function saveUndo(){
  undoStack.push(canvas.toDataURL());
  if(undoStack.length>30)undoStack.shift();
  redoStack=[];
}

function undoDraw(){
  if(undoStack.length<2)return;
  redoStack.push(undoStack.pop());
  var img=new Image();
  img.onload=function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
  };
  img.src=undoStack[undoStack.length-1];
}

function redoDraw(){
  if(redoStack.length===0)return;
  var data=redoStack.pop();
  undoStack.push(data);
  var img=new Image();
  img.onload=function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
  };
  img.src=data;
}

function clearCanvas(){
  ctx.fillStyle='#111827';ctx.fillRect(0,0,canvas.width,canvas.height);
  saveUndo();
}

function saveCanvas(){
  var link=document.createElement('a');
  link.download='whiteboard.png';
  link.href=canvas.toDataURL();
  link.click();
}

document.addEventListener('DOMContentLoaded',initCanvas);
if(document.readyState!=='loading')initCanvas();
</script>
</body>
</html>
