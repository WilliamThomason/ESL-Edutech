<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Image Manager — Sliding In</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Blogger+Sans:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1c1c1c;--bg2:#161616;--bg3:#222222;--bg-card:#232323;--border:#333333;--border-light:#444444;--text:#e8e8e8;--text-muted:#999999;--text-dim:#555555;--accent:#a3e635;--accent-dim:rgba(163,230,53,.08);--accent-glow:rgba(163,230,53,.3);--cta:#fcbe6a;--cta-hover:#fdb553;--cta-text:#1c1c1c;--violet:#a78bfa;--rose:#fb7185;--amber:#fbbf24;--green:#34d399}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Blogger Sans','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
::selection{background:var(--accent);color:var(--bg)}

.topbar{position:sticky;top:0;z-index:50;background:rgba(28,28,28,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.topbar h1{font-family:'Fira Code',monospace;font-size:.85rem;font-weight:700;color:var(--text)}
.topbar h1 span{color:var(--accent)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:(--text-muted);font-family:'Fira Code',monospace;font-size:.65rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.btn.primary:hover{background:var(--accent);opacity:.9}
.btn.danger{border-color:var(--rose);color:var(--rose)}
.btn.danger:hover{background:rgba(251,113,133,.1)}

.stats-bar{display:flex;gap:24px;padding:10px 24px;border-bottom:1px solid var(--border);font-family:'Fira Code',monospace;font-size:.65rem;color:var(--text-dim)}
.stats-bar span{color:var(--accent);font-weight:700}

.filter-bar{display:flex;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:200px;max-width:400px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.8rem;outline:none}
.filter-bar input:focus{border-color:var(--accent)}
.filter-bar select{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.75rem;outline:none;cursor:pointer}

.bulk-zone{margin:12px 24px;padding:16px;border:2px dashed var(--border);border-radius:10px;text-align:center;font-size:.8rem;color:var(--text-dim);transition:all .2s;cursor:pointer}
.bulk-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.bulk-zone input[type=file]{display:none}

.grid{padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

.topic-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;transition:all .15s}
.topic-card:hover{border-color:var(--accent)}
.topic-card.has-images{border-color:var(--green);border-color:rgba(52,211,153,.3)}
.topic-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.topic-card-cat{font-family:'Fira Code',monospace;font-size:.5rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
.topic-card-title{font-family:'Fira Code',monospace;font-size:.75rem;font-weight:600;color:var(--text);line-height:1.3}
.topic-card-count{font-family:'Fira Code',monospace;font-size:.55rem;color:var(--text-dim);flex-shrink:0;padding:2px 6px;border-radius:4px;background:var(--bg3)}
.topic-card-count.has{color:var(--green);background:rgba(52,211,153,.1)}

.img-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.img-slot{position:relative;aspect-ratio:16/10;border-radius:6px;overflow:hidden;background:var(--bg2);border:1px solid var(--border)}
.img-slot img{width:100%;height:100%;object-fit:cover;display:block}
.img-slot .slot-num{position:absolute;top:2px;left:4px;font-family:'Fira Code',monospace;font-size:.5rem;color:var(--text-dim);z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.img-slot .remove-btn{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.7);color:(--rose);border:none;cursor:pointer;font-size:.5rem;display:none;align-items:center;justify-content:center;z-index:2}
.img-slot:hover .remove-btn{display:flex}
.img-slot .upload-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:(--text-dim);cursor:pointer;transition:background .15s}
.img-slot .upload-label:hover{background:rgba(163,230,53,.08);color:var(--accent)}
.img-slot.has-img .upload-label{display:none}
.img-slot input[type=file]{display:none}

.topic-card-actions{display:flex;gap:6px}
.topic-card-actions button{flex:1;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:(--text-dim);font-family:'Fira Code',monospace;font-size:.55rem;cursor:pointer;transition:all .15s}
.topic-card-actions button:hover{border-color:var(--accent);color:var(--accent)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;background:var(--accent);color:var(--bg);font-family:'Fira Code',monospace;font-size:.7rem;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;padding:12px}
  .topbar{padding:10px 12px}
  .stats-bar{padding:8px 12px}
  .filter-bar{padding:8px 12px}
  .bulk-zone{margin:8px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>&#9670; <span>SLIDING</span> IN</h1>
  <div style="flex:1"></div>
  <div class="topbar-actions">
    <button class="btn" onclick="exportImages()">&#128228; Export JSON</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">&#128229; Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importImages(event)">
    <button class="btn danger" onclick="clearAll()">&#128465; Clear All</button>
    <a href="Sliding In.html" class="btn primary">&#8592; Back to Lessons</a>
  </div>
</div>

<div class="stats-bar">
  Topics: <span id="totalTopics">0</span> &nbsp;|&nbsp;
  With images: <span id="topicsWithImages">0</span> &nbsp;|&nbsp;
  Total images: <span id="totalImages">0</span>
</div>

<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="Search topics..." oninput="renderGrid()">
  <select id="catFilter" onchange="renderGrid()">
    <option value="">All Categories</option>
  </select>
  <select id="imgFilter" onchange="renderGrid()">
    <option value="">All Topics</option>
    <option value="has">Has Images</option>
    <option value="missing">Missing Images</option>
  </select>
</div>

<div class="bulk-zone" id="bulkZone" onclick="document.getElementById('bulkFile').click()">
  <div style="font-size:1.2rem;margin-bottom:4px">&#128230;</div>
  <div><strong>Bulk Upload</strong> — Drop image files here or click to select</div>
  <div style="font-size:.7rem;margin-top:4px">Auto-matches by filename: "age.jpg" → Age topic, "food-1.jpg" → Food topic (slot 1)</div>
  <input type="file" id="bulkFile" multiple accept="image/*" onchange="handleBulkUpload(event)">
</div>

<div class="grid" id="topicGrid"></div>

<div class="toast" id="toast"></div>

<script>
// Topic data — same slugs as topicImages in main page
var topicSlugs=[
  "age","appearance","beautyselfcare","beliefs","birthday","body","bodylanguage","books","business",
  "childhood","choices","cities","climatechange","clothes","communication","community","cooking","creativity",
  "culture","death","diet","disabilities","doyouthinkyouare","dreams","driving","education","environment",
  "family","fashion","favouritethings","fearsphobias","food","freetime","friends","future","gadgets",
  "gambling","gender","generations","globalisation","goals","habits","happiness","healthwellbeing","hobbies",
  "holidays","home","humour","identity","illness","immigration","intelligence","internet","jobs","justice",
  "languages","law","leadership","lifestages","loneliness","love","luck","manners","marriage","media",
  "memories","money","moodemotion","morality","music","nature","news","parenting","personalfinance",
  "personality","pets","photography","politics","poverty","privacy","psychology","racism","relationships",
  "religion","retirement","risk","rolemodels","romance","school","science","seasons","shopping","sleep",
  "socialmedia","society","sport","stress","success","technology","teenagers","time","tourism","transport",
  "travel","urbanisation","vegetarianism","violence","volunteering","war","weather","work","youth"
];

// Build topic titles from slug
function slugToTitle(slug){
  var map={
    age:"Age & Ageing",appearance:"Appearance",beautyselfcare:"Beauty & Self Care",beliefs:"Beliefs",
    birthday:"Birthday",body:"Body",bodylanguage:"Body Language",books:"Books",business:"Business",
    childhood:"Childhood",choices:"Choices",cities:"Cities",climatechange:"Climate Change",clothes:"Clothes",
    communication:"Communication",community:"Community",cooking:"Cooking",creativity:"Creativity",
    culture:"Culture",death:"Death",diet:"Diet",disabilities:"Disabilities",doyouthinkyouare:"Do You Think You Are",
    dreams:"Dreams",driving:"Driving",education:"Education",environment:"Environment",family:"Family",
    fashion:"Fashion",favouritethings:"Favourite Things",fearsphobias:"Fears & Phobias",food:"Food",
    freetime:"Free Time",friends:"Friends",future:"Future",gadgets:"Gadgets",gambling:"Gambling",
    gender:"Gender",generations:"Generations",globalisation:"Globalisation",goals:"Goals",habits:"Habits",
    happiness:"Happiness",healthwellbeing:"Health & Wellbeing",hobbies:"Hobbies",holidays:"Holidays",
    home:"Home",humour:"Humour",identity:"Identity",illness:"Illness",immigration:"Immigration",
    intelligence:"Intelligence",internet:"Internet",jobs:"Jobs",justice:"Justice",languages:"Languages",
    law:"Law",leadership:"Leadership",lifestages:"Life Stages",loneliness:"Loneliness",love:"Love",
    luck:"Luck",manners:"Manners",marriage:"Marriage",media:"Media",memories:"Memories",money:"Money",
    moodemotion:"Mood & Emotion",morality:"Morality",music:"Music",nature:"Nature",news:"News",
    parenting:"Parenting",personalfinance:"Personal Finance",personality:"Personality",pets:"Pets",
    photography:"Photography",politics:"Politics",poverty:"Poverty",privacy:"Privacy",psychology:"Psychology",
    racism:"Racism",relationships:"Relationships",religion:"Religion",retirement:"Retirement",risk:"Risk",
    rolemodels:"Role Models",romance:"Romance",school:"School",science:"Science",seasons:"Seasons",
    shopping:"Shopping",sleep:"Sleep",socialmedia:"Social Media",society:"Society",sport:"Sport",
    stress:"Stress",success:"Success",technology:"Technology",teenagers:"Teenagers",time:"Time",
    tourism:"Tourism",transport:"Transport",travel:"Travel",urbanisation:"Urbanisation",
    vegetarianism:"Vegetarianism",violence:"Violence",volunteering:"Volunteering",war:"War",
    weather:"Weather",work:"Work",youth:"Youth"
  };
  return map[slug]||slug;
}

// Category mapping
function slugToCategory(slug){
  var personal=["age","appearance","beautyselfcare","beliefs","birthday","body","bodylanguage","choices","doyouthinkyouare","dreams","fearsphobias","gender","happiness","healthwellbeing","identity","illness","intelligence","lifestages","loneliness","love","luck","manners","marriage","memories","money","moodemotion","morality","personality","relationships","romance","sleep","stress","success","time"];
  var social=["books","communication","community","culture","education","family","friends","generations","humour","immigration","internet","justice","languages","law","leadership","media","music","news","parenting","politics","privacy","psychology","racism","religion","school","shopping","socialmedia","society","sport","technology","teenagers","violence","volunteering","war","youth"];
  var lifestyle=["body","childhood","clothes","cooking","creativity","diet","driving","environment","fashion","favouritethings","food","freetime","gadgets","gambling","goals","habits","hobbies","home","nature","pets","photography","retirement","risk","rolemodels","seasons","tourism","transport","travel","vegetarianism","weather","work"];
  var global=["business","cities","climatechange","death","disabilities","economy","future","globalisation","poverty","science","urbanisation"];
  if(personal.indexOf(slug)>=0) return "Personal Life & Identity";
  if(social.indexOf(slug)>=0) return "Society & Culture";
  if(lifestyle.indexOf(slug)>=0) return "Lifestyle & Leisure";
  return "Global & Environment";
}

// Load saved images from localStorage
function loadImages(){
  try{
    var saved=localStorage.getItem('slidingInImages');
    return saved?JSON.parse(saved):{};
  }catch(e){return{};}
}

function saveImages(imgs){
  localStorage.setItem('slidingInImages',JSON.stringify(imgs));
}

// Render the topic grid
function renderGrid(){
  var imgs=loadImages();
  var search=document.getElementById('searchInput').value.toLowerCase();
  var catFilter=document.getElementById('catFilter').value;
  var imgFilter=document.getElementById('imgFilter').value;
  var grid=document.getElementById('topicGrid');
  grid.innerHTML='';
  var total=0,withImg=0,totalImgs=0;

  // Build category filter options
  var cats={};
  for(var i=0;i<topicSlugs.length;i++){
    var cat=slugToCategory(topicSlugs[i]);
    cats[cat]=true;
  }
  var catSelect=document.getElementById('catFilter');
  var currentCat=catSelect.value;
  catSelect.innerHTML='<option value="">All Categories</option>';
  var catNames=Object.keys(cats).sort();
  for(var c=0;c<catNames.length;c++){
    catSelect.innerHTML+='<option value="'+catNames[c]+'"'+(currentCat===catNames[c]?' selected':'')+'>'+catNames[c]+'</option>';
  }

  for(var i=0;i<topicSlugs.length;i++){
    var slug=topicSlugs[i];
    var title=slugToTitle(slug);
    var cat=slugToCategory(slug);
    var topicImgs=imgs[slug]||[];
    total++;
    if(topicImgs.length>0){withImg++;totalImgs+=topicImgs.length;}

    // Filters
    if(search&&title.toLowerCase().indexOf(search)<0&&slug.indexOf(search)<0) continue;
    if(catFilter&&cat!==catFilter) continue;
    if(imgFilter==='has'&&topicImgs.length===0) continue;
    if(imgFilter==='missing'&&topicImgs.length>0) continue;

    var card=document.createElement('div');
    card.className='topic-card'+(topicImgs.length>0?' has-images':'');
    card.id='card-'+slug;

    var imgSlotsHtml='';
    for(var s=0;s<3;s++){
      var slotImg=topicImgs[s];
      imgSlotsHtml+='<div class="img-slot'+(slotImg?' has-img':'')+'" id="slot-'+slug+'-'+s+'">';
      if(slotImg){
        imgSlotsHtml+='<img src="'+slotImg+'" alt="">';
        imgSlotsHtml+='<span class="slot-num">'+(s+1)+'</span>';
        imgSlotsHtml+='<button class="remove-btn" onclick="removeImage(\''+slug+'\','+s+')">&#10005;</button>';
      } else {
        imgSlotsHtml+='<label class="upload-label" for="file-'+slug+'-'+s+'">+ Image '+(s+1)+'</label>';
        imgSlotsHtml+='<input type="file" id="file-'+slug+'-'+s+'" accept="image/*" onchange="uploadImage(\''+slug+'\','+s+',event)">';
      }
      imgSlotsHtml+='</div>';
    }

    card.innerHTML=
      '<div class="topic-card-header">'+
        '<div><div class="topic-card-cat">'+cat+'</div><div class="topic-card-title">'+title+'</div></div>'+
        '<div class="topic-card-count'+(topicImgs.length>0?' has':'')+'">'+topicImgs.length+'/3</div>'+
      '</div>'+
      '<div class="img-slots">'+imgSlotsHtml+'</div>'+
      '<div class="topic-card-actions">'+
        '<button onclick="clearTopic(\''+slug+'\')">Clear</button>'+
        '<button onclick="copySlug(\''+slug+'\')">Copy Slug</button>'+
      '</div>';

    grid.appendChild(card);
  }

  document.getElementById('totalTopics').textContent=total;
  document.getElementById('topicsWithImages').textContent=withImg;
  document.getElementById('totalImages').textContent=totalImgs;
}

// Upload single image
function uploadImage(slug,slot,e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var imgs=loadImages();
    if(!imgs[slug]) imgs[slug]=[];
    // Ensure array has 3 slots
    while(imgs[slug].length<=slot) imgs[slug].push(null);
    imgs[slug][slot]=ev.target.result;
    saveImages(imgs);
    renderGrid();
    // Also update the main page if it's open
    try{
      if(window.opener && window.opener.topicImages){
        window.opener.topicImages[slug]=imgs[slug];
      }
    }catch(e){}
    showToast('Image saved for '+slugToTitle(slug));
  };
  reader.readAsDataURL(file);
}

// Remove image
function removeImage(slug,slot){
  var imgs=loadImages();
  if(imgs[slug]&&imgs[slot]){
    imgs[slug][slot]=null;
    // Clean up trailing nulls
    while(imgs[slug].length>0&&!imgs[slug][imgs[slug].length-1]) imgs[slug].pop();
    if(imgs[slug].length===0) delete imgs[slug];
    saveImages(imgs);
    renderGrid();
    showToast('Image removed');
  }
}

// Clear all images for a topic
function clearTopic(slug){
  var imgs=loadImages();
  delete imgs[slug];
  saveImages(imgs);
  renderGrid();
  showToast('Cleared '+slugToTitle(slug));
}

// Copy slug to clipboard
function copySlug(slug){
  navigator.clipboard.writeText(slug).then(function(){
    showToast('Copied: '+slug);
  });
}

// Bulk upload with auto-match
function handleBulkUpload(e){
  var files=e.target.files;
  if(!files.length) return;
  var imgs=loadImages();
  var matched=0,unmatched=0;
  var pending=files.length;
  var fileList=[];
  for(var i=0;i<files.length;i++) fileList.push(files[i]);

  function processFile(idx){
    if(idx>=fileList.length){
      saveImages(imgs);
      renderGrid();
      showToast('Bulk upload: '+matched+' matched, '+unmatched+' unmatched');
      return;
    }
    var file=fileList[idx];
    var name=file.name.replace(/\.[^.]+$/,'').toLowerCase().replace(/[-_]/g,'').replace(/\d+$/,'');
    // Try to match slug
    var matchedSlug=null;
    for(var s=0;s<topicSlugs.length;s++){
      if(topicSlugs[s]===name||topicSlugs[s].indexOf(name)===0||name.indexOf(topicSlugs[s])===0){
        matchedSlug=topicSlugs[s];
        break;
      }
    }
    if(matchedSlug){
      var reader=new FileReader();
      reader.onload=function(ev){
        if(!imgs[matchedSlug]) imgs[matchedSlug]=[];
        imgs[matchedSlug].push(ev.target.result);
        if(imgs[matchedSlug].length>3) imgs[matchedSlug].length=3;
        matched++;
        processFile(idx+1);
      };
      reader.readAsDataURL(file);
    } else {
      unmatched++;
      processFile(idx+1);
    }
  }
  processFile(0);
  e.target.value='';
}

// Drag and drop
var bulkZone=document.getElementById('bulkZone');
bulkZone.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('dragover')});
bulkZone.addEventListener('dragleave',function(){this.classList.remove('dragover')});
bulkZone.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('dragover');document.getElementById('bulkFile').files=e.dataTransfer.files;handleBulkUpload({target:document.getElementById('bulkFile')})});

// Export
function exportImages(){
  var imgs=loadImages();
  // Export only file paths (not base64) for portability
  var exportData={};
  for(var slug in imgs){
    exportData[slug]=[];
    for(var i=0;i<imgs[slug].length;i++){
      if(imgs[slug][i]&&imgs[slug][i].startsWith('data:')){
        exportData[slug].push('base64:'+imgs[slug][i].substring(0,50)+'...');
      } else {
        exportData[slug].push(imgs[slug][i]);
      }
    }
  }
  var blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sliding-in-images.json';a.click();
  showToast('Exported '+Object.keys(exportData).length+' topics');
}

// Import
function importImages(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var imgs=loadImages();
      var count=0;
      for(var slug in data){
        if(data[slug]&&data[slug].length>0){
          imgs[slug]=data[slug];
          count++;
        }
      }
      saveImages(imgs);
      renderGrid();
      showToast('Imported '+count+' topics');
    }catch(err){
      showToast('Import failed: '+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

// Clear all
function clearAll(){
  if(!confirm('Clear ALL image assignments? This cannot be undone.')) return;
  localStorage.removeItem('slidingInImages');
  renderGrid();
  showToast('All images cleared');
}

// Toast
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2000);
}

// Init
renderGrid();
</script>
</body>
</html>
