<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<defs>
  <!-- Deep space gradient background -->
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#1a0830"/>
    <stop offset="40%" stop-color="#100030"/>
    <stop offset="100%" stop-color="#080020"/>
  </radialGradient>
  <!-- Purple glow -->
  <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </radialGradient>
  <!-- Green accent glow -->
  <radialGradient id="glow2" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#20e080" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#20e080" stop-opacity="0"/>
  </radialGradient>
  <!-- Gold highlight -->
  <radialGradient id="glow3" cx="50%" cy="50%" r="30%">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <!-- String/particle glow filter -->
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="blurBg" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="20"/>
  </filter>
  <!-- Fretboard wood texture pattern -->
  <pattern id="wood" x="0" y="0" width="4" height="200" patternUnits="userSpaceOnUse">
    <rect width="4" height="200" fill="#1a0a08"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#2a1810" stroke-width=".5" opacity=".3"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="1920" height="1080" fill="url(#bg)"/>

<!-- Large ambient glow orbs -->
<ellipse cx="300" cy="300" rx="500" ry="400" fill="url(#glow1)" filter="url(#blurBg)"/>
<ellipse cx="1600" cy="700" rx="400" ry="350" fill="url(#glow2)" filter="url(#blurBg)"/>
<ellipse cx="960" cy="540" rx="600" ry="500" fill="url(#glow3)" filter="url(#blurBg)" opacity=".5"/>

<!-- Subtle grid lines (fretboard-like) -->
<g opacity="0.04" stroke="#a855f7" stroke-width=".5">
  <line x1="0" y1="200" x2="1920" y2="200"/>
  <line x1="0" y1="400" x2="1920" y2="400"/>
  <line x1="0" y1="600" x2="1920" y2="600"/>
  <line x1="0" y1="800" x2="1920" y2="800"/>
  <line x1="320" y1="0" x2="320" y2="1080"/>
  <line x1="640" y1="0" x2="640" y2="1080"/>
  <line x1="960" y1="0" x2="960" y2="1080"/>
  <line x1="1280" y1="0" x2="1280" y2="1080"/>
  <line x1="1600" y1="0" x2="1600" y2="1080"/>
</g>

<!-- Curved string lines (like guitar strings / string theory) -->
<g filter="url(#glow)" opacity="0.6">
  <path d="M0,180 C300,175 500,185 960,180 C1420,175 1620,185 1920,180" fill="none" stroke="#a855f7" stroke-width="1"/>
  <path d="M0,280 C400,270 700,290 960,275 C1220,260 1520,285 1920,280" fill="none" stroke="#20e080" stroke-width=".8"/>
  <path d="M0,380 C200,375 600,385 960,378 C1320,371 1720,385 1920,380" fill="none" stroke="#6366f1" stroke-width="1.2"/>
  <path d="M0,480 C350,472 650,488 960,478 C1270,468 1570,488 1920,480" fill="none" stroke="#a855f7" stroke-width=".8"/>
  <path d="M0,580 C250,575 550,585 960,582 C1370,579 1670,585 1920,580" fill="none" stroke="#20e080" stroke-width="1"/>
  <path d="M0,680 C400,672 700,688 960,678 C1220,668 1520,688 1920,680" fill="none" stroke="#fbbf24" stroke-width=".6"/>
  <path d="M0,780 C300,775 600,785 960,780 C1320,775 1620,785 1920,780" fill="none" stroke="#a855f7" stroke-width=".8"/>
  <path d="M0,880 C350,872 650,888 960,878 C1270,868 1570,888 1920,880" fill="none" stroke="#20e080" stroke-width="1"/>
</g>

<!-- Glowing nodes at string intersections -->
<g filter="url(#softGlow)">
  <circle cx="320" cy="280" r="3" fill="#20e080"/>
  <circle cx="640" cy="180" r="2.5" fill="#a855f7"/>
  <circle cx="960" cy="378" r="3" fill="#fbbf24"/>
  <circle cx="1280" cy="280" r="2.5" fill="#20e080"/>
  <circle cx="1600" cy="180" r="3" fill="#a855f7"/>
  <circle cx="480" cy="478" r="2" fill="#6366f1"/>
  <circle cx="800" cy="582" r="3" fill="#20e080"/>
  <circle cx="1120" cy="678" r="2.5" fill="#fbbf24"/>
  <circle cx="1440" cy="780" r="2" fill="#a855f7"/>
  <circle cx="1760" cy="880" r="3" fill="#20e080"/>
  <circle cx="200" cy="678" r="2" fill="#fbbf24"/>
  <circle cx="500" cy="878" r="2.5" fill="#6366f1"/>
</g>

<!-- Floating particles / stars -->
<g opacity="0.7">
  <circle cx="100" cy="50" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="250" cy="120" r="1" fill="#a855f7" opacity=".5"/>
  <circle cx="450" cy="80" r="1.2" fill="#fff" opacity=".4"/>
  <circle cx="700" cy="30" r="1.5" fill="#20e080" opacity=".4"/>
  <circle cx="850" cy="100" r="1" fill="#fff" opacity=".5"/>
  <circle cx="1050" cy="60" r="1.3" fill="#fbbf24" opacity=".3"/>
  <circle cx="1200" cy="40" r="1" fill="#fff" opacity=".6"/>
  <circle cx="1400" cy="90" r="1.5" fill="#a855f7" opacity=".4"/>
  <circle cx="1650" cy="50" r="1" fill="#fff" opacity=".5"/>
  <circle cx="1800" cy="110" r="1.2" fill="#20e080" opacity=".4"/>
  <circle cx="150" cy="950" r="1.5" fill="#fff" opacity=".5"/>
  <circle cx="400" cy="1000" r="1" fill="#a855f7" opacity=".4"/>
  <circle cx="650" cy="920" r="1.3" fill="#fff" opacity=".6"/>
  <circle cx="900" cy="980" r="1" fill="#fbbf24" opacity=".3"/>
  <circle cx="1100" cy="1020" r="1.5" fill="#20e080" opacity=".4"/>
  <circle cx="1350" cy="950" r="1" fill="#fff" opacity=".5"/>
  <circle cx="1550" cy="1000" r="1.2" fill="#a855f7" opacity=".4"/>
  <circle cx="1800" cy="930" r="1.5" fill="#fff" opacity=".6"/>
</g>

<!-- Larger constellation-like stars -->
<g filter="url(#glow)" opacity="0.5">
  <circle cx="180" cy="450" r="2" fill="#fff"/>
  <circle cx="420" cy="520" r="2.5" fill="#a855f7"/>
  <circle cx="750" cy="350" r="2" fill="#fff"/>
  <circle cx="1080" cy="620" r="2.5" fill="#20e080"/>
  <circle cx="1300" cy="420" r="2" fill="#fff"/>
  <circle cx="1580" cy="550" r="2.5" fill="#a855f7"/>
  <circle cx="1750" cy="320" r="2" fill="#fbbf24"/>
</g>

<!-- Subtle fractal-like branching patterns in corners -->
<g opacity="0.06" stroke="#a855f7" stroke-width=".8" fill="none">
  <path d="M0,0 C50,100 100,150 80,250 C60,350 120,400 100,500"/>
  <path d="M1920,0 C1870,100 1820,150 1840,250 C1860,350 1800,400 1820,500"/>
  <path d="M0,1080 C50,980 100,930 80,830 C60,730 120,680 100,580"/>
  <path d="M1920,1080 C1870,980 1820,930 1840,830 C1860,730 1800,680 1820,580"/>
</g>

<!-- Vignette overlay -->
<radialGradient id="vignette" cx="50%" cy="50%" r="60%">
  <stop offset="60%" stop-color="transparent"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
</radialGradient>
<rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>