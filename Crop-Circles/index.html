<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Circles Font</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: #0a0a1a;
        color: #20e080;
        font-family: 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    h1 {
        font-size: 24px;
        margin: 20px 0 8px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #20e080;
    }
    .subtitle {
        font-size: 13px;
        color: #5a7;
        margin-bottom: 24px;
    }
    /* Glyph grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
        gap: 12px;
        max-width: 720px;
        width: 100%;
        margin-bottom: 32px;
    }
    .glyph-card {
        background: rgba(32,224,128,.04);
        border: 1px solid rgba(32,224,128,.15);
        border-radius: 10px;
        padding: 12px 8px 8px;
        text-align: center;
        transition: border-color .2s;
    }
    .glyph-card:hover {
        border-color: #20e080;
        background: rgba(32,224,128,.08);
    }
    .glyph-card svg {
        width: 48px;
        height: 48px;
        display: block;
        margin: 0 auto 6px;
    }
    .glyph-card .label {
        font-size: 14px;
        font-weight: 700;
        color: #20e080;
        letter-spacing: 1px;
    }
    /* Typing demo */
    .demo-section {
        width: 100%;
        max-width: 720px;
        margin-bottom: 40px;
    }
    .demo-section h2 {
        font-size: 16px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a7;
        margin-bottom: 12px;
    }
    textarea {
        width: 100%;
        background: rgba(32,224,128,.04);
        border: 1px solid rgba(32,224,128,.2);
        border-radius: 10px;
        color: #20e080;
        font-size: 14px;
        padding: 14px 16px;
        resize: vertical;
        min-height: 60px;
        font-family: inherit;
        outline: none;
        transition: border-color .2s;
    }
    textarea:focus { border-color: #20e080; }
    textarea::placeholder { color: rgba(32,224,128,.3); }
    .output {
        margin-top: 12px;
        background: rgba(32,224,128,.02);
        border: 1px solid rgba(32,224,128,.1);
        border-radius: 10px;
        padding: 16px;
        min-height: 72px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: flex-start;
    }
    .output svg {
        width: 52px;
        height: 52px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 8px rgba(32,224,128,.15));
    }
    .output .space {
        width: 18px;
    }
    .output .unknown {
        width: 52px;
        height: 52px;
        border: 1px dashed rgba(32,224,128,.2);
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(32,224,128,.25);
        font-size: 20px;
    }
</style>
</head>
<body>

<p class="subtitle">A — Z symbol set &bull; 26 glyphs</p>

<div class="grid" id="grid"></div>

<script>
    // Build glyph grid
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const grid = document.getElementById('grid');
    letters.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'glyph-card';
        card.innerHTML = `
            <svg><use href="#cc-${ch}"></use></svg>
            <div class="label">${ch}</div>
        `;
        grid.appendChild(card);
    });

    // Live typing demo
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    function render() {
        const text = input.value.toUpperCase();
        let html = '';
        for (const ch of text) {
            if (ch === ' ') {
                html += '<span class="space"></span>';
            } else if (letters.includes(ch)) {
                html += `<svg><use href="#cc-${ch}"></use></svg>`;
            } else {
                html += `<span class="unknown">${ch}</span>`;
            }
        }
        output.innerHTML = html;
    }
    input.addEventListener('input', render);
    render();
</script>
