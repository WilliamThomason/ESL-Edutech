<html lang="en">
<head>
<meta charset="UTF-8">

<title>Natural World — Speaking Lesson | Eloquenta</title>

<link rel="stylesheet" href="../Curriculum/eloquent-branding.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;padding-top:48px}
.slide{display:none;width:100vw;height:100vh;position:relative;flex-direction:column;justify-content:center;align-items:center;padding-top:48px}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.28) saturate(1.2)}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 40%,rgba(0,0,0,.55) 100%)}
.slide-content{position:relative;z-index:2;max-width:820px;padding:40px;text-align:center}
.slide-number{position:absolute;top:68px;right:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;border:1px solid}

/* Question number circle */
.q-circle{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin:0 auto 16px;
  border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;
  backdrop-filter:blur(4px);
}
.q-circle.accent{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.3);color:#22d3ee}
.q-circle.warm{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.3);color:#fbbf24}

.slide h1{font-size:3rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.slide h2{font-size:1.4rem;font-weight:600;line-height:1.4;margin-bottom:16px;color:rgba(255,255,255,.9)}
.slide p{font-size:1.05rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:600px;margin:0 auto}
.vocab-word{border-bottom:2px dotted rgba(34,211,238,.5);cursor:help;color:#22d3ee;font-weight:600;position:relative;transition:border-color .2s}
.vocab-word:hover{border-bottom-color:#22d3ee}
.tt button {
    display:block;margin-top:8px;padding:4px 8px;font-size:10px;
    background:#22d3ee;color:#000;border:none;border-radius:4px;cursor:pointer;width:100%;
}

.vocab-word .tooltip{
  visibility:hidden;opacity:0;
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:#0f172a;border:1px solid #334155;border-radius:10px;
  padding:10px 14px;min-width:200px;max-width:280px;
  font-size:13px;font-weight:400;color:#e2e8f0;line-height:1.5;text-align:left;
  box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;
  transition:opacity .3s,visibility .3s;pointer-events:none
}
.vocab-word .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
.vocab-word .tooltip strong{display:block;color:#22d3ee;font-weight:700;font-size:14px;margin-bottom:3px}
.vocab-word:hover .tooltip{visibility:visible;opacity:1}

.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-dots{display:flex;gap:6px;align-items:center;padding:0 8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#22d3ee;box-shadow:0 0 8px rgba(34,211,238,.4)}
.progress{position:fixed;top:48px;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:10px}
.progress-bar{height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width .5s ease-out;border-radius:0 5px 5px 0;box-shadow:0 0 14px rgba(34,211,238,.4),0 0 6px rgba(167,139,250,.3)}

.q-list{text-align:left;max-width:620px;margin:16px auto 0;display:flex;flex-direction:column;gap:10px}
.q-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;font-size:15px;line-height:1.7;text-align:left}
.q-item .q-text{display:inline}

/* Vocab page */
.vocab-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:640px;margin:20px auto 0;text-align:left}
.vocab-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px}
.vocab-item .v-word{font-size:15px;font-weight:700;color:#22d3ee;margin-bottom:4px}
.vocab-item .v-def{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}

/* Goal tag */
.goal-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter:.8px;margin:0 3px 6px}
.goal-tag.speak{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.goal-tag.listen{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.2)}
.goal-tag.vocab{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}

/* Video placeholder */
.video-placeholder{
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:2px dashed rgba(255,255,255,.15);border-radius:14px;padding:28px;
  text-align:center;max-width:500px;margin:16px auto 0;
}
.video-placeholder .icon{font-size:2.5rem;margin-bottom:8px}
.video-placeholder p{font-size:13px;color:rgba(255,255,255,.4)}

.warmup-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight;700;text-transform:uppercase;background:rgba(52,211,153,.12);color:#34d399;margin-bottom:16px;border:1px solid rgba(52,211,153,.25)}
.slide-footer{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px}
.logo{color:#fff;font-weight:700;letter-spacing:.5px}
.logo .o{color:#22d3ee}
@media(max-width:640px){
  .slide h1{font-size:2rem}
  .slide h2{font-size:1.1rem}
  .slide-content{padding:20px}
  .q-item{font-size:13px;padding:12px 14px}
  .vocab-list{grid-template-columns:1fr}
  .q-circle{width:40px;height:40px;font-size:16px}
}
/* Eloquenta Logo */
  .elo-logo-wrap{display:inline-flex;align-items:center;gap:10px;text-decoration:none;transition:opacity .2s}
  .elo-logo-wrap:hover{text-decoration:none;opacity:.85}
  .elo-logo-wrap .elo-wordmark{font-size:22px;font-weight:700;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;letter-spacing:-.5px;line-height:1;color:#f1f5f9}
  .elo-logo-wrap .elo-wordmark .o{color:#22d3ee}
</style>
</head>

<script>

  {

    isWarmup:true,

  {
    bg:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80",
    cat:"Discussion",catB:"rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.3)",
    title:"Do you prefer being outdoors or indoors?",subtitle:"Give some reasons for your answer.",
    text:"Think about what you enjoy most about your preferred environment. Is it the freedom, the scenery, the activity — or the comfort and convenience? Compare your lifestyle with someone who prefers the opposite.",

var current=0;

function renderSlides(){
  var container=document.getElementById('slides-container');
  var dots=document.getElementById('navDots');
  var html='',dotsHtml='';
  SLIDES.forEach(function(s,i){
    html+='<div class="slide'+(i===0?' active':'')+'" id="slide-'+i+'">';
    html+='<div class="slide-bg" style="background-image:url('+s.bg+')"></div>';
    html+='<span class="slide-number">'+(i+1)+' / '+SLIDES.length+'</span>';
    html+='<div class="slide-content">';

    if(s.isTitle){
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<p>'+s.text+'</p>';
      html+='<p style="font-size:11px;color:rgba(255,255,255,.25);margin-top:12px">💡 Hover over highlighted words to see definitions</p>';
    } else if(s.isAim){
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
      // Goals
      html+='<div style="text-align:left;max-width:560px;margin:20px auto 0">';
      html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter:1px;color:var(--text-dim);margin-bottom:12px">🎯 Conversation Goals</div>';
      (s.goals||[]).forEach(function(g){
        html+='<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)">';
        html+='<span style="font-size:18px;flex-shrink:0">'+g.icon+'</span>';
        html+='<div><div style="font-size:13px;font-weight:700;margin-bottom:2px">'+g.label+'</div><div style="font-size:12px;color:rgba(255,255,255,.45);line-height:1.5">'+g.desc+'</div></div></div>';
      });
      html+='</div>';
      // Key vocab preview
      if(s.vocab&&s.vocab.length){
        html+='<div style="margin-top:20px">';
        html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter:1px;color:var(--text-dim);margin-bottom:10px">📚 Key Vocabulary</div>';
        html+='<div class="vocab-list" style="grid-template-columns:1fr 1fr;gap:8px">';
        s.vocab.forEach(function(v){
          html+='<div class="vocab-item"><div class="v-word">'+v.word+'</div><div class="v-def">'+v.def+'</div></div>';
        });
        html+='</div></div>';
      }
    } else if(s.isWarmup){
      html+='<span class="warmup-badge">🔥 Warm-up</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.warmupQ){
        html+='<div class="q-list">';
        s.warmupQ.forEach(function(q,j){
          html+='<div class="q-item"><div class="q-circle accent" style="width:28px;height:28px;font-size:13px;float:left;margin-right:10px;margin-top:2px">'+(j+1)+'</div><span class="q-text">'+q+'</span></div>';
        });
        html+='</div>';
      }
    } else if(s.isEnd){
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<h2>'+s.subtitle+'</h2>';
      html+='<p>'+s.text+'</p>';

        html+='<div style="text-align:left;max-width:480px;margin:20px auto 0;background:rgba(255,255,255,.04);border-radius:12px;padding:16px 20px;border:1px solid rgba(255,255,255,.06)">';

      html+='<div class="icon">🎬</div>';

      html+='</div>';
    } else {
      // Regular question slide with centered question number circle
      html+='<div class="q-circle accent">'+s.qNum+'</div>';
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.subtitle) html+='<p style="color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:12px">'+s.subtitle+'</p>';
      html+='<p>'+s.text+'</p>';
      if(s.vocab&&s.vocab.length){
        html+='<div style="margin-top:16px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center">';
        s.vocab.forEach(function(v){
          html+='<span style="padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter:.5px;background:rgba(34,211,238,.08);color:#22d3ee;border:1px solid rgba(34,211,238,.15)">'+v.word+'</span>';
        });
        html+='</div>';
      }
    }
    html+='</div>';
    html+='<div class="slide-footer"> <span class="elo-wordmark">El<span class="o">o</span>quenta</span> — Natural World</div>';
    html+='</div>';
    dotsHtml+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goTo('+i+')"></div>';
  });
  container.innerHTML=html;
  dots.innerHTML=dotsHtml;
  updateProgress();
}

function showSlide(n){
  if(n<0||n>=SLIDES.length)return;
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});
  document.getElementById('slide-'+n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current=n;
  updateProgress();
}
function nextSlide(){showSlide(current+1)}
function prevSlide(){showSlide(current-1)}
function goTo(n){showSlide(n)}
function updateProgress(){
  var pct=((current+1)/SLIDES.length)*100;
  document.getElementById('progressBar').style.width=pct+'%';
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide()}
});
renderSlides();
