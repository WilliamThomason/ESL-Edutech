<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Speaking Practice — Eloquenta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../ChromaSkin/chromaskin.css">
<style>
body{font-family:'Inter',system-ui,sans-serif;background:var(--cs-bg);color:var(--cs-text);line-height:1.6;min-height:100vh;margin:0}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
.header{position:sticky;top:0;z-index:100;background:var(--cs-bg);border-bottom:1px solid var(--cs-border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.header-logo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--cs-accent);letter-spacing:1px;text-decoration:none}
.header-logo span{color:var(--cs-text)}
.header-nav{display:flex;gap:8px;flex:1}
.nav-btn{height:32px;padding:0 14px;border-radius:6px;border:1px solid var(--cs-border);background:transparent;color:var(--cs-text-muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--cs-accent);color:var(--cs-accent)}
.nav-btn.active{background:var(--cs-accent-dim);border-color:var(--cs-accent);color:var(--cs-accent)}
.main{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:280px;flex-shrink:0;background:var(--cs-bg2);border-right:1px solid var(--cs-border);overflow-y:auto;max-height:calc(100vh - 57px);position:sticky;top:57px}
.sidebar-inner{padding:16px}
.cat-header{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--cs-accent);padding:8px 0 4px;border-bottom:1px solid var(--cs-border);margin-top:12px}
.cat-header:first-child{margin-top:0}
.topic-link{display:block;padding:6px 8px;color:var(--cs-text-muted);text-decoration:none;font-size:.82rem;border-radius:4px;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic-link:hover{background:var(--cs-accent-dim);color:var(--cs-text)}
.topic-link.active{background:var(--cs-accent-dim);color:var(--cs-accent);font-weight:600}
.topic-count{color:var(--cs-text-dim);font-size:.7rem;margin-left:4px}
.content{flex:1;padding:32px 40px;max-width:800px;margin:0 auto}
.slide-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.slide-title{font-size:1.6rem;font-weight:700;margin:0}
.slide-meta{font-size:.85rem;color:var(--cs-text-muted)}
.slide-controls{display:flex;gap:8px;align-items:center}
.slide-btn{height:36px;padding:0 16px;border-radius:8px;border:1px solid var(--cs-border);background:transparent;color:var(--cs-text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.slide-btn:hover{border-color:var(--cs-accent);color:var(--cs-accent)}
.slide-btn.primary{background:var(--cs-accent);border-color:var(--cs-accent);color:var(--cs-bg)}
.slide-btn.primary:hover{filter:brightness(1.1);box-shadow:0 0 16px var(--cs-accent-glow)}
.slide-btn:disabled{opacity:.3;cursor:not-allowed}
.slide-counter{font-family:'Space Grotesk',sans-serif;font-size:.85rem;color:var(--cs-text-dim);font-weight:600;min-width:60px;text-align:center}
.question-card{background:var(--cs-bg-card);border:1px solid var(--cs-border);border-radius:16px;padding:32px;margin-bottom:24px;min-height:200px;display:flex;flex-direction:column;justify-content:center;transition:all .3s}
.question-card:hover{border-color:var(--cs-border-light);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.question-text{font-size:1.25rem;font-weight:600;line-height:1.5;margin-bottom:16px}
.question-paraphrase{font-size:.95rem;color:var(--cs-text-muted);font-style:italic;padding-left:16px;border-left:3px solid var(--cs-accent)}
.question-number{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--cs-accent);margin-bottom:12px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:24px}
.topic-card{background:var(--cs-bg-card);border:1px solid var(--cs-border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.topic-card:hover{border-color:var(--cs-accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.topic-card h3{font-size:.95rem;font-weight:700;margin:0 0 4px}
.topic-card p{font-size:.78rem;color:var(--cs-text-muted);margin:0}
.cat-section-title{grid-column:1/-1;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--cs-accent);margin:16px 0 0}

/* ChromaSkin Widget */
.cs-widget-wrap{position:fixed;bottom:20px;right:20px;z-index:9999}
.cs-widget-dot{width:44px;height:44px;border-radius:50%;background:var(--cs-accent);color:var(--cs-bg);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 16px var(--cs-accent-glow);transition:all .2s;border:2px solid var(--cs-bg)}
.cs-widget-dot:hover{transform:scale(1.1)}
.cs-widget-panel{width:320px;max-width:90vw;background:var(--cs-bg-card);border:1px solid var(--cs-border);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.4);overflow:hidden;animation:csSlideUp .25s ease}
@keyframes csSlideUp{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.cs-widget-header{padding:12px 16px;background:var(--cs-bg3);border-bottom:1px solid var(--cs-border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.cs-widget-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.cs-widget-close{width:24px;height:24px;border-radius:6px;border:1px solid var(--cs-border);background:var(--cs-bg);color:var(--cs-text-muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cs-widget-body{padding:16px;max-height:60vh;overflow-y:auto}
.cs-section-label{font-size:8px;color:var(--cs-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.cs-preset-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.cs-preset-swatch{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.cs-preset-swatch:hover{transform:scale(1.15)}
.cs-preset-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--cs-bg)}
.cs-preset-swatch.active::after{content:'\2713';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.cs-hue-slider{width:100%;height:12px;border-radius:6px;appearance:none;cursor:pointer;border:none;outline:none;background:linear-gradient(to right,hsl(0,80%,50%),hsl(60,80%,50%),hsl(120,80%,50%),hsl(180,80%,50%),hsl(240,80%,50%),hsl(300,80%,50%),hsl(360,80%,50%));margin-bottom:10px}
.cs-hue-slider::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--cs-bg);box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer}
.cs-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cs-slider-label{font-size:9px;color:var(--cs-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;width:24px}
.cs-slider{flex:1;height:8px;border-radius:4px;appearance:none;cursor:pointer;border:none;outline:none}
.cs-slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--cs-bg);box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer}
.cs-slider-val{font-size:10px;color:var(--cs-accent);font-weight:600;min-width:28px;text-align:right}
.cs-toggle-row{display:flex;align-items:center;justify-content:space-between;margin:10px 0 6px}
.cs-toggle-label{font-size:9px;color:var(--cs-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cs-toggle{width:36px;height:18px;border-radius:9px;border:1px solid var(--cs-border);background:var(--cs-bg3);cursor:pointer;position:relative;transition:all .2s}
.cs-toggle.on{background:var(--cs-accent);border-color:var(--cs-accent)}
.cs-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:1px;left:1px;transition:left .2s}
.cs-toggle.on::after{left:19px}
.cs-actions{display:flex;gap:6px;margin-top:10px}
.cs-action-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--cs-border);background:var(--cs-bg3);color:var(--cs-text-muted);font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.cs-action-btn:hover{border-color:var(--cs-accent);color:var(--cs-accent)}
.cs-action-btn.primary{background:var(--cs-accent);color:var(--cs-bg);border-color:var(--cs-accent)}
.cs-action-btn.primary:hover{filter:brightness(1.1)}
.cs-action-btn.danger{border-color:var(--cs-rose);color:var(--cs-rose)}
.cs-action-btn.danger:hover{background:rgba(251,113,133,.1)}
.saved-themes{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.saved-slot{aspect-ratio:1;border-radius:8px;border:2px solid var(--cs-border);cursor:pointer;position:relative;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--cs-text-dim)}
.saved-slot:hover{border-color:var(--cs-accent)}
.saved-slot.filled{border-color:var(--cs-text-dim)}
.saved-slot .slot-num{position:absolute;top:2px;left:4px;font-size:8px;font-weight:700;color:var(--cs-text-dim)}
.saved-slot .delete-btn{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--cs-rose);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;border:none}
.saved-slot:hover .delete-btn{display:flex}
@media(max-width:700px){.sidebar{display:none}.content{padding:20px 16px}.header{padding:10px 16px}.header-nav{display:none}}
</style>
</head>
<body class="cs-mustard" data-cs-mode="dark">

<div class="header">
  <a href="../index.html" class="header-logo">ELOQUENT<span>A</span></a>
  <div class="header-nav">
    <button class="nav-btn active">Speaking Practice</button>
    <button class="nav-btn" onclick="location.href='reading-practice.html'">Reading</button>
    <button class="nav-btn" onclick="location.href='video-classroom.html'">Video Class</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-inner" id="sidebarInner"><div class="cs-section-label">Topics</div></div>
  </div>
  <div class="content">
    <div id="topicSelector">
      <h1 style="font-size:2rem;font-weight:800;margin-bottom:8px">Speaking Practice</h1>
      <p style="color:var(--cs-text-muted);margin-bottom:24px">Choose a topic to start a conversation slide deck. Questions are randomised each time.</p>
      <div class="topic-grid" id="topicGrid"></div>
    </div>
    <div id="slideView" style="display:none">
      <div class="slide-header">
        <div>
          <div class="slide-meta" id="slideMeta"></div>
          <h2 class="slide-title" id="slideTitle"></h2>
        </div>
        <div class="slide-controls">
          <button class="slide-btn" id="prevBtn" onclick="prevSlide()">&larr; Prev</button>
          <span class="slide-counter" id="slideCounter">1 / 1</span>
          <button class="slide-btn" id="nextBtn" onclick="nextSlide()">Next &rarr;</button>
          <button class="slide-btn primary" onclick="shuffleQuestions()">&#128259; Shuffle</button>
          <button class="slide-btn" onclick="backToTopics()">&times; Close</button>
        </div>
      </div>
      <div class="slide-deck">
        <div class="question-card" id="questionCard">
          <div class="question-number" id="questionNumber"></div>
          <div class="question-text" id="questionText"></div>
          <div class="question-paraphrase" id="questionParaphrase"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cs-widget-wrap" id="csWidgetWrap">
  <div class="cs-widget-dot" onclick="csToggleWidget()" title="Theme">&#127912;</div>
  <div class="cs-widget-panel" id="csWidgetPanel" style="display:none">
    <div class="cs-widget-header" onclick="csToggleWidget()">
      <div class="cs-widget-title">&#127912; ChromaSkin</div>
      <button class="cs-widget-close" onclick="event.stopPropagation();csToggleWidget()">&times;</button>
    </div>
    <div class="cs-widget-body">
      <div class="cs-section-label">Presets</div>
      <div class="cs-preset-grid" id="csPresetGrid"></div>
      <div class="cs-section-label">Custom Hue</div>
      <input type="range" class="cs-hue-slider" id="csHueSlider" min="0" max="360" value="45" oninput="csSetHue(this.value)">
      <div class="cs-slider-row"><span class="cs-slider-label">Sat</span><input type="range" class="cs-slider" id="csSatSlider" min="0" max="100" value="60" oninput="csSetSat(this.value)"><span class="cs-slider-val" id="csSatVal">60%</span></div>
      <div class="cs-slider-row"><span class="cs-slider-label">Lit</span><input type="range" class="cs-slider" id="csLitSlider" min="5" max="95" value="12" oninput="csSetLit(this.value)"><span class="cs-slider-val" id="csLitVal">12%</span></div>
      <div class="cs-toggle-row"><span class="cs-toggle-label">Dark Mode</span><div class="cs-toggle on" id="csModeToggle" onclick="csToggleMode()"></div></div>
      <div class="cs-actions">
        <button class="cs-action-btn primary" onclick="csSave()">&#128190; Save</button>
        <button class="cs-action-btn" onclick="csCopyCSS()">&#128203; CSS</button>
        <button class="cs-action-btn danger" onclick="csReset()">&#128260; Reset</button>
      </div>
      <div class="cs-section-label" style="margin-top:12px">Saved Themes (10 slots)</div>
      <div class="saved-themes" id="savedThemes"></div>
    </div>
  </div>
</div>

var CAT_PARAPHRASES={"Personal Life & Identity": "Who You Are", "Family, Friends & Relationships": "People in Your Life", "Education & Learning": "Learning & Growth", "Work, Money & Business": "Career & Finance", "Food, Health & Lifestyle": "Living Well", "Society & Culture": "The World Around Us", "Science, Technology & Future": "Science & Tomorrow", "Entertainment & Leisure": "Fun & Free Time", "Communication & Social": "Talking & Connecting", "Hypotheticals & Opinions": "Imagine & Decide"};

var currentTopic=null,currentQuestions=[],currentIndex=0;
function init(){buildSidebar();buildTopicGrid();var params=new URLSearchParams(window.location.search);var t=params.get('topic');if(t&&TOPICS[t])loadTopic(t)}
function buildSidebar(){var inner=document.getElementById('sidebarInner');Object.keys(CATEGORIES).forEach(function(cat){var cn=CAT_PARAPHRASES[cat]||cat;var d=document.createElement('div');d.className='cat-header';d.textContent=cn;inner.appendChild(d);CATEGORIES[cat].forEach(function(slug){if(!TOPICS[slug])return;var a=document.createElement('a');a.className='topic-link';a.href='#';a.dataset.slug=slug;a.innerHTML=TOPICS[slug].title+'<span class="topic-count">('+TOPICS[slug].questions.length+')</span>';a.onclick=function(e){e.preventDefault();loadTopic(slug)};inner.appendChild(a)})})}
function buildTopicGrid(){var grid=document.getElementById('topicGrid');Object.keys(CATEGORIES).forEach(function(cat){var cn=CAT_PARAPHRASES[cat]||cat;var h=document.createElement('h3');h.className='cat-section-title';h.textContent=cn;grid.appendChild(h);CATEGORIES[cat].forEach(function(slug){if(!TOPICS[slug])return;var card=document.createElement('div');card.className='topic-card';card.onclick=function(){loadTopic(slug)};var h4=document.createElement('h4');h4.textContent=TOPICS[slug].title;var p=document.createElement('p');p.textContent=TOPICS[slug].questions.length+' questions';card.appendChild(h4);card.appendChild(p);grid.appendChild(card)})})}
function loadTopic(slug){currentTopic=slug;currentQuestions=TOPICS[slug].questions.slice();currentIndex=0;document.getElementById('topicSelector').style.display='none';document.getElementById('slideView').style.display='block';document.getElementById('slideTitle').textContent=TOPICS[slug].title;updateSlide();history.replaceState(null,'','?topic='+slug);document.querySelectorAll('.topic-link').forEach(function(a){a.classList.toggle('active',a.dataset.slug===slug)})}
function updateSlide(){var q=currentQuestions[currentIndex];document.getElementById('questionNumber').textContent='Question '+(currentIndex+1)+' of '+currentQuestions.length;document.getElementById('questionText').textContent=q.paraphrased||q.original;document.getElementById('questionParaphrase').textContent=q.paraphrased&&q.paraphrased!==q.original?'Original: '+q.original:'';document.getElementById('slideCounter').textContent=(currentIndex+1)+' / '+currentQuestions.length;document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===currentQuestions.length-1}
function prevSlide(){if(currentIndex>0){currentIndex--;updateSlide()}}
function nextSlide(){if(currentIndex<currentQuestions.length-1){currentIndex++;updateSlide()}}
function shuffleQuestions(){for(var i=currentQuestions.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=currentQuestions[i];currentQuestions[i]=currentQuestions[j];currentQuestions[j]=t}currentIndex=0;updateSlide()}
function backToTopics(){currentTopic=null;document.getElementById('topicSelector').style.display='block';document.getElementById('slideView').style.display='none';history.replaceState(null,'','?');document.querySelectorAll('.topic-link').forEach(function(a){a.classList.remove('active')})}
document.addEventListener('keydown',function(e){if(!currentTopic)return;if(e.key==='ArrowLeft')prevSlide();if(e.key==='ArrowRight'||e.code==='Space'){e.preventDefault();nextSlide()}if(e.key==='r'||e.key==='R')shuffleQuestions()});

var widgetOpen=false;var savedThemes=JSON.parse(localStorage.getItem('cs_saved_themes')||'[]');while(savedThemes.length<10)savedThemes.push(null);
function csToggleWidget(){widgetOpen=!widgetOpen;document.getElementById('csWidgetPanel').style.display=widgetOpen?'block':'none';document.getElementById('csWidgetDot').style.display=widgetOpen?'none':'flex';if(widgetOpen)updateWidgetFromState()}
function updateWidgetFromState(){var s=ChromaSkin.getState();document.getElementById('csHueSlider').value=s.h;document.getElementById('csSatSlider').value=s.s;document.getElementById('csSatVal').textContent=s.s+'%';document.getElementById('csLitSlider').value=s.l;document.getElementById('csLitVal').textContent=s.l+'%';document.getElementById('csModeToggle').className='cs-toggle'+(s.mode==='dark'?' on':'');renderPresets();renderSavedThemes()}
function csSetHue(v){ChromaSkin.setHue(parseInt(v));renderPresets()}
function csSetSat(v){ChromaSkin.setSat(parseInt(v));document.getElementById('csSatVal').textContent=v+'%';renderPresets()}
function csSetLit(v){ChromaSkin.setLit(parseInt(v));document.getElementById('csLitVal').textContent=v+'%';renderPresets()}
function csToggleMode(){ChromaSkin.toggleMode();updateWidgetFromState()}
var PRESETS=[{n:'midnight',h:220,s:15,l:8,c:'hsl(220,60%,40%)'},{n:'mustard',h:45,s:60,l:12,c:'hsl(45,80%,45%)'},{n:'burgundy',h:350,s:45,l:10,c:'hsl(350,65%,40%)'},{n:'forest',h:140,s:35,l:10,c:'hsl(145,50%,35%)'},{n:'ocean',h:200,s:50,l:12,c:'hsl(200,65%,40%)'},{n:'violet',h:270,s:40,l:10,c:'hsl(270,55%,45%)'},{n:'charcoal',h:220,s:5,l:8,c:'hsl(220,15%,30%)'},{n:'classic',h:220,s:5,l:95,c:'hsl(220,10%,85%)'}];
function renderPresets(){var g=document.getElementById('csPresetGrid');var s=ChromaSkin.getState();g.innerHTML='';PRESETS.forEach(function(p){var d=document.createElement('div');d.className='cs-preset-swatch';d.style.background=p.c;if(Math.abs(p.h-s.h)<10&&Math.abs(p.s-s.s)<10)d.classList.add('active');d.onclick=function(){ChromaSkin.setPreset(p.n);updateWidgetFromState()};d.title=p.n;g.appendChild(d)})}
function csSave(){var idx=savedThemes.indexOf(null);if(idx===-1)idx=0;var s=ChromaSkin.getState();savedThemes[idx]={h:s.h,s:s.s,l:s.l,mode:s.mode};localStorage.setItem('cs_saved_themes',JSON.stringify(savedThemes));renderSavedThemes()}
function csDeleteSlot(idx){savedThemes[idx]=null;localStorage.setItem('cs_saved_themes',JSON.stringify(savedThemes));renderSavedThemes()}
function renderSavedThemes(){var el=document.getElementById('savedThemes');el.innerHTML='';savedThemes.forEach(function(t,i){var d=document.createElement('div');d.className='saved-slot'+(t?' filled':'');if(t){d.style.background='hsl('+t.h+','+t.s+'%,'+t.l+'%)';d.onclick=function(){ChromaSkin.setHue(t.h);ChromaSkin.setSat(t.s);ChromaSkin.setLit(t.l);ChromaSkin.setMode(t.mode);updateWidgetFromState()}}else{d.textContent='Empty'}var n=document.createElement('span');n.className='slot-num';n.textContent=i+1;d.appendChild(n);if(t){var del=document.createElement('button');del.className='delete-btn';del.textContent='\2715';del.onclick=function(e){e.stopPropagation();csDeleteSlot(i)};d.appendChild(del)}el.appendChild(d)})}
function csCopyCSS(){var css=ChromaSkin.exportCSS();if(navigator.clipboard)navigator.clipboard.writeText(css)}
function csReset(){ChromaSkin.reset();updateWidgetFromState()}
init();
