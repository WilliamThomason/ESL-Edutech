kground:rgba(52,211,153,.12);color:#34d399;margin-bottom:16px;border:1px solid rgba(52,211,153,.25)}.progress{position:fixed;top:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:10px}.progress-bar{height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width .5s ease-out;border-radius:0 5px 5px 0;box-shadow:0 0 14px rgba(34,211,238,.4),0 0 6px rgba(167,139,250,.3)}.slide-footer{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px}.logo{color:#fff;font-weight:700}.logo .o{color:#22d3ee}@media(max-width:640px){.slide h1{font-size:2rem}.slide h2{font-size:1.1rem}.slide-content{padding:20px}.q-item{font-size:13px}}

var SLIDES=[
  {bg:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1920&q=80",cat:"Speaking Lesson",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",title:"Education & Learning",subtitle:"",text:"Discuss school experiences, teaching methods, online learning, and language learning strategies."},
  {bg:"https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=1920&q=80",cat:"Warm-up",catB:"rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25)",title:"Your school days",subtitle:"",isWarmup:true,warmupQ:["What was your favorite subject at school? Why?","Did you have a favorite teacher? What made them special?","What is one thing you would change about your school experience?"]},
  {bg:"https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1920&q=80",cat:"School Experiences",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",title:"Looking back at school",subtitle:"",questions:["Describe your <span class='vocab-word'>schooling<span class='tt'><strong>schooling</strong><br>The education you receive at school; the process of being taught.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span>. Did you attend public or private school?","What was the <span class='vocab-word'>grading system<span class='tt'><strong>grading system</strong><br>The method teachers use to evaluate student work, such as letters, percentages, or points.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> like? Was it stressful for you?","Did you participate in any <span class='vocab-word'>extracurricular activities<span class='tt'><strong>extracurricular activities</strong><br>Activities done outside regular lessons, such as sports teams, clubs, or music groups.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span>? Which ones?","Do you think your school prepared you well for adult life? What was missing?"]},
  {bg:"https://images.unsplash.com/photo-1577896851231-70ef18881754?w=1920&q=80",cat:"Teaching Methods",catB:"rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.3)",title:"How should we teach and learn?",subtitle:"",questions:["Do you prefer <span class='vocab-word'>traditional<span class='tt'><strong>traditional</strong><br>Following long-established methods and practices, like teacher-led lectures and textbook study.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> classrooms or modern, <span class='vocab-word'>interactive<span class='tt'><strong>interactive</strong><br>Involving active participation and communication between teacher and students.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> learning?","Do you think <span class='vocab-word'>standardized testing<span class='tt'><strong>standardized testing</strong><br>Exams that are administered and scored in the same way for all students, like TOEFL or IELTS.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> is a good way to measure learning?","How has <span class='vocab-word'>technology<span class='tt'><strong>technology</strong><br>Digital tools and systems used to enhance learning, such as apps, videos, and online platforms.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> changed the way people learn compared to previous generations?","Should <span class='vocab-word'>homework<span class='tt'><strong>homework</strong><br>Schoolwork that students complete outside of class time, often at home.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> be abolished or is it an essential part of learning?"]},
  {bg:"https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1920&q=80",cat:"Online Learning",catB:"rgba(245,158,11,.15);color:#fbbf24;border-color:rgba(245,158,11,.3)",title:"Digital education & e-learning",subtitle:"",questions:["Have you ever taken an online course? What were the <span class='vocab-word'>advantages<span class='tt'><strong>advantages</strong><br>Benefits or positive aspects of something compared to alternatives.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> and disadvantages?","Do you think online degrees are as <span class='vocab-word'>valuable<span class='tt'><strong>valuable</strong><br>Having great worth, importance, or usefulness — especially in terms of career prospects.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> as traditional university degrees?","What <span class='vocab-word'>self-discipline<span class='tt'><strong>self-discipline</strong><br>The ability to control yourself and make sure you do what you need to do, even when nobody is watching.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> is required to study effectively online? Do you have it?","How do you think artificial intelligence will change education in the next 10 years?"]},
  {bg:"https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1920&q=80",cat:"Language Learning",catB:"rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25)",title:"Learning languages",subtitle:"",questions:["What is the best age to start learning a foreign language? Why?","Do you think it is possible to become truly <span class='vocab-word'>fluent<span class='tt'><strong>fluent</strong><br>Able to speak a language easily, smoothly, and with confidence — like a native speaker.<br><button onclick='translateWord(this)'>Translate to L1</button></span></span> without living in a country where it is spoken?","What is the most effective method you have found for learning vocabulary?","Do you think children learn languages more easily than adults? What gives adults an advantage?"]},

];

function showSlide(n){if(n<0||n>=SLIDES.length)return;document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});document.getElementById('slide-'+n).classList.add('active');document.querySelectorAll('.nav-dot')[n].classList.add('active');current=n;document.getElementById('progressBar').style.width=(((current+1)/SLIDES.length)*100)+'%';}
