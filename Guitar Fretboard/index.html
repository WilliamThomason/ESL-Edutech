<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guitar Fretboard — Scales, Chords & Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#100030;--bg2:#180030;--bg3:#200838;--bg4:#281048;
  --bg-card:rgba(32,8,56,.5);--bg-card2:rgba(24,8,40,.85);
  --border:#281038;--border-light:#381848;
  --text:#f0e0f8;--text-muted:#a080b8;--text-dim:#705080;
  --accent:#20e080;--accent-dim:rgba(32,224,128,.10);
  --accent-glow:rgba(32,224,128,.25);--accent2:#10c060;
  --highlight:#f8b0f0;--highlight-dim:rgba(248,176,240,.12);
  --cyan:#22d3ee;--rose:#fb7185;--amber:#fbbf24;--violet:#a78bfa;
  --neck-dark:#1a0a10;--neck-mid:#2a1818;
  --fret-wire:rgba(192,160,112,.35);--string-color:rgba(200,190,180,.55);
  --pos-dot:rgba(200,160,112,.3);--in-tune:#34d399;--sharp:#fbbf24;--flat:#fb7185;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 50%,rgba(248,176,240,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(32,224,128,.03) 0%,transparent 50%)}

/* ═══ HEADER ═══ */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--highlight));display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px var(--accent-glow)}
.logo-text{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo-text em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sel{height:28px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--accent)}
.sel option{background:var(--bg3)}
.btn{height:28px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.btn-play{border-color:var(--accent);color:var(--accent)}
.btn-play:hover{background:var(--accent);color:#000}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - 52px);position:relative;z-index:1}
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-body{flex:1;overflow-y:auto;padding:8px}
.sidebar-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);padding:8px 10px 4px}
.sidebar-section{margin-bottom:4px}

/* Scale type pills */
.scale-pills{display:flex;flex-wrap:wrap;gap:4px;padding:4px 8px}
.spill{height:22px;padding:0 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:9px;font-weight:600;cursor:pointer;transition:all .1s;white-space:nowrap}
.spill:hover{border-color:var(--highlight);color:var(--highlight)}
.spill.active{background:var(--highlight-dim);border-color:var(--highlight);color:var(--highlight)}

/* Root note buttons */
.roots{display:flex;gap:2px;padding:4px 8px;flex-wrap:wrap}
.root-btn{width:26px;height:24px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:10px;font-weight:700;cursor:pointer;transition:all .1s}
.root-btn:hover{border-color:var(--accent);color:var(--accent)}
.root-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Category tabs */
.cat-tabs{display:flex;gap:2px;padding:2px 8px}
.cat-tab{flex:1;height:22px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .1s}
.cat-tab:hover{color:var(--text-muted)}
.cat-tab.active{background:var(--bg3);border-color:var(--border-light);color:var(--text)}

/* Scale list */
.scale-list{padding:4px 0}
.scale-item{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;transition:background .1s;border-radius:4px;margin:1px 4px}
.scale-item:hover{background:var(--bg3)}
.scale-item.active{background:var(--accent-dim)}
.scale-item .s-name{flex:1;font-size:11px;font-weight:600;color:var(--text-muted)}
.scale-item.active .s-name{color:var(--accent)}
.scale-item .s-int{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

/* ═══ MAIN AREA ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.top-bar .bar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.note-badge{min-width:30px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.note-badge.nr{background:var(--accent);color:#000}
.note-badge.ns{background:var(--highlight-dim);color:var(--highlight);border:1px solid var(--highlight)}
.note-badge.nh{background:rgba(167,139,250,.15);color:var(--violet);border:1px solid var(--violet)}

/* ═══ FRETBOARD ═══ */
.fretboard-area{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.fretboard-wrap{position:relative;width:100%;max-width:1100px}
.fretboard-container{overflow-x:auto;padding-bottom:4px}
.fretboard-inner{position:relative;min-width:900px}

/* Fretboard table */
.fret-table{border-collapse:collapse;width:100%}
.fret-row{display:fretboard-row}
.fret-cell{position:relative;min-width:48px;height:34px;border-right:1px solid var(--fret-wire);border-bottom:1px solid var(--string-color)}
.fret-cell:first-child{border-right:3px solid rgba(200,180,160,.55);min-width:30px}
.fret-cell.nut{border-right:4px solid rgba(220,200,170,.7)}
.fret-num{text-align:center;font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;height:16px;vertical-align:middle}
.string-label{text-align:right;padding:0 6px;font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* Note dots */
.note-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;z-index:2;opacity:0;line-height:1.15}
.note-dot.show{opacity:1}
.note-dot:hover{transform:translate(-50%,-50%) scale(1.25);z-index:5}
.note-dot .nn{font-size:10px;font-weight:800;}
.note-dot .ni{font-size:7px;font-weight:600;opacity:.72;}

/* Note dot colors by interval */
.dot-root{background:var(--accent);color:#000;box-shadow:0 0 6px var(--accent-glow)}
.dot-2nd{background:rgba(6,182,212,.85);color:#000}
.dot-3rd{background:rgba(34,211,238,.85);color:#000}
.dot-4th{background:rgba(52,211,153,.85);color:#000}
.dot-5th{background:rgba(245,158,11,.85);color:#000}
.dot-6th{background:rgba(168,85,247,.85);color:#fff}
.dot-7th{background:rgba(251,113,133,.85);color:#000}
.dot-other{background:var(--highlight);color:#000}

/* Highlighted / filtered notes */
.note-dot.dimmed{opacity:.12}
.note-dot.hidden{display:none}
.note-dot.highlighted{box-shadow:0 0 10px 2px rgba(34,211,238,.6);transform:translate(-50%,-50%) scale(1.15)}

/* Interval label tooltip */
.note-dot .tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg-card2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:8px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;z-index:10;color:var(--text)}
.note-dot:hover .tip{opacity:1}

/* Position dots on fretboard (markers) */
.pos-dots{position:absolute;bottom:0;left:0;right:0;height:12px;pointer-events:none}
.pos-dot-marker{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--pos-dot);transform:translate(-50%,-50%)}

/* Fret position indicators */
.fret-range{display:flex;align-items:center;gap:6px;margin-top:4px}
.fret-range label{font-size:9px;color:var(--text-dim)}
.fret-range input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.fret-range-val{font-size:10px;color:var(--accent);font-weight:700;min-width:40px;text-align:center;font-family:'JetBrains Mono',monospace}

/* ═══ SCALE INFO PANEL ═══ */
.info-panel{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;max-height:160px;overflow-y:auto}
.info-left{display:flex;flex-direction:column;gap:4px}
.info-center{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.info-right{display:flex;flex-direction:column;gap:4px}
.info-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.notes-row{display:flex;gap:4px;flex-wrap:wrap}
.interval-list{display:flex;flex-wrap:wrap;gap:6px}
.int-item{font-size:10px;color:var(--text-muted)}
.int-item span{color:var(--text);font-weight:600}

/* Chord chips */
.chords-row{display:flex;gap:4px;flex-wrap:wrap}
.chord-chip{padding:4px 10px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-muted)}
.chord-chip:hover{border-color:var(--highlight);color:var(--highlight)}

/* Interval highlight toggles */
.interval-toggles{display:flex;gap:3px;flex-wrap:wrap}
.i-toggle{height:20px;padding:0 6px;border-radius:3px;border:1px solid var(--border);background:transparent;color:(--text-dim);font-size:8px;font-weight:700;cursor:pointer;transition:all .1s}
.i-toggle:hover{border-color:var(--text-muted)}
.i-toggle.on-root{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.i-toggle.on-2nd{background:rgba(6,182,212,.2);border-color:rgba(6,182,212,.5);var(--cyan)}
.i-toggle.on-3rd{background:rgba(34,211,238,.2);border-color:rgba(34,211,238,.5);color:var(--cyan)}
.i-toggle.on-4th{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.5);color:var(--green)}
.i-toggle.on-5th{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.5);color:var(--amber)}
.i-toggle.on-6th{background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.5);color:var(--violet)}
.i-toggle.on-7th{background:rgba(251,113,133,.2);border-color:rgba(251,113,133,.5);color:var(--rose)}

/* ═══════════════════════════════════════════
   CHORD DIAGRAM
   ═══════════════════════════════════════════ */
.chord-diagram{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px}
.cd-title{font-size:16px;font-weight:800;color:var(--text)}
.cd-fret-grid{position:relative;width:140px;height:175px;border:1px solid var(--border);border-radius:6px;background:var(--neck-dark);overflow:hidden}
.cd-string{position:absolute;top:0;bottom:0;width:1px;background:var(--string-color);z-index:1}
.cd-fret-line{position:absolute;left:0;right:0;height:1px;background:var(--fret-wire);z-index:1}
.cd-nut{position:absolute;left:0;right:0;height:3px;background:rgba(220,200,170,.7);top:0;z-index:2}
.cd-dot{position:absolute;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;z-index:5;cursor:pointer;transition:all .1s}
.cd-dot:hover{transform:scale(1.3)}
.cd-dot.root{background:var(--accent);color:#000;box-shadow:0 0 6px var(--accent-glow)}
.cd-dot.note{background:var(--highlight);color:#000}
.cd-dot.muted::after{content:'';position:absolute;width:10px;height:1px;background:var(--rose);transform:rotate(45deg)}
.cd-open{position:absolute;top:-18px;font-size:9px;font-weight:700;color:(--text-dim);width:18px;text-align:center}
.cd-fret-num{position:absolute;bottom:-16px;font-size:8px;color:var(--text-dim);width:18px;text-align:center}

/* ═══════════════════════════════════════════
   POSITION SELECTOR
   ═══════════════════════════════════════════ */
.pos-selector{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.pos-btn{height:26px;padding:0 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.pos-btn:hover{border-color:var(--violet);color:var(--violet)}
.pos-btn.active{background:rgba(167,139,250,.15);border-color:var(--violet);color:var(--violet)}

/* ═══════════════════════════════════════════
   TUNING SELECTOR  
   ═══════════════════════════════════════════ */
.tuning-presets{display:flex;gap:3px;flex-wrap:wrap}
.tune-btn{height:22px;padding:0 7px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:9px;font-weight:600;cursor:pointer;transition:all .1s}
.tune-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.tune-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Audio indicator */
.audio-indicator{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-dim)}
.audio-indicator .wave{display:flex;align-items:flex-end;gap:1px;height:10px}
.audio-indicator .wave span{width:2px;background:var(--accent);border-radius:1px;animation:wave .8s ease-in-out infinite}
.audio-indicator .wave span:nth-child(1){height:3px;animation-delay:0s}
.audio-indicator .wave span:nth-child(2){height:7px;animation-delay:.1s}
.audio-indicator .wave span:nth-child(3){height:5px;animation-delay:.2s}
.audio-indicator .wave span:nth-child(4){height:8px;animation-delay:.3s}
.audio-indicator .wave span:nth-child(5){height:4px;animation-delay:.4s}
@keyframes wave{0%,100%{opacity:.3;height:3px}50%{opacity:1;height:8px}}
.audio-indicator.playing .wave span{background:var(--accent)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🎸</div>
    <div class="logo-text"><em>Guitar</em> Fretboard</div>
  </div>
  <div class="header-right">
    <select class="sel" id="tuningSelect" onchange="setTuning(this.value)"></select>
    <select class="sel" id="rootSelect"></select>
    <select class="sel" id="scaleSelect"></select>
    <button class="btn btn-play" onclick="playScale()">▶ Play Scale</button>
    <button class="btn" onclick="playAllNotes()">▶ All Notes</button>
    <button class="btn" id="delayBtn" onclick="toggleDelay()" title="Ping Pong Delay">👽</button>
    <div class="audio-indicator" id="audioInd"><div class="wave"><span></span><span></span><span></span><span></span><span></span></div></div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-body">
      <!-- Root -->
      <div class="sidebar-section">
        <div class="sidebar-title">Root Note</div>
        <div class="roots" id="rootButtons"></div>
      </div>
      <!-- Category -->
      <div class="sidebar-section">
        <div class="sidebar-title">Category</div>
        <div class="cat-tabs">
          <button class="cat-tab active" onclick="filterCat('all',this)">All</button>
          <button class="cat-tab" onclick="filterCat('major',this)">Major</button>
          <button class="cat-tab" onclick="filterCat('minor',this)">Minor</button>
          <button class="cat-tab" onclick="filterCat('modal',this)">Modal</button>
          <button class="cat-tab" onclick="filterCat('penta',this)">Penta</button>
          <button class="cat-tab" onclick="filterCat('other',this)">Other</button>
        </div>
      </div>
      <!-- Scale list -->
      <div class="sidebar-section">
        <div class="sidebar-title">Scales</div>
        <div class="scale-list" id="scaleList"></div>
      </div>
      <!-- Tuning -->
      <div class="sidebar-section">
        <div class="sidebar-title">Tuning</div>
        <div class="tuning-presets" id="tuningPresets"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Top bar: scale info -->
    <div class="top-bar">
      <span class="bar-label">Notes</span>
      <div class="notes-row" id="notesRow"></div>
      <span class="bar-label" style="margin-left:8px">Intervals</span>
      <div class="interval-list" id="intervalsList"></div>
      <span class="bar-label" style="margin-left:8px">Chords</span>
      <div class="chords-row" id="chordsRow"></div>
    </div>

    <!-- Fretboard area -->
    <div class="fretboard-area">
      <!-- Interval toggles -->
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;max-width:1100px">
        <span class="bar-label">Show:</span>
        <div class="interval-toggles" id="intervalToggles"></div>
        <span class="bar-label" style="margin-left:auto">Frets:</span>
        <div class="fret-range" style="margin:0;width:200px">
          <input type="range" id="fretStart" min="0" max="12" value="0" oninput="setFretRange()">
          <span class="fret-range-val" id="fretRangeVal">0 - 12</span>
          <input type="range" id="fretEnd" min="5" max="24" value="12" oninput="setFretRange()">
        </div>
        <button class="btn" onclick="cycleOctave(-1)">- Oct</button>
        <button class="btn" onclick="cycleOctave(1)">+ Oct</button>
      </div>

      <!-- Position selector -->
      <div style="display:flex;align-items:center;gap:6px;width:100%;max-width:1100px">
        <span class="bar-label">Position:</span>
        <div class="pos-selector" id="posSelector"></div>
      </div>

      <!-- Fretboard -->
      <div class="fretboard-wrap">
        <div class="fretboard-container">
          <div class="fretboard-inner">
            <table class="fret-table" id="fretTable"></table>
          </div>
        </div>
      </div>

      <!-- Scale info panel -->
      <div class="info-panel">
        <div class="info-left">
          <div class="info-title">Scale Degrees</div>
          <div id="scaleDegrees"></div>
        </div>
        <div class="info-center">
          <div class="info-title">Chord</div>
          <div class="chord-diagram" id="chordDiagram"></div>
        </div>
        <div class="info-right">
          <div class="info-title">Diatonic Chords</div>
          <div id="diatonicChords"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════
var audioCtx=null;
var delayState={active:false,fadeOutCtx:null,t1:null,t2:null,fdbk:null,dryWet:null};
function getAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click',function(){getAudio()},{once:true});
document.addEventListener('touchstart',function(){getAudio()},{once:true});

function midiToFreq(midi){return 440*Math.pow(2,(midi-69)/12)}

// Warm synth tone (Moog-style)
function playNote(freq,dur,accent){
  var ctx=getAudio();if(!ctx)return;
  var t=ctx.currentTime;dur=dur||1.2;
  var osc1=ctx.createOscillator(),osc2=ctx.createOscillator(),sub=ctx.createOscillator();
  osc1.type='sawtooth';osc1.frequency.setValueAtTime(freq,t);
  osc2.type='sawtooth';osc2.frequency.setValueAtTime(freq*1.003,t);
  sub.type='sine';sub.frequency.setValueAtTime(freq/2,t);
  var mix=ctx.createGain();mix.gain.setValueAtTime(accent?0.4:0.3,t);
  var g1=ctx.createGain();g1.gain.value=0.6;
  var g2=ctx.createGain();g2.gain.value=0.35;
  var gs=ctx.createGain();gs.gain.value=0.3;
  osc1.connect(g1);osc2.connect(g2);sub.connect(gs);
  g1.connect(mix);g2.connect(mix);gs.connect(mix);

  var ff=Math.min(freq*5,8000);

  flt.frequency.exponentialRampToValueAtTime(freq*2.5,t+0.15);
  flt.frequency.exponentialRampToValueAtTime(freq*1.2,t+dur*0.5);
  flt.frequency.exponentialRampToValueAtTime(freq*0.6,t+dur);

  var env=ctx.createGain();
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(1,t+0.005);
  env.gain.exponentialRampToValueAtTime(0.5,t+0.06);

  osc1.stop(t+dur+0.05);osc2.stop(t+dur+0.05);sub.stop(t+dur+0.05);

// ═══════════════════════════════════════════
// PING PONG DELAY ENGINE
// ═══════════════════════════════════════════
// 1/8th note dotted triplet duration (assuming 120 BPM base: 60/120=0.5s per quarter,
// eighth = 0.25s, dotted eighth = 0.375s, dotted triplet eighth = 0.25s)
var DELAY_TIME=0.2508;
var DELAY_FDBK=0.40;
var DELAY_FADE_OUT=3.0;

function ensureDelayChain(){
  var ctx=getAudio();if(!ctx)return;
  if(delayState.inp)return;
  var merger=ctx.createChannelMerger(2);
  var splitter=ctx.createChannelSplitter(2);
  var delayL=ctx.createDelay(2.0);
  var delayR=ctx.createDelay(2.0);
  var fdbkL=ctx.createGain();
  var fdbkR=ctx.createGain();
  var dryWetL=ctx.createGain();
  var dryWetR=ctx.createGain();
  // Left ping: source->delayL->merger(0), feedback delayL->fdbkL->delayL
  delayL.delayTime.setValueAtTime(DELAY_TIME,ctx.currentTime);
  delayR.delayTime.setValueAtTime(DELAY_TIME*0.667,ctx.currentTime);
  fdbkL.gain.setValueAtTime(DELAY_FDBK,ctx.currentTime);
  fdbkR.gain.setValueAtTime(DELAY_FDBK,ctx.currentTime);
  dryWetL.gain.setValueAtTime(0.5,ctx.currentTime);
  dryWetR.gain.setValueAtTime(0.5,ctx.currentTime);
  delayL.connect(fdbkL);fdbkL.connect(delayL);
  delayR.connect(fdbkR);fdbkR.connect(delayR);
  delayL.connect(dryWetL);
  delayR.connect(dryWetR);
  dryWetL.connect(merger,0,0);
  dryWetR.connect(merger,0,1);
  // Stereo input: split to both delays
  splitter.connect(delayL,0);
  splitter.connect(delayR,1);
  delayState.inp=splitter;
  delayState.out=merger;
  delayState.fdbkL=fdbkL;
  delayState.fdbkR=fdbkR;
}

function toggleDelay(){
  var ctx=getAudio();if(!ctx)return;
  var btn=document.getElementById('delayBtn');
  if(!delayState.active){
    ensureDelayChain();
    delayState.active=true;
    if(btn){btn.classList.add('active');btn.style.color='var(--accent)';btn.style.borderColor='var(--accent)';}
    // Bring up feedback smoothly
    var t=ctx.currentTime;
    delayState.fdbkL.gain.cancelScheduledValues(t);
    delayState.fdbkL.gain.setValueAtTime(0,t);
    delayState.fdbkL.gain.linearRampToValueAtTime(DELAY_FDBK,t+0.05);
    delayState.fdbkR.gain.cancelScheduledValues(t);
    delayState.fdbkR.gain.setValueAtTime(0,t);
    delayState.fdbkR.gain.linearRampToValueAtTime(DELAY_FDBK,t+0.05);
  } else {
    delayState.active=false;
    if(btn){btn.classList.remove('active');btn.style.color='';btn.style.borderColor='';}
    // Fade out feedback over 3s so echoes die naturally
    var t=ctx.currentTime;
    delayState.fdbkL.gain.cancelScheduledValues(t);
    delayState.fdbkL.gain.setValueAtTime(delayState.fdbkL.gain.value,t);
    delayState.fdbkL.gain.linearRampToValueAtTime(0,t+DELAY_FADE_OUT);
    delayState.fdbkR.gain.cancelScheduledValues(t);
    delayState.fdbkR.gain.setValueAtTime(delayState.fdbkR.gain.value,t);
    delayState.fdbkR.gain.linearRampToValueAtTime(0,t+DELAY_FADE_OUT);
    // After fade, disconnect delay chain
    setTimeout(function(){
      try{
        if(delayState.inp)delayState.inp.disconnect();
        if(delayState.out)delayState.out.disconnect();
        if(delayState.fdbkL)delayState.fdbkL.disconnect();
        if(delayState.fdbkR)delayState.fdbkR.disconnect();
      }catch(e){}
      delayState.inp=null;delayState.out=null;delayState.fdbkL=null;delayState.fdbkR=null;
    },DELAY_FADE_OUT*1000+100);
  }
}

  var dc=document.getElementById('diatonicChords');dc.innerHTML='';
  var chords=getDiatonicChords(S.root,S.scale);
  chords.forEach(function(c,i){var d=document.createElement('div');d.className='chord-chip';d.textContent=ROMAN[i]+c.suffix;d.onclick=function(){renderChordDiagram(c);var ctx=getAudio();if(!ctx)return;var t=ctx.currentTime;[c.root,(c.root+c.i3)%12,(c.root+c.i5)%12].forEach(function(pc,j){playNote(midiToFreq(pc+60),2.0,j===0);});};dc.appendChild(d);});
  if(chords.length>0)renderChordDiagram(chords[0]);
}

// ═══════════════════════════════════════════
// URL STATE
// ═══════════════════════════════════════════
function updateURL(){var p=new URLSearchParams({root:S.root,scale:S.scale,tuning:S.tuning,fretStart:S.fretStart,fretEnd:S.fretEnd});window.history.replaceState(null,'','?'+p.toString());}
function loadFromURL(){var p=new URLSearchParams(window.location.search);if(p.get('root'))S.root=p.get('root');if(p.get('scale'))S.scale=p.get('scale');if(p.get('tuning'))S.tuning=p.get('tuning');if(p.get('fretStart'))S.fretStart=parseInt(p.get('fretStart'));if(p.get('fretEnd'))S.fretEnd=parseInt(p.get('fretEnd'));}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init(){
  loadFromURL();renderRoots();renderTuningSelect();renderScaleSelect();renderScaleList();
  renderIntervalToggles();renderPosSelector();renderFretboard();updateInfo();updateFretRange();
  var fs=document.getElementById('fretStart');if(fs)fs.value=S.fretStart;
  var fe=document.getElementById('fretEnd');if(fe)fe.value=S.fretEnd;
  var ss=document.getElementById('scaleSelect');if(ss)ss.addEventListener('change',function(){S.scale=this.value;renderScaleList();renderFretboard();updateInfo();updateURL();});
  var rs=document.getElementById('rootSelect');if(rs)rs.addEventListener('change',function(){S.root=this.value;renderRoots();renderFretboard();updateInfo();updateURL();});
}
init();
</script>
