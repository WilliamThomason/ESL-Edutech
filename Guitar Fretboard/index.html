<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guitar Fretboard — Scales, Chords & Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#100030;--bg2:#180030;--bg3:#200838;--bg4:#281048;
  --bg-card:rgba(32,8,56,.5);--bg-card2:rgba(24,8,40,.85);
  --border:#281038;--border-light:#381848;
  --text:#f0e0f8;--text-muted:#a080b8;--text-dim:#705080;
  --accent:#20e080;--accent-dim:rgba(32,224,128,.10);
  --accent-glow:rgba(32,224,128,.25);--accent2:#10c060;
  --highlight:#f8b0f0;--highlight-dim:rgba(248,176,240,.12);
  --cyan:#22d3ee;--rose:#fb7185;--amber:#fbbf24;--violet:#a78bfa;
  --neck-dark:#1a0a10;--neck-mid:#2a1818;
  --fret-wire:rgba(192,160,112,.35);--string-color:rgba(200,190,180,.55);
  --pos-dot:rgba(200,160,112,.3);--in-tune:#34d399;--sharp:#fbbf24;--flat:#fb7185;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:28px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 50%,rgba(248,176,240,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(32,224,128,.03) 0%,transparent 50%)}

/* ═══ HEADER ═══ */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:20px}
.logo-icon{width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--highlight));display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accent-glow);font-size:36px}
.logo-text{font-size:32px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo-text em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sel{height:52px;padding:0 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;outline:none;cursor:pointer}
.sel:focus{border-color:var(--accent)}
.sel option{background:var(--bg3)}
.btn{height:52px;padding:0 20px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:20px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.btn-play{border-color:var(--accent);color:var(--accent)}
.btn-play:hover{background:var(--accent);color:#000}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - 96px);position:relative;z-index:1}
.sidebar{width:460px;min-width:460px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-body{flex:1;overflow-y:auto;padding:14px}
.sidebar-title{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:(--text-dim);padding:14px 18px 8px}
.sidebar-section{margin-bottom:8px}

/* Scale type pills */
.scale-pills{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px}
.spill{height:40px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:16px;font-weight:600;cursor:pointer;transition:all .1s;white-space:nowrap}
.spill:hover{border-color:var(--highlight);color:var(--highlight)}
.spill.active{background:var(--highlight-dim);border-color:var(--highlight);color:var(--highlight)}

/* Root note buttons */
.roots{display:flex;gap:4px;padding:8px 14px;flex-wrap:wrap}
.root-btn{width:46px;height:44px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:19px;font-weight:700;cursor:pointer;transition:all .1s}
.root-btn:hover{border-color:var(--accent);color:var(--accent)}
.root-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Category tabs */
.cat-tabs{display:flex;gap:4px;padding:4px 14px}
.cat-tab{flex:1;height:40px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .1s}
.cat-tab:hover{color:var(--text-muted)}
.cat-tab.active{background:var(--bg3);border-color:var(--border-light);color:var(--text)}

/* Scale list */
.scale-list{padding:8px 0}
.scale-item{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;transition:background .1s;border-radius:8px;margin:2px 8px}
.scale-item:hover{background:var(--bg3)}
.scale-item.active{background:var(--accent-dim)}
.scale-item .s-name{flex:1;font-size:20px;font-weight:600;color:var(--text-muted)}
.scale-item.active .s-name{color:var(--accent)}
.scale-item .s-int{font-size:16px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

/* ═══ MAIN AREA ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.top-bar .bar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.note-badge{min-width:36px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
/* Note badge colors — color wheel per note name */
.note-badge.nr{background:var(--accent);color:#000}
.note-badge.ns{background:var(--highlight-dim);color:var(--highlight);border:1px solid var(--highlight)}
.note-badge.nh{background:rgba(167,139,250,.15);color:var(--violet);border:1px solid var(--violet)}
/* Per-note badge colors */
.note-badge.note-C{background:#e74c3c;color:#fff}
.note-badge.note-Cs{background:#e67e22;color:#000}
.note-badge.note-D{background:#3498db;color:#fff}
.note-badge.note-Ds{background:#7fdbff;color:#000}
.note-badge.note-E{background:#e74c3c;color:#fff}
.note-badge.note-F{background:#f1c40f;color:#000}
.note-badge.note-Fs{background:#ffeaa7;color:#000}
.note-badge.note-G{background:#2ecc71;color:#000}
.note-badge.note-Gs{background:#1abc9c;color:#000}
.note-badge.note-A{background:#9b59b6;color:#fff}
.note-badge.note-As{background:#e91e63;color:#fff}
.note-badge.note-B{background:#fd79a8;color:#000}

/* ═══ FRETBOARD ═══ */
.fretboard-area{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.fretboard-wrap{position:relative;width:100%;max-width:1100px}
.fretboard-container{overflow-x:auto;padding-bottom:6px}
.fretboard-inner{position:relative;min-width:900px}

/* Fretboard table */
.fret-table{border-collapse:collapse;width:100%}
.fret-row{display:fretboard-row}
.fret-cell{position:relative;min-width:56px;height:40px;border-right:1px solid var(--fret-wire);border-bottom:none}
.fret-cell:first-child{border-right:3px solid rgba(200,180,160,.55);min-width:36px}
.fret-cell.nut{border-right:4px solid rgba(220,200,170,.7)}
.fret-row{position:relative;display:table-row}
.fret-row .fret-cell{background:linear-gradient(to bottom,transparent 19px,var(--string-color) 19px,var(--string-color) 20px,transparent 20px)}
.fret-num{text-align:center;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;height:20px;vertical-align:middle}
.string-label{text-align:right;padding:0 8px;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* Note dots */
.note-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;z-index:2;opacity:0;line-height:1.15}
.note-dot.show{opacity:1}
.note-dot:hover{transform:translate(-50%,-50%) scale(1.25);z-index:5}
.note-dot .nn{font-size:12px;font-weight:800}
.note-dot .ni{font-size:9px;font-weight:600;opacity:.72}

/* Note dot colors by note name — color wheel theory */
/* C=Red, C#=Orange-Red, D=Orange, D#=Yellow-Orange, E=Yellow, F=Yellow-Green, F#=Green, G=Teal, G#=Cyan, A=Blue, A#=Violet, B=Magenta */
.dot-C{background:#e74c3c;color:#fff;box-shadow:0 0 8px rgba(231,76,60,.5)}
.dot-Cs{background:#e67e22;color:#000;box-shadow:0 0 8px rgba(230,126,34,.5)}
.dot-D{background:#3498db;color:#fff;box-shadow:0 0 8px rgba(52,152,219,.5)}
.dot-Ds{background:#7fdbff;color:#000;box-shadow:0 0 8px rgba(127,219,255,.5)}
.dot-E{background:#e74c3c;color:#fff;box-shadow:0 0 8px rgba(231,76,60,.5)}
.dot-F{background:#f1c40f;color:#000;box-shadow:0 0 8px rgba(241,196,15,.5)}
.dot-Fs{background:#ffeaa7;color:#000;box-shadow:0 0 8px rgba(255,234,167,.5)}
.dot-G{background:#2ecc71;color:#000;box-shadow:0 0 8px rgba(46,204,113,.5)}
.dot-Gs{background:#1abc9c;color:#000;box-shadow:0 0 8px rgba(26,188,156,.5)}
.dot-A{background:#9b59b6;color:#fff;box-shadow:0 0 8px rgba(155,89,182,.5)}
.dot-As{background:#e91e63;color:#fff;box-shadow:0 0 8px rgba(233,30,99,.5)}
.dot-B{background:#fd79a8;color:#000;box-shadow:0 0 8px rgba(253,121,168,.5)}

/* Highlighted / filtered notes */
.note-dot.dimmed{opacity:.12}
.note-dot.hidden{display:none}
.note-dot.highlighted{box-shadow:0 0 12px 2px rgba(34,211,238,.6);transform:translate(-50%,-50%) scale(1.15)}

/* Interval label tooltip */
.note-dot .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;z-index:10;color:var(--text)}
.note-dot:hover .tip{opacity:1}

/* Position dots on fretboard (markers) */
.pos-dots{position:absolute;bottom:0;left:0;right:0;height:16px;pointer-events:none}
.pos-dot-marker{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--pos-dot);transform:translate(-50%,-50%)}

/* Fret position indicators */
.fret-range{display:flex;align-items:center;gap:8px;margin-top:6px}
.fret-range label{font-size:11px;color:var(--text-dim)}
.fret-range input[type=range]{flex:1;accent-color:var(--accent);height:6px}
.fret-range-val{font-size:13px;color:var(--accent);font-weight:700;min-width:50px;text-align:center;font-family:'JetBrains Mono',monospace}

/* ═══ SCALE INFO PANEL ═══ */
.info-panel{background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;display:grid;grid-template-columns:1fr auto 1fr;gap:16px;min-height:280px;max-height:none;overflow-y:auto}
.info-left{display:flex;flex-direction:column;gap:6px}
.info-center{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;min-width:320px}
.info-right{display:flex;flex-direction:column;gap:6px}
.info-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.notes-row{display:flex;gap:6px;flex-wrap:wrap}
.interval-list{display:flex;flex-wrap:wrap;gap:8px}
.int-item{font-size:13px;color:var(--text-muted)}
.int-item span{color:var(--text);font-weight:600}

/* Chord chips */
.chords-row{display:flex;gap:6px;flex-wrap:wrap}
.chord-chip{padding:6px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-muted)}
.chord-chip:hover{border-color:var(--highlight);color:var(--highlight)}

/* Interval highlight toggles */
.interval-toggles{display:flex;gap:4px;flex-wrap:wrap}
.i-toggle{height:26px;padding:0 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:10px;font-weight:700;cursor:pointer;transition:all .1s}
.i-toggle:hover{border-color:var(--text-muted)}
.i-toggle.on-root{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.i-toggle.on-2nd{background:rgba(6,182,212,.2);border-color:rgba(6,182,212,.5);color:var(--cyan)}
.i-toggle.on-3rd{background:rgba(34,211,238,.2);border-color:rgba(34,211,238,.5);color:var(--cyan)}
.i-toggle.on-4th{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.5);color:var(--in-tune)}
.i-toggle.on-5th{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.5);color:var(--amber)}
.i-toggle.on-6th{background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.5);color:var(--violet)}
.i-toggle.on-7th{background:rgba(251,113,133,.2);border-color:rgba(251,113,133,.5);color:var(--rose)}
.i-toggle.on-8th{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.4);color:var(--cyan)}

/* ═══════════════════════════════════════════
   CHORD DIAGRAM — large, clear, 5-fret view
   ═══════════════════════════════════════════ */
.chord-diagram{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px}
.cd-title{font-size:20px;font-weight:800;color:var(--text)}
.cd-fret-grid{position:relative;width:340px;height:420px;border:1px solid var(--border);border-radius:8px;background:var(--neck-dark);overflow:hidden}
.cd-string{position:absolute;top:0;bottom:0;width:1px;background:var(--string-color);z-index:1}
.cd-fret-line{position:absolute;left:0;right:0;height:1px;background:var(--fret-wire);z-index:1}
.cd-nut{position:absolute;left:0;right:0;height:4px;background:rgba(220,200,170,.7);top:0;z-index:2}
.cd-dot{position:absolute;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;z-index:5;cursor:pointer;transition:all .1s;box-sizing:border-box}
.cd-dot:hover{transform:scale(1.3)}
.cd-dot.root{background:var(--accent);color:#000;box-shadow:0 0 8px var(--accent-glow)}
.cd-dot.note{background:var(--highlight);color:#000}
.cd-dot.muted::after{content:'';position:absolute;width:14px;height:1px;background:var(--rose);transform:rotate(45deg)}
.cd-open{position:absolute;top:-22px;font-size:11px;font-weight:700;color:var(--text-dim);width:24px;text-align:center}
.cd-fret-num{position:absolute;bottom:-20px;font-size:10px;color:var(--text-dim);width:24px;text-align:center}

/* ═══════════════════════════════════════════
   POSITION SELECTOR
   ═══════════════════════════════════════════ */
.pos-selector{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pos-btn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.pos-btn:hover{border-color:var(--violet);color:var(--violet)}
.pos-btn.active{background:rgba(167,139,250,.15);border-color:var(--violet);color:var(--violet)}

/* ═══════════════════════════════════════════
   TUNING SELECTOR  
   ═══════════════════════════════════════════ */
.tuning-presets{display:flex;gap:4px;flex-wrap:wrap}
.tune-btn{height:28px;padding:0 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .1s}
.tune-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.tune-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Audio indicator */
.audio-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.audio-indicator .wave{display:flex;align-items:flex-end;gap:1px;height:14px}
.audio-indicator .wave span{width:3px;background:var(--accent);border-radius:1px;animation:wave .8s ease-in-out infinite}
.audio-indicator .wave span:nth-child(1){height:4px;animation-delay:0s}
.audio-indicator .wave span:nth-child(2){height:10px;animation-delay:.1s}
.audio-indicator .wave span:nth-child(3){height:6px;animation-delay:.2s}
.audio-indicator .wave span:nth-child(4){height:12px;animation-delay:.3s}
.audio-indicator .wave span:nth-child(5){height:5px;animation-delay:.4s}
@keyframes wave{0%,100%{opacity:.3;height:4px}50%{opacity:1;height:10px}}
.audio-indicator.playing .wave span{background:var(--accent)}

/* ═══ ALIEN TUNER POPUP ═══ */
.alien-popup{position:fixed;inset:0;z-index:999;background:rgba(10,14,26,.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.alien-popup.open{display:flex}
.alien-popup-inner{width:90vw;height:90vh;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.alien-popup-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.alien-popup-title{font-size:16px;font-weight:700;color:var(--accent)}
.alien-popup-close{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.alien-popup-close:hover{border-color:var(--rose);color:var(--rose)}
.alien-popup-body{flex:1;overflow:hidden}
.alien-popup-body iframe{width:100%;height:100%;border:none}

/* ═══ THEME PICKER ═══ */
.theme-picker{display:flex;gap:4px}
.theme-btn{width:28px;height:28px;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:all .15s}
.theme-btn:hover{border-color:var(--text-muted)}
.theme-btn.active{border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.theme-purple{background:linear-gradient(135deg,#20e080,#f8b0f0)}
.theme-blue{background:linear-gradient(135deg,#22d3ee,#1e3a5f)}
.theme-green{background:linear-gradient(135deg,#34d399,#065f46)}
@keyframes wave{0%,100%{opacity:.3;height:4px}50%{opacity:1;height:12px}}
.audio-indicator.playing .wave span{background:var(--accent)}

/* ═══════════════════════════════════════════
   ALIEN TUNER POPUP
   ═══════════════════════════════════════════ */
.alien-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
.alien-overlay.open{display:flex}
.alien-popup{position:relative;width:92vw;height:92vh;background:#0a0e1a;border:2px solid var(--border-light);border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(34,211,238,.15)}
.alien-popup iframe{width:100%;height:100%;border:none}
.alien-close{position:absolute;top:12px;right:16px;z-index:10;width:48px;height:48px;border-radius:50%;border:2px solid var(--rose);background:rgba(251,113,133,.15);color:var(--rose);font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.alien-close:hover{background:var(--rose);color:#000}

/* ═══════════════════════════════════════════
   THEME PICKER
   ═══════════════════════════════════════════ */
.theme-picker{height:52px;padding:0 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;outline:none;cursor:pointer;appearance:auto}
.theme-picker:focus{border-color:var(--accent)}
.theme-picker option{background:var(--bg3)}

/* ═══════════════════════════════════════════
   CHORD LIBRARY PANEL — Pickup Music Style
   ═══════════════════════════════════════════ */
/* Chord name indicators above fretboard */
.chord-indicators{display:flex;gap:0;margin-bottom:4px;padding-left:36px;max-width:1100px;width:100%}
.chord-indicator{width:56px;text-align:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:3px 0;border-radius:4px 4px 0 0;cursor:pointer;transition:all .15s}
.chord-indicator:hover{background:rgba(255,255,255,.08)}
.chord-indicator.muted{color:var(--text-dim);font-style:italic}
.chord-indicator.open{color:var(--accent)}

/* Draggable chord dots on fretboard */
.chord-dot-draggable{position:absolute;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;z-index:10;cursor:grab;transition:box-shadow .15s}
.chord-dot-draggable:hover{box-shadow:0 0 12px 2px rgba(34,211,238,.5)}
.chord-dot-draggable.dragging{cursor:grabbing;box-shadow:0 0 16px 4px rgba(34,211,238,.6);z-index:20}
.chord-dot-draggable.root{box-shadow:0 0 8px var(--accent-glow)}
.chord-dot-draggable.muted-dot{width:auto;height:auto;font-size:14px;color:var(--rose);background:transparent}
.chord-dot-draggable.open-dot{width:30px;height:30px;border:2px solid;border-radius:50%;background:transparent}

/* Chord name display */
.chord-name-bar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-top:6px;max-width:1100px;width:100%}
.chord-name-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);white-space:nowrap}
.chord-name-value{font-size:16px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.chord-name-alt{font-size:11px;color:var(--text-dim);margin-left:8px}

/* Reverb slider styling */
.reverb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px rgba(167,139,250,.4);cursor:pointer}
.reverb-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--violet);border:none;box-shadow:0 0 8px rgba(167,139,250,.4);cursor:pointer}


/* ═══════════════════════════════════════════
   CHORD LIBRARY PANEL
   ═══════════════════════════════════════════ */
.chord-lib-btn {
  height:52px;padding:0 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text-muted);font-size:20px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s;
}
.chord-lib-btn:hover{border-color:var(--violet);color:var(--violet)}
.chord-lib-btn.active{background:rgba(167,139,250,.15);border-color:var(--violet);color:var(--violet)}

.chord-lib-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
.chord-lib-overlay.open{display:flex}
.chord-lib-panel{width:900px;max-width:95vw;max-height:85vh;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(167,139,250,.15)}
.chord-lib-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.chord-lib-title{font-size:18px;font-weight:700;color:var(--violet)}
.chord-lib-close{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chord-lib-close:hover{border-color:var(--rose);color:var(--rose)}
.chord-lib-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

.chord-cats{display:flex;gap:4px;flex-wrap:wrap}
.chord-cat{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .1s}
.chord-cat:hover{border-color:var(--violet);color:var(--violet)}
.chord-cat.active{background:rgba(167,139,250,.15);border-color:var(--violet);color:var(--violet)}

.chord-roots{display:flex;gap:4px;flex-wrap:wrap}
.chord-root{width:40px;height:36px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:14px;font-weight:700;cursor:pointer;transition:all .1s}
.chord-root:hover{border-color:var(--accent);color:var(--accent)}
.chord-root.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.chord-detail-wrap{display:flex;gap:16px;min-height:200px}
.chord-detail-left{flex:1;display:flex;flex-direction:column;gap:8px}
.chord-detail-right{width:200px;display:flex;align-items:flex-start;justify-content:center;padding-top:8px}
.chord-detail-name{font-size:28px;font-weight:800;color:var(--text)}
.chord-detail-info{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--text-muted)}
.chord-detail-info span{color:var(--text-dim);font-weight:600}
.chord-voices{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.chord-voice{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:center}
.chord-voice:hover{border-color:var(--violet)}
.chord-voice.active{border-color:var(--violet);background:rgba(167,139,250,.1)}
.chord-voice-name{font-size:13px;font-weight:700;color:var(--text)}
.chord-voice-fret{font-size:11px;color:var(--text-dim);margin-top:2px}

.strum-btn{height:40px;padding:0 20px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;margin-top:8px;align-self:flex-start}
.strum-btn:hover{background:var(--accent);color:#000}
.strum-btn.playing{animation:strum-pulse .3s ease}
@keyframes strum-pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* Chord SVG diagram */
.chord-diag{width:100%;height:auto}
.chord-diag .nut{fill:rgba(220,200,170,.8)}
.chord-diag .fret-line{stroke:var(--fret-wire);stroke-width:.5}
.chord-diag .string-line{stroke:var(--string-color);stroke-width:.5}
.chord-diag .fret-label{fill:var(--text-dim);font-size:8px;font-family:'JetBrains Mono',monospace}
.chord-diag .barre-rect{fill:var(--accent);opacity:.7}
.chord-diag .fret-dot{fill:var(--highlight)}
.chord-diag .fret-dot.root{fill:var(--accent)}
.chord-diag .finger-num{fill:#000;font-size:6px;font-weight:700;text-anchor:middle;dominant-baseline:middle;font-family:'JetBrains Mono',monospace}
.chord-diag .muted-str{fill:var(--rose);font-size:8px;text-anchor:middle}
.chord-diag .open-str{fill:var(--text-muted);font-size:8px;text-anchor:middle}

/* Chord dots on fretboard */
.chord-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;z-index:10;cursor:pointer;transition:all .1s}
.chord-dot.root{background:var(--accent);color:#000;box-shadow:0 0 8px var(--accent-glow)}
.chord-dot.note{background:var(--highlight);color:#000}
.chord-dot.muted{background:transparent;color:var(--rose);font-size:16px}
.chord-dot.open{background:transparent;border:2px solid var(--text-muted);color:transparent}
.barre-indicator{position:absolute;height:10px;border-radius:5px;background:var(--accent);opacity:.6;z-index:9}

/* ═══════════════════════════════════════════
   CHORD DISPLAY — large diagram below fretboard
   ═══════════════════════════════════════════ */
.chord-display-section {
  display:flex;gap:20px;padding:16px 24px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  margin:12px 0;align-items:flex-start;
}
.chord-display-left{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.chord-display-right{width:220px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.cd-big-title{font-size:24px;font-weight:800;color:var(--text);text-align:center}
.cd-big-grid{
  position:relative;width:380px;height:480px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--neck-dark);overflow:hidden;
}
.cd-big-grid .cd-nut{position:absolute;left:0;right:0;height:5px;background:rgba(220,200,170,.8);top:0;z-index:2}
.cd-big-grid .cd-string{position:absolute;top:0;bottom:0;width:1px;background:var(--string-color);z-index:1}
.cd-big-grid .cd-fret-line{position:absolute;left:0;right:0;height:1px;background:var(--fret-wire);z-index:1}
.cd-big-grid .cd-dot{
  position:absolute;width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;z-index:5;cursor:pointer;
  transition:all .1s;box-sizing:border-box;
}
.cd-big-grid .cd-dot:hover{transform:scale(1.25)}
.cd-big-grid .cd-dot.root{background:var(--accent);color:#000;box-shadow:0 0 10px var(--accent-glow)}
.cd-big-grid .cd-dot.note{background:var(--highlight);color:#000}
.cd-big-grid .cd-dot.muted{font-size:18px;color:var(--rose);background:transparent}
.cd-big-grid .cd-dot.open{width:30px;height:30px;border:2px solid var(--text-muted);background:transparent}
.cd-big-grid .cd-finger{position:absolute;font-size:10px;font-weight:700;color:#000;pointer-events:none}
.cd-big-grid .cd-barre{position:absolute;height:12px;border-radius:6px;background:var(--accent);opacity:.5;z-index:4}
.cd-big-grid .cd-fret-label{position:absolute;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.cd-voices-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.cd-voices-list{display:flex;flex-direction:column;gap:4px}
.cd-voice-btn{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text-muted);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;text-align:left;display:flex;justify-content:space-between;gap:8px;
}
.cd-voice-btn:hover{border-color:var(--accent);color:var(--accent)}
.cdvoice-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.cd-strum-row{display:flex;gap:8px;margin-top:4px}
.cd-strum-btn{
  flex:1;height:40px;border-radius:8px;border:1px solid var(--accent);
  background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.cd-strum-btn:hover{background:var(--accent);color:#000}
.cd-arpeggio-btn{
  flex:1;height:40px;border-radius:8px;border:1px solid var(--violet);
  background:rgba(167,139,250,.1);color:var(--violet);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.cd-arpeggio-btn:hover{background:var(--violet);color:#000}

/* ═══════════════════════════════════════════
   SCALE DISPLAY below fretboard
   ═══════════════════════════════════════════ */
.scale-display-section{
  padding:12px 24px;background:var(--bg2);
  border:1px solid var(--border);border-radius:12px;margin:0 0 12px;
}
.sd-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.sd-title{font-size:18px;font-weight:700;color:var(--text)}
.sd-notes{font-size:13px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.sd-play-btn,.sd-arpeggio-btn{
  height:32px;padding:0 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;
}
.sd-play-btn{border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent)}
.sd-play-btn:hover{background:var(--accent);color:#000}
.sd-arpeggio-btn{border:1px solid var(--cyan);background:rgba(34,211,238,.1);color:var(--cyan)}
.sd-arpeggio-btn:hover{background:var(--cyan);color:#000}
.sd-degrees{display:flex;gap:6px;flex-wrap:wrap}
.sd-degree{
  height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text-dim);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:4px;
}
.sd-degree:hover{border-color:var(--highlight);color:var(--highlight)}
.sd-degree .roman{font-weight:800}

/* Scale pattern in info panel */
.scale-pattern-display{

}
.sp-row{display:flex;align-items:center;gap:6px}

}

.sp-bar{width:1px;height:16px;background:var(--border);margin:0 4px}
</style>
</head>

// ═══════════════════════════════════════════
// AUDIO ENGINE — Moog-style synth
// ═══════════════════════════════════════════
var audioCtx=null;
var delayState={active:false,fadeOutCtx:null,t1:null,t2:null,fdbk:null,dryWet:null};
var _moogCurve=null;
var masterGainFret=null;
var compressorFret=null;
// Reverb state (from Alien Tuner)
var reverbMix=0.0;
var reverbConvolver=null;
var reverbDry=null;
var reverbWet=null;

function getMoogCurve(){
  if(!_moogCurve){
    var s=44100;
    _moogCurve=new Float32Array(s);
    for(var i=0;i<s;i++){var x=(i*2)/s-1;_moogCurve[i]=Math.tanh(x*3.0);}
  }
  return _moogCurve;
}

function getAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  if(audioCtx&&!compressorFret){
    compressorFret=audioCtx.createDynamicsCompressor();
    compressorFret.threshold.value=-24;
    compressorFret.knee.value=30;
    compressorFret.ratio.value=12;
    compressorFret.attack.value=0.003;
    compressorFret.release.value=0.25;
    compressorFret.connect(audioCtx.destination);
  }
  if(audioCtx&&!masterGainFret){
    masterGainFret=audioCtx.createGain();
    masterGainFret.gain.value=0.5;
    masterGainFret.connect(compressorFret||audioCtx.destination);
  }
  return audioCtx;
}

// ═══ REVERB ENGINE (from Alien Tuner) ═══
function createReverbIR(){
  var rate=audioCtx.sampleRate;
  var length=rate*2.0;
  var impulse=audioCtx.createBuffer(2,length,rate);
  for(var ch=0;ch<2;ch++){
    var data=impulse.getChannelData(ch);
    for(var i=0;i<length;i++){
      data[i]=(Math.random()*2-1)*Math.pow(1-i/length,2);
    }
  }
  return impulse;
}

function ensureReverb(){
  if(!audioCtx)return;
  if(!reverbConvolver){
    reverbConvolver=audioCtx.createConvolver();
    reverbConvolver.buffer=createReverbIR();
    reverbConvolver.connect(compressorFret||audioCtx.destination);
  }
  if(!reverbDry){
    reverbDry=audioCtx.createGain();
    reverbDry.gain.value=1;
    reverbDry.connect(compressorFret||audioCtx.destination);
  }
  if(!reverbWet){
    reverbWet=audioCtx.createGain();
    reverbWet.gain.value=0;
    reverbWet.connect(reverbConvolver);
  }
}

function setReverb(val){
  reverbMix=val/100;
  var rv=document.getElementById('reverbVal');
  if(rv)rv.textContent=val+'%';
  ensureReverb();
  if(!audioCtx||!reverbDry||!reverbWet)return;
  var now=audioCtx.currentTime;
  if(reverbMix<=0){
    reverbDry.gain.setTargetAtTime(1,now,0.02);
    reverbWet.gain.setTargetAtTime(0,now,0.02);
  }else{
    var angle=reverbMix*Math.PI/2;
    reverbDry.gain.setTargetAtTime(Math.cos(angle),now,0.02);
    reverbWet.gain.setTargetAtTime(Math.sin(angle),now,0.02);
  }
}
document.addEventListener('click',function(){getAudio()},{once:true});
document.addEventListener('touchstart',function(){getAudio()},{once:true});

function midiToFreq(midi){return 440*Math.pow(2,(midi-69)/12)}

// Moog-style synth: dual detuned sawtooth + sub sine + resonant lowpass + soft saturation + pluck envelope
function playNote(freq,dur,accent){
  var ctx=getAudio();if(!ctx)return;
  if(ctx.state==='suspended'){ctx.resume().then(function(){if(ctx.state==='running')playNote(freq,dur,accent);}).catch(function(){});return;}
  if(ctx.state!=='running')return;
  var t=ctx.currentTime;dur=dur||1.2;
  try{
    ensureReverb();
    // Dual detuned sawtooth oscillators (Alien Tuner: 1.002 detune)
    var osc1=ctx.createOscillator();osc1.type='sawtooth';osc1.frequency.setValueAtTime(freq,t);
    var osc2=ctx.createOscillator();osc2.type='sawtooth';osc2.frequency.setValueAtTime(freq*1.002,t);
    // Sub oscillator (sine at half frequency)
    var subOsc=ctx.createOscillator();subOsc.type='sine';subOsc.frequency.setValueAtTime(freq/2,t);
    // Mix gains
    var mixGain=ctx.createGain();mixGain.gain.setValueAtTime(accent?0.45:0.35,t);
    var g1=ctx.createGain();g1.gain.value=0.6;
    var g2=ctx.createGain();g2.gain.value=0.4;
    var gs=ctx.createGain();gs.gain.value=0.35;
    osc1.connect(g1);osc2.connect(g2);subOsc.connect(gs);
    g1.connect(mixGain);g2.connect(mixGain);gs.connect(mixGain);
    // Resonant lowpass filter (Moog-style)
    var filter=ctx.createBiquadFilter();filter.type='lowpass';
    filter.Q.setValueAtTime(4,t);
    var filterFreq=Math.min(freq*6,8000);
    filter.frequency.setValueAtTime(filterFreq,t);
    filter.frequency.exponentialRampToValueAtTime(freq*2.5,t+0.15);
    filter.frequency.exponentialRampToValueAtTime(freq*1.5,t+dur*0.5);
    filter.frequency.exponentialRampToValueAtTime(freq*0.8,t+dur);
    mixGain.connect(filter);
    // Soft saturation (waveshaper)
    var shaper=ctx.createWaveShaper();shaper.curve=getMoogCurve();shaper.oversample='2x';
    filter.connect(shaper);
    // Pluck envelope: fast attack, long decay
    var envGain=ctx.createGain();
    envGain.gain.setValueAtTime(0,t);
    envGain.gain.linearRampToValueAtTime(1,t+0.005);
    envGain.gain.exponentialRampToValueAtTime(0.6,t+0.08);
    envGain.gain.exponentialRampToValueAtTime(0.3,t+0.3);
    envGain.gain.exponentialRampToValueAtTime(0.001,t+dur);
    shaper.connect(envGain);
    // Connect: split to dry and reverb (Alien Tuner pattern)
    if(delayState.active&&delayState.inp){
      envGain.connect(delayState.inp);
      delayState.out.connect(compressorFret||ctx.destination);
    }else{
      envGain.connect(reverbDry);
      envGain.connect(reverbWet);
      // Also connect directly to master if no reverb initialized
      if(!reverbDry) envGain.connect(masterGainFret||compressorFret||ctx.destination);
    }
    osc1.start(t);osc2.start(t);subOsc.start(t);
    osc1.stop(t+dur+0.05);osc2.stop(t+dur+0.05);subOsc.stop(t+dur+0.05);
    var ind=document.getElementById('audioInd');
    if(ind){ind.classList.add('playing');setTimeout(function(){ind.classList.remove('playing')},(dur+0.05)*1000);}
  }catch(e){console.error('Audio play error:',e);}
}

function playScale(){
  var notes=getScaleNotes(S.root,S.scale);
  var ri=noteToRootIndex(S.root);
  var numOctaves=S.numOctaves||1;
  var playNotes=[];
  // Build multi-octave note sequence
  for(var oct=0;oct<numOctaves;oct++){
    for(var i=0;i<notes.length;i++){
      playNotes.push({ni:notes[i],octOffset:oct});
    }
  }
  // Add final octave note (root one octave up from last played root)
  playNotes.push({ni:notes[0],octOffset:numOctaves});
  playNotes.forEach(function(item,i){
    var oct=4+item.octOffset;
    var freq=midiToFreq(item.ni+12+oct*12);
    setTimeout(function(){playNote(freq,0.8,i===0)},i*220);
  });
}
function playAllNotes(){
  var notes=getScaleNotes(S.root,S.scale);
  var shown=notes.length;
  notes.forEach(function(ni,i){
    var oct=4+Math.floor(i/shown);
    var freq=midiToFreq(ni+12+oct*12);
    setTimeout(function(){playNote(freq,1.5)},i*250);
  });
}

function setNumOctaves(n){
  S.numOctaves=n;
  for(var i=1;i<=3;i++){
    var btn=document.getElementById('oct'+i);

      btn.style.borderColor='var(--border)';
    }
  }
}

// ═══════════════════════════════════════════
// PING PONG DELAY ENGINE
// ═══════════════════════════════════════════
var DELAY_TIME=0.2508;
var DELAY_FDBK=0.40;
var DELAY_FADE_OUT=3.0;

function ensureDelayChain(){
  var ctx=getAudio();if(!ctx)return;
  if(delayState.inp)return;
  var merger=ctx.createChannelMerger(2);
  var splitter=ctx.createChannelSplitter(2);
  var delayL=ctx.createDelay(2.0);
  var delayR=ctx.createDelay(2.0);
  var fdbkL=ctx.createGain();
  var fdbkR=ctx.createGain();
  var dryWetL=ctx.createGain();
  var dryWetR=ctx.createGain();
  delayL.delayTime.setValueAtTime(DELAY_TIME,ctx.currentTime);
  delayR.delayTime.setValueAtTime(DELAY_TIME*0.667,ctx.currentTime);
  fdbkL.gain.setValueAtTime(DELAY_FDBK,ctx.currentTime);
  fdbkR.gain.setValueAtTime(DELAY_FDBK,ctx.currentTime);
  dryWetL.gain.setValueAtTime(0.5,ctx.currentTime);
  dryWetR.gain.setValueAtTime(0.5,ctx.currentTime);
  delayL.connect(fdbkL);fdbkL.connect(delayL);
  delayR.connect(fdbkR);fdbkR.connect(delayR);
  delayL.connect(dryWetL);
  delayR.connect(dryWetR);
  dryWetL.connect(merger,0,0);
  dryWetR.connect(merger,0,1);
  splitter.connect(delayL,0);
  splitter.connect(delayR,1);
  delayState.inp=splitter;
  delayState.out=merger;
  delayState.fdbkL=fdbkL;
  delayState.fdbkR=fdbkR;
}

function toggleDelay(){
  var ctx=getAudio();if(!ctx)return;
  var btn=document.getElementById('delayBtn');
  if(!delayState.active){
    ensureDelayChain();
    delayState.active=true;
    if(btn){btn.classList.add('active');btn.style.color='var(--accent)';btn.style.borderColor='var(--accent)';}
    var t=ctx.currentTime;
    delayState.fdbkL.gain.cancelScheduledValues(t);
    delayState.fdbkL.gain.setValueAtTime(0,t);
    delayState.fdbkL.gain.linearRampToValueAtTime(DELAY_FDBK,t+0.05);
    delayState.fdbkR.gain.cancelScheduledValues(t);
    delayState.fdbkR.gain.setValueAtTime(0,t);
    delayState.fdbkR.gain.linearRampToValueAtTime(DELAY_FDBK,t+0.05);
  } else {
    delayState.active=false;
    if(btn){btn.classList.remove('active');btn.style.color='';btn.style.borderColor='';}
    var t=ctx.currentTime;
    delayState.fdbkL.gain.cancelScheduledValues(t);
    delayState.fdbkL.gain.setValueAtTime(delayState.fdbkL.gain.value,t);
    delayState.fdbkL.gain.linearRampToValueAtTime(0,t+DELAY_FADE_OUT);
    delayState.fdbkR.gain.cancelScheduledValues(t);
    delayState.fdbkR.gain.setValueAtTime(delayState.fdbkR.gain.value,t);
    delayState.fdbkR.gain.linearRampToValueAtTime(0,t+DELAY_FADE_OUT);
    setTimeout(function(){
      try{
        if(delayState.inp)delayState.inp.disconnect();
        if(delayState.out)delayState.out.disconnect();
        if(delayState.fdbkL)delayState.fdbkL.disconnect();
        if(delayState.fdbkR)delayState.fdbkR.disconnect();
      }catch(e){}
      delayState.inp=null;delayState.out=null;delayState.fdbkL=null;delayState.fdbkR=null;
    },DELAY_FADE_OUT*1000+100);
  }
}

// ═══════════════════════════════════════════
// 7TH CHORD QUALITY BY SCALE TYPE
// ═══════════════════════════════════════════
function getChordSeventh(scaleType,degree){
  var iv=SCALES[scaleType].intervals;
  var len=iv.length;
  var i3=(iv[(degree+2)%len]-iv[degree]+12)%12;
  var i5=(iv[(degree+4)%len]-iv[degree]+12)%12;
  var i7=(iv[(degree+6)%len]-iv[degree]+12)%12;
  // Determine 7th chord quality from triad + 7th interval
  if(i3===4&&i5===7){
    // Major triad
    if(i7===11)return'maj7';
    if(i7===10)return'7';
    return'7';
  }
  if(i3===3&&i5===7){
    // Minor triad
    if(i7===10)return'7';
    if(i7===11)return'maj7';
    return'7';
  }
  if(i3===3&&i5===6){
    // Diminished triad
    if(i7===9)return'dim7';
    if(i7===10)return'7'; // half-diminished
    return'7';
  }
  if(i3===4&&i5===8){
    // Augmented triad
    if(i7===10)return'7';
    return'7';
  }
  return'7';
}

// ═══ CHORD DOTS ON BOTTOM FRETBOARD ═══
function renderChordDots() {
  var chord = CL.selectedChord;
  if(!chord) return;
  var v = chord.voicings[CL.selectedVoicing||0];
  if(!v) return;
  var frets = v.frets || v.f;
  var fingers = v.fingers || v.g;
  var barre = v.barre || v.b;
  var fretboard = document.getElementById('fretboardInner');
  if(!fretboard) return;
  // Remove old chord dots
  fretboard.querySelectorAll('.chord-dot,.barre-indicator').forEach(function(el){el.remove();});
  var tuning = TUNINGS[S.tuning];
  var strings = tuning.midi.filter(function(m){return m>0});
  var numStrings = strings.length;
  var numFrets = S.fretEnd - S.fretStart + 1;
  var fretW = 100 / numFrets;
  var strH = 100 / numStrings;
  var startFret = S.fretStart;
  // Draw barre
  if(barre) {
    var bf = barre.fr - startFret + 1;
    var by = (bf - 0.5) * strH;
    var bx1 = (numStrings - 1 - barre.to) * fretW;
    var bx2 = (numStrings - 1 - barre.fr0) * fretW;
    var bar = document.createElement('div');
    bar.className = 'barre-indicator';
    bar.style.left = bx1 + '%';
    bar.style.top = by + '%';
    bar.style.width = (bx2 - bx1) + '%';
    fretboard.appendChild(bar);
  }
  // Draw dots
  for(var s=0;s<numStrings;s++) {
    var fret = frets[s];
    if(fret === -1) {
      var dot = document.createElement('div');
      dot.className = 'chord-dot muted';
      dot.style.left = ((numStrings - 1 - s) * fretW + fretW/2) + '%';
      dot.style.top = '-10%';
      dot.textContent = '✕';
      fretboard.appendChild(dot);
    } else if(fret === 0) {
      var dot = document.createElement('div');
      dot.className = 'chord-dot open';
      dot.style.left = ((numStrings - 1 - s) * fretW + fretW/2) + '%';
      dot.style.top = '-10%';
      dot.textContent = '○';
      fretboard.appendChild(dot);
    } else {
      var fretPos = fret - startFret + 1;
      if(fretPos < 0 || fretPos > numFrets) continue;
      var isRoot = (fret % 12) === chord.root;
      var dot = document.createElement('div');
      dot.className = 'chord-dot ' + (isRoot ? 'root' : 'note');
      dot.style.left = ((numStrings - 1 - s) * fretW + fretW/2) + '%';
      dot.style.top = ((fretPos - 0.5) * strH) + '%';
      if(fingers[s] > 0 && !barre) {
        dot.textContent = fingers[s];
      }
      (function(fq){dot.addEventListener('click',function(){playNote(fq);});})(midiToFreq(strings[s] + fret));
      fretboard.appendChild(dot);
    }
  }
}

function renderBigChordDiagram(chord, voicingIdx) {
  if (!chord) return;
  _currentChord = chord;
  _currentVoicing = voicingIdx || 0;
  var v = chord.voicings[_currentVoicing];
  if (!v) return;
  var frets = v.frets || v.f;

  document.getElementById('cdBigTitle').textContent = chord.name;

  var grid = document.getElementById('cdBigGrid');
  grid.innerHTML = '';

  // Nut
  if (startFret <= 1) {
    var nut = document.createElement('div'); nut.className = 'cd-nut'; grid.appendChild(nut);
  }

  // String lines
  for (var s = 0; s < 6; s++) {
    var line = document.createElement('div'); line.className = 'cd-string';
    line.style.left = ((s + 0.5) / 6 * 100) + '%'; grid.appendChild(line);
  }
  // Fret lines
  for (var f = 1; f <= 5; f++) {
    var fl = document.createElement('div'); fl.className = 'cd-fret-line';
    fl.style.top = (f / 5 * 100) + '%'; grid.appendChild(fl);
  }
  // Fret label
  if (startFret > 1) {

    lbl.style.bottom = '-20px'; lbl.style.left = '50%'; lbl.style.transform = 'translateX(-50%)';
    lbl.textContent = startFret + 'fr'; grid.appendChild(lbl);
  }
  // Barre
  if (barre) {
    var bf = barre.fr - startFret + 1;
    var bar = document.createElement('div'); bar.className = 'cd-barre';
    var by = (bf - 0.5) / 5 * 100;
    var bx1 = (5 - barre.to) / 6 * 100 + 0.5;
    var bx2 = (5 - barre.fr0) / 6 * 100 + 0.5;
    bar.style.left = bx1 + '%'; bar.style.top = by + '%';
    bar.style.width = (bx2 - bx1) + '%'; grid.appendChild(bar);
  }
  // Dots
  for (var s = 0; s < 6; s++) {
    var x = (s + 0.5) / 6 * 100;
    var fret = frets[s];
    if (fret === -1) {
      var dot = document.createElement('div'); dot.className = 'cd-dot muted';

      dot.style.left = 'calc(' + x + '% - 13px)'; dot.style.top = '-14px';
      dot.textContent = '✕'; grid.appendChild(dot);
    } else if (fret === 0) {
      var dot = document.createElement('div'); dot.className = 'cd-dot open';
      dot.style.left = 'calc(' + x + '% - 15px)'; dot.style.top = '-14px';
      dot.textContent = '○'; grid.appendChild(dot);
    } else {
      var fretPos = fret - startFret + 1;
      if (fretPos < 1 || fretPos > 5) continue;
      var isRoot = (fret % 12) === chord.root;
      var dot = document.createElement('div'); dot.className = 'cd-dot ' + (isRoot ? 'root' : 'note');
      dot.style.left = 'calc(' + x + '% - 13px)';
      dot.style.top = 'calc(' + ((fretPos - 0.5) / 5 * 100) + '% - 13px)';
      grid.appendChild(dot);
      if (fingers[s] > 0 && !barre) {
        var fn = document.createElement('div'); fn.className = 'cd-finger';
        fn.textContent = fingers[s]; fn.style.left = 'calc(' + x + '% - 5px)';
        fn.style.top = 'calc(' + ((fretPos - 0.5) / 5 * 100) + '% - 6px)';
        grid.appendChild(fn);
      }
    }
  }

  // Render voicings list
  var vl = document.getElementById('cdVoicesList');
  vl.innerHTML = '';
  chord.voicings.forEach(function(vv, i) {
    var btn = document.createElement('button');

    var vName = vv.name || vv.n;
    var vStart = vv.startFret || vv.sf || 1;
    btn.innerHTML = '<span>' + vName + '</span><span style="color:var(--text-dim)">Fret ' + vStart + '</span>';
    (function(idx) {
      btn.addEventListener('click', function() { renderBigChordDiagram(chord, idx); });
    })(i);
    vl.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// RENDER: INFO PANEL
// ═══════════════════════════════════════════
function getChordQuality(scaleType,degree){
  var iv=SCALES[scaleType].intervals;
  var len=iv.length;
  var i3=(iv[(degree+2)%len]-iv[degree]+12)%12;
  var i5=(iv[(degree+4)%len]-iv[degree]+12)%12;
  if(i3===4&&i5===7)return{chord:'maj',suffix:''};
  if(i3===3&&i5===7)return{chord:'min',suffix:'m'};
  if(i3===3&&i5===6)return{chord:'dim',suffix:'dim'};
  if(i3===4&&i5===8)return{chord:'aug',suffix:'aug'};
  return{chord:'?',suffix:'?'};
}

function getDiatonicChords(root,type){
  var notes=getScaleNotes(root,type);
  var chords=[];
  var numDegrees=notes.length;
  for(var i=0;i<numDegrees;i++){
    var rn=notes[i],third=notes[(i+2)%numDegrees],fifth=notes[(i+4)%numDegrees];
    var i3=(third-rn+12)%12,i5=(fifth-rn+12)%12;
    var q=getChordQuality(type,i);
    var sym=noteNames[rn];
    if(q.chord==='min')sym+='m';
    else if(q.chord==='dim')sym+='dim';
    else if(q.chord==='aug')sym+='aug';
    var seventh=getChordSeventh(type,i);
    var isUpper=i===0||i===3||i===4; // I, IV, V are upper in major
    var romanDisplay=ROMAN[i];
    // Uppercase for major/aug, lowercase for minor/dim
    if(q.chord==='min'||q.chord==='dim')romanDisplay=romanDisplay.toLowerCase();
    if(q.chord==='dim')romanDisplay+='°';
    chords.push({name:sym,roman:romanDisplay,root:rn,i3:i3,i5:i5,seventh:seventh,suffix:q.suffix});
  }
  // Add octave (8th degree) chord
  var octRoot=notes[0];
  var octThird=notes[2%numDegrees];
  var octFifth=notes[4%numDegrees];
  var oct7th=notes[6%numDegrees];
  var oi3=(octThird-octRoot+12)%12,oi5=(octFifth-octRoot+12)%12,oi7=(oct7th-octRoot+12)%12;
  var oq=getChordQuality(type,0);
  var osym=noteNames[octRoot];
  if(oq.chord==='min')osym+='m';
  else if(oq.chord==='dim')osym+='dim';
  else if(oq.chord==='aug')osym+='aug';
  var oseventh=getChordSeventh(type,0);
  var oroman=ROMAN[7]; // VIII
  if(oq.chord==='min'||oq.chord==='dim')oroman=oroman.toLowerCase();
  if(oq.chord==='dim')oroman+='°';
  chords.push({name:osym,roman:oroman,root:octRoot,i3:oi3,i5:oi5,seventh:oseventh,suffix:oq.suffix,isOctave:true});
  return chords;
}

function renderChordDiagram(chord){
  if(!chord)return;
  // Also render the big chord diagram below fretboard
  renderBigChordDiagram(chord, 0);
  // Also render in the info panel (smaller)
  var el=document.getElementById('chordDiagram');if(el){
    el.innerHTML='';
    var tuning=TUNINGS[S.tuning];var strings=tuning.midi.filter(function(m){return m>0});var numStrings=strings.length;
    var title=document.createElement('div');title.className='cd-title';title.textContent=chord.name;el.appendChild(title);
    var grid=document.createElement('div');grid.className='cd-fret-grid';
    var nut=document.createElement('div');nut.className='cd-nut';grid.appendChild(nut);
    for(var s=0;s<numStrings;s++){var line=document.createElement('div');line.className='cd-string';line.style.left=((s+0.5)/numStrings*100)+'%';grid.appendChild(line);}
    for(var f=1;f<=5;f++){var fl=document.createElement('div');fl.className='cd-fret-line';fl.style.top=(f/5*100)+'%';grid.appendChild(fl);}
    for(var s=0;s<numStrings;s++){
      var fret = (function(){for(var af=0;af<=5;af++){var pc=(strings[s]+af)%12;if([chord.root,(chord.root+chord.i3)%12,(chord.root+chord.i5)%12].indexOf(pc)>=0)return af;}return -1;})();
      if(fret === -1){var dot=document.createElement('div');dot.className='cd-dot muted';dot.style.left='calc('+((s+0.5)/numStrings*100)+'% - 10px)';dot.style.top='-18px';dot.textContent='✕';grid.appendChild(dot);}
      else if(fret === 0){var dot=document.createElement('div');dot.className='cd-dot open';dot.style.left='calc('+((s+0.5)/numStrings*100)+'% - 10px)';dot.style.top='-18px';dot.textContent='○';grid.appendChild(dot);}
    }
    var chordNotes=[chord.root,(chord.root+chord.i3)%12,(chord.root+chord.i5)%12];
    for(var s=0;s<numStrings;s++){
      var bestFret=-1,bestPC=-1;
      for(var af=1;af<=5;af++){var pc=(strings[s]+af)%12;if(chordNotes.indexOf(pc)>=0){bestFret=af;bestPC=pc;break;}}
      if(bestFret>=0){
        var isRoot=(bestPC===chord.root);
        var dot=document.createElement('div');dot.className='cd-dot '+(isRoot?'root':'note');
        dot.style.left='calc('+((s+0.5)/numStrings*100)+'% - 10px)';
        dot.style.top='calc('+((bestFret-0.5)/5*100)+'% - 10px)';
        var idx=chordNotes.indexOf(bestPC);
        dot.textContent=idx>=0?['R','','','3','','5'][idx]:'';
        (function(fq){dot.onclick=function(){playNote(fq,1.0);};})(midiToFreq(strings[s]+bestFret));
        grid.appendChild(dot);
      }
    }
    el.appendChild(grid);
  }
}

var CH_DB = {
  categories: [
    {id:'major', name:'Major', symbol:''},
    {id:'minor', name:'Minor', symbol:'m'},
    {id:'seventh', name:'7th', symbol:'7'},
    {id:'maj7', name:'Maj7', symbol:'maj7'},
    {id:'min7', name:'Min7', symbol:'m7'},
    {id:'sus', name:'Suspended', symbol:'sus'},
    {id:'dim', name:'Diminished', symbol:'dim'},
    {id:'aug', name:'Augmented', symbol:'aug'},
    {id:'ninth', name:'9th', symbol:'9'},
    {id:'add9', name:'Add9', symbol:'add9'},
  ],
  // Voicings: array of {frets: [eADGBe from low to high, -1=muted, 0=open, 1+=fret], fingers: [...], barre: {fret,from,to} }
  // Standard tuning: E2=string0(low), A2, D3, G3, B3, E4=string5(high)
  voicings: (function(){
    var N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    var TI={
      major:{iv:[0,4,7],vx:[
        {f:[0,3,2,0,1,0],g:[0,3,2,0,1,0],sf:0,n:'Open'},
        {f:[-1,3,2,0,1,0],g:[0,3,2,0,1,0],sf:0,n:'Alt Open'},
        {f:[3,3,5,5,5,3],g:[1,1,3,4,4,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'},
        {f:[8,10,10,9,8,8],g:[1,3,4,2,1,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      minor:{iv:[0,3,7],vx:[
        {f:[-1,3,1,0,1,3],g:[0,3,1,0,2,4],sf:0,n:'Open'},
        {f:[3,3,5,5,4,3],g:[1,1,3,4,2,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'},
        {f:[8,10,10,8,8,8],g:[1,3,4,1,1,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      seventh:{iv:[0,4,7,10],vx:[
        {f:[0,3,2,3,1,0],g:[0,3,2,4,1,0],sf:0,n:'Open'},
        {f:[3,3,5,3,5,3],g:[1,1,3,1,4,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'},
        {f:[8,10,8,9,8,8],g:[1,3,1,2,1,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      maj7:{iv:[0,4,7,11],vx:[
        {f:[0,3,2,0,0,0],g:[0,3,2,0,0,0],sf:0,n:'Open'},
        {f:[3,3,5,4,5,3],g:[1,1,3,2,4,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'},
        {f:[8,10,9,9,8,8],g:[1,3,2,2,1,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      min7:{iv:[0,3,7,10],vx:[
        {f:[-1,3,1,3,1,3],g:[0,2,1,3,1,4],sf:0,n:'Open'},
        {f:[3,3,5,3,4,3],g:[1,1,3,1,2,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'},
        {f:[8,10,8,8,8,8],g:[1,3,1,1,1,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      sus2:{iv:[0,2,7],vx:[
        {f:[0,3,0,0,1,3],g:[0,3,0,0,1,4],sf:0,n:'Open'},
        {f:[3,3,5,5,3,3],g:[1,1,3,4,1,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'}]},
      sus4:{iv:[0,5,7],vx:[
        {f:[0,3,3,0,1,1],g:[0,3,4,0,1,2],sf:0,n:'Open'},
        {f:[3,3,5,5,6,3],g:[1,1,3,4,4,1],b:{fr:3,fr0:0,to:5},sf:3,n:'Barre III'}]},
      dim:{iv:[0,3,6],vx:[
        {f:[-1,3,1,2,1,-1],g:[0,3,1,4,2,0],sf:0,n:'Open'},
        {f:[3,3,4,5,4,-1],g:[1,1,2,4,3,0],sf:3,n:'Barre III'}]},
      aug:{iv:[0,4,8],vx:[
        {f:[0,3,2,1,1,0],g:[0,4,3,1,2,0],sf:0,n:'Open'},
        {f:[3,3,2,1,1,4],g:[2,3,0,0,0,4],sf:1,n:'Moveable'}]},
      ninth:{iv:[0,4,7,10,2],vx:[
        {f:[0,3,2,3,3,0],g:[0,2,1,3,4,0],sf:0,n:'Open'},
        {f:[8,10,8,9,10,8],g:[1,3,1,2,4,1],b:{fr:8,fr0:0,to:5},sf:8,n:'Barre VIII'}]},
      add9:{iv:[0,4,7,2],vx:[
        {f:[0,3,2,0,3,0],g:[0,2,1,0,3,0],sf:0,n:'Open'},
        {f:[3,3,2,0,1,0],g:[2,3,1,0,1,0],sf:1,n:'Alt'}]},
    };
    var SF={major:'',minor:'m',seventh:'7',maj7:'maj7',min7:'m7',sus2:'sus2',sus4:'sus4',dim:'dim',aug:'aug',ninth:'9',add9:'add9'};
    var result={};
    for(var ri=0;ri<12;ri++){
      var diff=ri, rn=N[ri];
      for(var cat in TI){
        var t=TI[cat];
        var name=rn+SF[cat];
        var iv=t.iv.map(function(i){return(i+diff)%12});
        var vx=t.vx.map(function(v){
          var sf=v.sf+(v.sf>0&&diff>0?1:0);
          var b=v.b?{fr:v.b.fr+diff,fr0:v.b.fr0,to:v.b.to}:null;
          return {frets:v.f.map(function(ft){return ft<=0?ft:Math.max(1,ft+diff)}),fingers:v.g,startFret:sf,name:v.n,barre:b};
        });
        var endFr=vx[vx.length-1].startFret;
        result[rn+'-'+cat]={name:name,cat:cat,root:ri,intervals:iv,voicings:vx.slice()};
      }
    }
    return result;
  })()
};

// Transpose chord voicings to any root
function transposeChord(chordKey, newRoot) {
  var parts = chordKey.split('-');
  var cat = parts.slice(1).join('-');
  var oldRoot = NOTE_TO_NI[parts[0]];
  var diff = (newRoot - oldRoot + 12) % 12;
  var newRootName = NI_TO_NOTE[newRoot];
  var newKey = newRootName + '-' + cat;
  if (CH_DB.voicings[newKey]) return CH_DB.voicings[newKey];
  // Transpose on the fly
  var orig = CH_DB.voicings[chordKey];
  if (!orig) return null;
  var transposed = {
    name: newRootName + orig.name.substring(orig.name.indexOf(orig.name.match(/[a-z]/)?1:0)),
    cat: orig.cat, root: newRoot, intervals: orig.intervals.map(function(i){return(i+diff)%12}),
    voicings: orig.voicings.map(function(v){
      var frets = v.frets || v.f;
      var fingers = v.fingers || v.g;
      var startFret = v.startFret || v.sf;
      var barre = v.barre || v.b;
      var name = v.name || v.n;
      var newBarre = barre ? {fr: barre.fr + diff, fr0: barre.fr0, to: barre.to} : null;
      return {
        frets: frets.map(function(f){return f<=0?f:Math.max(1,f+diff)}),
        fingers: fingers, barre: newBarre, startFret: startFret, name: name
      };
    })
  };
  return transposed;
}

function renderChordSVG(chord, voicingIdx, compact) {
  var v = chord.voicings[voicingIdx||0];
  if(!v) return '';
  // Normalize property names (support both old and new format)
  var frets = v.frets || v.f;
  var fingers = v.fingers || v.g;
  var startFret = v.startFret || v.sf || 1;
  var barre = v.barre || v.b;
  var w = compact ? 100 : 160;
  var h = compact ? 80 : 130;
  var padL = 20, padT = 16;
  var stringSpacing = (w - padL - 10) / 5;
  var fretHeight = (h - padT - 10) / 5;
  var svg = '<svg class="chord-diag" viewBox="0 0 '+w+'" style="height:'+h+'px">';

  // Nut or fret label
  if(startFret === 0) {
    svg += '<rect class="nut" x="'+(padL-2)+'" y="'+(padT-2)+'" width="'+(w-padL-4)+'" height="3" rx="1"/>';
  } else {
    svg += '<text class="fret-label" x="'+(padL-8)+'" y="'+(padT+fretHeight/2+3)+'">'+startFret+'fr</text>';
  }

  // Fret lines
  for(var f=0;f<=4;f++) {
    var y = padT + f * fretHeight;
    svg += '<line class="fret-line" x1="'+(padL-2)+'" y1="'+y+'" x2="'+(w-4)+'" y2="'+y+'"/>';
  }

  // String lines
  for(var s=0;s<6;s++) {
    var x = padL + s * stringSpacing;
    svg += '<line class="string-line" x1="'+x+'" y1="'+padT+'" x2="'+x+'" y2="'+(padT+4*fretHeight)+'"/>';
  }

  // Barre
  if(barre) {
    var barreFret = barre.fr - startFret + 1;
    var by = padT + (barreFret-0.5) * fretHeight - 5;
    var bx1 = padL + (5-barre.to) * stringSpacing - 6;
    var bx2 = padL + (5-barre.fr0) * stringSpacing + 6;
    svg += '<rect class="barre-rect" x="'+bx1+'" y="'+by+'" width="'+(bx2-bx1)+'" height="10" rx="5"/>';
  }

  // Dots
  for(var s=0;s<6;s++) {
    var x = padL + s * stringSpacing;
    var fret = frets[s];
    var finger = fingers[s];
    if(fret === -1) {
      svg += '<text class="muted-str" x="'+x+'" y="'+(padT-4)+'">✕</text>';
    } else if(fret === 0) {
      svg += '<text class="open-str" x="'+x+'" y="'+(padT-4)+'">○</text>';
    } else {
      var fretPos = fret - startFret + 1;
      var y = padT + (fretPos-0.5) * fretHeight;
      var isRoot = (fret % 12) === chord.root;
      svg += '<circle class="fret-dot'+(isRoot?' root':'')+'" cx="'+x+'" cy="'+y+'" r="6"/>';
      if(finger > 0 && !barre) {
        svg += '<text class="finger-num" x="'+x+'" y="'+y+'">'+finger+'</text>';
      }
    }
  }

  svg += '</svg>';
  return svg;
}

function selectVoicing(idx) {
  CL.selectedVoicing = idx;
  renderChordDetail();
}

function setChordCat(cat) {
  CL.cat = cat; CL.selectedVoicing = 0;
  renderChordCats(); renderChordDetail();
}

function setChordRoot(root) {
  CL.root = root; CL.selectedVoicing = 0;
  renderChordRoots(); renderChordDetail();
}

function strumChord() {
  var chord = CL.selectedChord;
  if(!chord) return;
  var v = chord.voicings[CL.selectedVoicing||0];
  if(!v) return;
  var frets = v.frets || v.f;

  // Animate button
  var btn = document.querySelector('.strum-btn');
  if(btn) { btn.classList.add('playing'); setTimeout(function(){btn.classList.remove('playing');},600); }

  // Strum from low to high string using Moog synth
  for(var s=0;s<6;s++) {
    var fret = frets[s];
    if(fret <= 0) continue;
    var stringBase = [40,45,50,55,59,64][s]; // MIDI for open strings
    var midi = stringBase + fret;
    var freq = midiToFreq(midi);
    var delay = s * 0.04; // 40ms between strings
    setTimeout(function(f){playNote(f,1.5,false);}, delay*1000, freq);
  }
}

// Close chord overlay on Escape
document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeChordLibrary();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init(){
  loadFromURL();renderRoots();renderTuningSelect();renderScaleSelect();renderScaleList();
  renderIntervalToggles();renderPosSelector();renderFretboard();updateInfo();updateFretRange();
  renderChordCats();renderChordRoots();
  var fs=document.getElementById('fretStart');if(fs)fs.value=S.fretStart;
  var fe=document.getElementById('fretEnd');if(fe)fe.value=S.fretEnd;
  var ss=document.getElementById('scaleSelect');if(ss)ss.addEventListener('change',function(){S.scale=this.value;renderScaleList();renderFretboard();updateInfo();updateURL();});
  var rs=document.getElementById('rootSelect');if(rs)rs.addEventListener('change',function(){S.root=this.value;renderRoots();renderFretboard();updateInfo();updateURL();});
}
init();
</script>
