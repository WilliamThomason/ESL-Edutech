<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKATER DINO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
#wrap{position:relative;width:800px;height:480px;border:4px solid #a78bfa;border-radius:8px;overflow:hidden;box-shadow:0 0 60px rgba(167,139,250,.25)}
canvas{display:block}
#hud{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;pointer-events:none;z-index:5}
.hud-left,.hud-right{display:flex;gap:14px}
.hud-item{color:#e0f2fe;font-size:10px;font-weight:700;text-shadow:2px 2px 0 #000}
.hud-item em{color:#a3e635;font-style:normal}
#powerBar{position:absolute;bottom:0;left:0;right:0;padding:6px 16px;display:flex;gap:8px;pointer-events:none;z-index:5;background:linear-gradient(transparent,rgba(10,14,26,.7));min-height:28px}
.power-slot{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:rgba(0,0,0,.5);font-size:8px;color:var(--text-muted)}
.power-slot.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(163,230,53,.3)}
.power-slot .count{color:#fbbf24}
#overlay{position:absolute;inset:0;background:rgba(10,14,26,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#e0f2fe;text-align:center}
#overlay.hidden{display:none}
#overlay h1{font-size:32px;color:#a78bfa;text-shadow:3px 3px 0 #000;margin-bottom:6px;letter-spacing:4px;line-height:1.2}
#overlay h2{font-size:12px;color:#a3e635;margin-bottom:20px;letter-spacing:2px}
#overlay p{font-size:10px;color:#94a3b8;margin-bottom:4px;line-height:1.7}
#overlay .box{margin-bottom:20px;padding:14px 28px;background:rgba(167,139,250,.06);border:1px solid #2a3a5f;border-radius:8px}
#overlay .box h3{font-size:10px;color:#fbbf24;margin-bottom:8px;letter-spacing:1px}
#overlay .box p{font-size:9px;color:#94a3b8;margin-bottom:3px}
.btn{height:40px;padding:0 28px;background:#a78bfa;color:#0a0e1a;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:2px}
.btn:hover{background:#c4b5fd;transform:translateY(-2px);box-shadow:0 4px 16px rgba(167,139,250,.4)}
.btn:active{transform:translateY(0)}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc" width="800" height="480"></canvas>
<div id="hud" class="hidden">
  <div class="hud-left"><span class="hud-item">SCORE <em id="sc">0</em></span><span class="hud-item">COINS <em id="cn">0</em></span></div>
  <div class="hud-right"><span class="hud-item">TIME <em id="tm">300</em></span><span class="hud-item">LIVES <em id="lv">♥♥♥</em></span></div>
</div>
<div id="powerBar" class="hidden"></div>
<div id="overlay">
  <h1>SKATER DINO</h1>
  <h2>Skateboarder vs Dinosaurs</h2>
  <div class="box"><h3>CONTROLS</h3>
    <p>← → / A D : Move</p>
    <p>↑ / W / SPACE : Jump</p>
    <p>↓ / S : Fast fall</p>
    <p>P : Pause</p>
  </div>
  <p>Stomp dinos. Collect coins. Reach the flag.</p>
  <div class="box" style="margin-top:12px"><h3>POWER-UPS</h3>
    <p>Hit hidden bricks from below</p>
    <p><span style="color:#22d3ee">SIZE</span> · <span style="color:#fbbf24">JUMP</span> · <span style="color:#34d399">SHIELD</span></p>
    <p>Collect 2 of the same = <span style="color:#fb7185">LASER</span></p>
  </div>
  <button class="btn" id="startBtn">START GAME</button>
</div>
</div>
<script>
var C=document.getElementById('gc'),X=C.getContext('2d'),W=800,H=480;
var GRAVITY=0.55,FRICTION=0.82,TILE=32;
var state='start',score=0,coins=0,lives=3,time=300,frame=0;
var camX=0,keys={},ps=[],lasers=[];

// ═══ POWER-UP TYPES ═══
// size=bigger player, jump=higher jump, shield=invincible
// 2 of same type = laser shooting active

// ═══ PLAYER ═══
var P={x:64,y:300,vx:0,vy:0,w:26,h:42,spd:4.2,jp:-10.5,og:false,duck:false,dir:1,f:0,ft:0,inv:0,dead:false,jumpHeld:false,
  pwTimer:0,pwType:null,          // active power-up timer and type
  pwCounts:{size:0,jump:0,shield:0},  // how many of each collected (persists across lives)
  laserActive:false,laserTimer:0};

// ═══ LEVEL ═══
var plats=[],enems=[],cns=[],pups=[],flag;

function buildLevel(){
  plats=[];enems=[];cns=[];pups=[];lasers=[];
  // Ground
  for(var x=0;x<3200;x+=TILE){
    if((x>=416&&x<512)||(x>=1216&&x<1312)||(x>=2016&&x<2112))continue;
    plats.push({x:x,y:H-64,w:TILE,h:64,t:'g'});
  }
  // Floating platforms
  [[200,340,96],[360,280,64],[520,340,96],[720,260,128],[920,200,64],[1060,300,96],[1420,340,64],[1560,260,96],[1760,200,128],[1960,300,64],[2220,260,96],[2420,340,128]].forEach(function(p){
    plats.push({x:p[0],y:p[1],w:p[2],h:24,t:'p'});
  });
  // Visible bricks
  [[600,440],[632,440],[1100,440],[1132,440],[1164,440],[1800,440],[1832,440],[2500,440],[2532,440],[2564,440]].forEach(function(b){
    plats.push({x:b[0],y:b[1],w:32,h:32,t:'b'});
  });
  // Hidden bricks (type 'h') — placed strategically near platforms
  // Power-up type encoded in .pw: 'size', 'jump', 'shield'
  var hiddenBricks=[
    {x:560,y:400,pw:'size'},      // Near first raptor pair
    {x:1100,y:400,pw:'jump'},     // Near T-rex
    {x:1600,y:400,pw:'shield'},   // Mid level
    {x:2100,y:400,pw:'size'},     // After third pit
    {x:2400,y:400,pw:'jump'},     // Later section
    // Above platforms (require platforming skill)
    {x:740,y:220,pw:'shield'},    // On platform near pterodactyl
    {x:1580,y:220,pw:'size'},     // On mid platform
    {x:2240,y:220,pw:'jump'},     // On later platform
  ];
  hiddenBricks.forEach(function(b){
    plats.push({x:b.x,y:b.y,w:32,h:32,t:'h',pw:b.pw,hit:false});
  });
  // Coins
  var coinDefs=[
    [220,300],[260,300],[380,240],[540,300],[580,300],
    [740,220],[780,220],[820,220],[940,160],
    [1080,260],[1120,260],[1440,300],[1580,220],[1620,220],
    [1780,160],[1820,160],[1860,160],[1980,260],
    [2240,220],[2280,220],[2440,300],[2480,300],[2520,300],
    // Above pterodactyls
    [730,170],[770,170],[1430,150],[1470,150],[2230,170],[2270,170]
  ];
  coinDefs.forEach(function(c){cns.push({x:c[0],y:c[1],w:18,h:18,got:false,a:Math.random()*6});});
  // Enemies
  var enemyDefs=[
    {x:350,y:400,t:'r'},{x:550,y:400,t:'r'},
    {x:650,y:400,t:'r'},{x:900,y:400,t:'t'},
    {x:1350,y:400,t:'r'},{x:1500,y:400,t:'t'},{x:1700,y:400,t:'r'},
    {x:2150,y:400,t:'r'},{x:2350,y:400,t:'t'},{x:2550,y:400,t:'r'},
    {x:750,y:200,t:'p'},{x:1450,y:180,t:'p'},{x:2250,y:200,t:'p'}
  ];
  enemyDefs.forEach(function(e){
    enems.push({x:e.x,y:e.y,vx:e.t==='p'?0:-1.5,vy:0,w:e.t==='t'?34:26,h:e.t==='t'?46:e.t==='p'?22:34,t:e.t,alive:true,ft:0,fy:e.y,fd:1});
  });
  flag={x:2850,y:H-64-110,w:14,h:110,trig:false};
}

// ═══ POWER-UPS ═══
var pwColors={size:'#22d3ee',jump:'#fbbf24',shield:'#34d399'};
var pwLabels={size:'BIG',jump:'JUMP',shield:'SHLD'};

function activatePowerUp(type){
  P.pwCounts[type]++;
  // If 2 of same type collected, activate laser
  if(P.pwCounts[type]>=2){
    P.laserActive=true;
    P.laserTimer=600; // 10 seconds at 60fps
    P.pwCounts[type]=0; // Reset so you can collect more
    spawnP(P.x+P.w/2,P.y+P.h/2,'#fb7185',20);
    spawnP(P.x+P.w/2,P.y,'#fff',10);
  }else{
    // Single power-up: activate temporary boost
    P.pwType=type;
    P.pwTimer=480; // 8 seconds
    if(type==='size'){P.w=36;P.h=56;P.y-=14;}
    if(type==='jump'){P.jp=-14;}
    if(type==='shield'){P.inv=480;}
    spawnP(P.x+P.w/2,P.y,pwColors[type],15);
    spawnP(P.x+P.w/2,P.y+P.h/2,'#fff',8);
  }
  updatePowerBar();
  // Flash the power bar
  var bar=document.getElementById('powerBar');
  bar.style.background='rgba(163,230,53,.3)';
  setTimeout(function(){bar.style.background='linear-gradient(transparent,rgba(10,14,26,.7))';},300);
}

function updatePowerBar(){
  var bar=document.getElementById('powerBar');
  var html='';
  for(var type in P.pwCounts){
    var count=P.pwCounts[type];
    var active=(P.pwType===type&&P.pwTimer>0)||(P.laserActive&&P.laserTimer>0);
    var label=pwLabels[type];
    if(P.laserActive&&P.laserTimer>0&&count===0)label='LASER';
    html+='<div class="power-slot'+(active?' active':'')+'"><span style="color:'+pwColors[type]+'">'+label+'</span>';
    if(count>0)html+=' <span class="count">x'+count+'</span>';
    html+='</div>';
  }
  bar.innerHTML=html;
}

// ═══ COLLISION ═══
function rc(a,ax,ay,aw,ah,b,bx,by,bw,bh){return ax<bw+bx&&ax+aw>bx&&ay<bh+by&&ay+ah>by;}

// ═══ PARTICLES ═══
function spawnP(x,y,col,n){for(var i=0;i<n;i++){ps.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:30+Math.random()*20,col:col,sz:2+Math.random()*3});}}
function updateP(){for(var i=ps.length-1;i>=0;i--){var p=ps[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;if(p.life<=0)ps.splice(i,1);}}

// ═══ LASERS ═══
function shootLaser(){
  lasers.push({x:P.x+(P.dir>0?P.w+4:-16),y:P.y+P.h/2-2,vx:P.dir*12,w:16,h:4,col:'#fb7185',life:60});
}
function updateLasers(){
  for(var i=lasers.length-1;i>=0;i--){
    var l=lasers[i];l.x+=l.vx;l.life--;
    if(l.life<=0||l.x<camX-50||l.x>camX+W+50){lasers.splice(i,1);continue;}
    // Hit enemies
    for(var j=0;j<enems.length;j++){
      var e=enems[j];if(!e.alive)continue;
      if(rc(l,l.x,l.y,l.w,l.h,e,e.x,e.y,e.w,e.h)){
        e.alive=false;score+=(e.t==='t'?200:e.t==='r'?100:150);
        spawnP(e.x+e.w/2,e.y+e.h/2,'#fb7185',8);
        lasers.splice(i,1);break;
      }
    }
  }
}

// ═══ UPDATE ═══
function updatePlayer(){
  if(P.dead)return;
  // Power-up timers
  if(P.pwTimer>0){
    P.pwTimer--;
    if(P.pwTimer<=0){
      // Reset power-up effects
      if(P.pwType==='size'){P.w=26;P.h=42;}
      if(P.pwType==='jump'){P.jp=-10.5;}
      P.pwType=null;
      updatePowerBar();
    }
  }
  if(P.laserActive){
    P.laserTimer--;
    if(P.laserTimer<=0){P.laserActive=false;updatePowerBar();}
  }
  // Movement
  if((keys['ArrowLeft']||keys['KeyA'])){P.vx-=0.7;P.dir=-1;}
  if((keys['ArrowRight']||keys['KeyD'])){P.vx+=0.7;P.dir=1;}
  // Jump: only on fresh press, not hold — requires key release between jumps
  var jumpKey=keys['ArrowUp']||keys['KeyW']||keys['Space'];
  if(jumpKey&&P.og&&!P.jumpHeld){P.vy=P.jp;P.og=false;P.jumpHeld=true;}
  if(!jumpKey)P.jumpHeld=false;
  if((keys['ArrowDown']||keys['KeyS'])&&!P.og)P.vy+=0.25;
  P.vx*=FRICTION;P.vy+=GRAVITY;
  if(P.vx>5.5)P.vx=5.5;if(P.vx<-5.5)P.vx=-5.5;
  P.x+=P.vx;P.y+=P.vy;
  var ph=P.duck?26:P.h;
  P.og=false;
  for(var i=0;i<plats.length;i++){
    var b=plats[i];
    if(rc(P,P.x,P.y,P.w,ph,b,b.x,b.y,b.w,b.h)){
      // Hidden brick hit from below
      if(b.t==='h'&&!b.hit&&P.vy<0&&P.y>=b.y+b.h-8){
        b.hit=true;
        activatePowerUp(b.pw);
        spawnP(b.x+16,b.y+16,pwColors[b.pw],12);
      }
      // Normal collision
      if(P.vy>0&&P.y+ph-P.vy<=b.y+6){P.y=b.y-ph;P.vy=0;P.og=true;}
      else if(P.vy<0&&P.y-P.vy>=b.y+b.h-4){P.y=b.y+b.h;P.vy=0.5;}
      else if(P.vx>0){P.x=b.x-P.w;P.vx=0;}
      else if(P.vx<0){P.x=b.x+b.w;P.vx=0;}
    }
  }
  if(P.x<0)P.x=0;
  if(P.y>H+60){die();}
  if(P.inv>0)P.inv--;
  P.ft++;if(P.ft>5){P.f=(P.f+1)%4;P.ft=0;}
  if(flag&&rc(P,P.x,P.y,P.w,ph,flag,flag.x,flag.y,flag.w,flag.h))winLevel();
}

function updateEnemies(){
  for(var i=0;i<enems.length;i++){
    var e=enems[i];if(!e.alive)continue;
    e.ft++;
    if(e.t==='p'){e.y+=e.fd*0.7;if(e.y<e.fy-50||e.y>e.fy+50)e.fd*=-1;}
    else{
      e.vy+=GRAVITY;e.x+=e.vx;e.y+=e.vy;
      for(var j=0;j<plats.length;j++){
        var b=plats[j];
        if(rc(e,e.x,e.y,e.w,e.h,b,b.x,b.y,b.w,b.h)){
          if(e.vy>0&&e.y+e.h-e.vy<=b.y+6){e.y=b.y-e.h;e.vy=0;}
          else if(e.vx>0){e.x=b.x-e.w;e.vx*=-1;}
          else if(e.vx<0){e.x=b.x+b.w;e.vx*=-1;}
        }
      }
      var lookX=e.vx<0?e.x-8:e.x+e.w+8;
      var lookY=e.y+e.h+4;
      var hasFloor=false;
      for(var j=0;j<plats.length;j++){var b=plats[j];if(lookX>=b.x&&lookX<b.x+b.w&&lookY>=b.y&&lookY<b.y+b.h){hasFloor=true;break;}}
      if(!hasFloor&&e.vy===0){e.vx*=-1;}
      if(e.y>H+200){e.alive=false;}
    }
    // Player collision
    if(!P.dead&&P.inv<=0&&rc(P,P.x,P.y,P.w,P.h,e,e.x,e.y,e.w,e.h)){
      if(P.vy>0&&P.y+P.h-P.vy<=e.y+10){
        e.alive=false;P.vy=-7;
        score+=e.t==='t'?200:e.t==='r'?100:150;
        spawnP(e.x+e.w/2,e.y+e.h/2,'#fb7185',8);
      }else{die();}
    }
  }
}

function updateCoins(){
  for(var i=0;i<cns.length;i++){
    var c=cns[i];if(c.got)continue;
    c.a+=0.06;
    if(rc(P,P.x,P.y,P.w,P.h,c,c.x,c.y,c.w,c.h)){
      c.got=true;coins++;score+=50;
      spawnP(c.x+9,c.y+9,'#fbbf24',5);
    }
  }
}

function die(){
  if(P.dead)return;
  P.dead=true;lives--;
  // Reset power-up visual effects on death
  if(P.pwType==='size'){P.w=26;P.h=42;}
  if(P.pwType==='jump'){P.jp=-10.5;}
  P.pwType=null;P.pwTimer=0;
  spawnP(P.x+13,P.y+21,'#e8a87c',10);
  if(lives<=0){state='over';}
  else{setTimeout(function(){P.x=64;P.y=300;P.vx=0;P.vy=0;P.dead=false;P.inv=90;camX=0;enems.forEach(function(e){e.alive=true;});lasers=[];},800);}
}

function winLevel(){
  if(flag.trig)return;
  flag.trig=true;score+=1000;state='win';
}

// ═══ DRAW ═══
function draw(){
  var grad=X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0e1a');grad.addColorStop(0.5,'#16213e');grad.addColorStop(1,'#1a1a2e');
  X.fillStyle=grad;X.fillRect(0,0,W,H);
  X.fillStyle='rgba(224,242,254,.3)';
  for(var i=0;i<40;i++){var sx=(i*137+camX*0.1)%W,sy=(i*89)%H;X.fillRect(sx,sy,2,2);}
  X.save();X.translate(-camX,0);
  // Platforms
  for(var i=0;i<plats.length;i++){
    var b=plats[i];
    if(b.x+b.w<camX-32||b.x>camX+W+32)continue;
    if(b.t==='g'){X.fillStyle='#2a3a5f';X.fillRect(b.x,b.y,b.w,b.h);X.fillStyle='#a3e635';X.fillRect(b.x,b.y,b.w,3);}
    else if(b.t==='b'){X.fillStyle='#a78bfa';X.fillRect(b.x,b.y,b.w,b.h);X.fillStyle='rgba(0,0,0,.2)';X.fillRect(b.x,b.y+b.h-2,b.w,2);X.fillRect(b.x+b.w-2,b.y,2,b.h);}
    else if(b.t==='h'){
      // Hidden brick — visible as a "?" block with pulsing glow
      var pulse=0.6+Math.sin(frame*0.08+b.x*0.1)*0.2;
      // Brick body
      X.fillStyle=b.hit?'rgba(167,139,250,.15)':'rgba(167,139,250,'+pulse+')';
      X.fillRect(b.x,b.y,b.w,b.h);
      // Border
      X.strokeStyle='rgba(251,191,36,'+(pulse*0.8)+')';
      X.lineWidth=2;
      X.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
      X.lineWidth=1;
      // "?" symbol
      if(!b.hit){
        X.fillStyle='rgba(251,191,36,'+pulse+')';
        X.font='bold 14px monospace';
        X.textAlign='center';
        X.fillText('?',b.x+16,b.y+22);
        // Sparkle particles
        if(Math.floor(frame/20)%2===0){
          X.fillStyle='rgba(255,255,255,.6)';
          X.fillRect(b.x+8+(Math.sin(frame*0.1)*8),b.y+6+(Math.cos(frame*0.12)*4),2,2);
        }
      }
    }
    else{X.fillStyle='#e8a87c';X.fillRect(b.x,b.y,b.w,b.h);X.fillStyle='#c4956a';X.fillRect(b.x,b.y+b.h-3,b.w,3);X.fillStyle='rgba(0,0,0,.15)';X.fillRect(b.x,b.y,b.w,2);}
  }
  // Flag
  if(flag){
    X.fillStyle='#4a6080';X.fillRect(flag.x+6,flag.y,4,flag.h);
    X.fillStyle=flag.trig?'#a3e635':'#fb7185';
    X.beginPath();X.moveTo(flag.x+10,flag.y);X.lineTo(flag.x+40,flag.y+14);X.lineTo(flag.x+10,flag.y+28);X.fill();
  }
  // Coins
  for(var i=0;i<cns.length;i++){
    var c=cns[i];if(c.got)continue;
    var cy=c.y+Math.sin(c.a)*4;
    X.fillStyle='#fbbf24';X.beginPath();X.ellipse(c.x+9,cy+9,9,9,0,0,6.28);X.fill();
    X.fillStyle='#fbbf2488';X.beginPath();X.ellipse(c.x+9,cy+9,5,5,0,0,6.28);X.fill();
  }
  // Lasers
  for(var i=0;i<lasers.length;i++){
    var l=lasers[i];
    X.fillStyle=l.col;X.shadowColor=l.col;X.shadowBlur=8;
    X.fillRect(l.x,l.y,l.w,l.h);
    X.shadowBlur=0;
  }
  // Enemies
  for(var i=0;i<enems.length;i++){
    var e=enems[i];if(!e.alive)continue;
    var ex=e.x,ey=e.y;
    if(e.t==='r'){
      X.fillStyle='#34d399';
      X.fillRect(ex+4,ey+8,e.w-8,e.h-16);
      X.fillRect(ex+6,ey,e.w-12,12);
      X.fillStyle='#0a0e1a';X.fillRect(ex+8,ey+3,3,3);X.fillRect(ex+e.w-11,ey+3,3,3);
      X.fillStyle='#2a8a6a';
      X.fillRect(ex+2,ey+e.h-10,6,10);X.fillRect(ex+e.w-8,ey+e.h-10,6,10);
      X.fillStyle='#34d399';X.fillRect(ex+e.w-4,ey+10,8,4);
    }else if(e.t==='t'){
      X.fillStyle='#fb7185';
      X.fillRect(ex+6,ey+10,e.w-12,e.h-18);
      X.fillRect(ex+4,ey,e.w-8,14);
      X.fillStyle='#0a0e1a';X.fillRect(ex+7,ey+3,4,4);X.fillRect(ex+e.w-11,ey+3,4,4);
      X.fillStyle='#c45a6a';
      X.fillRect(ex+4,ey+e.h-14,8,14);X.fillRect(ex+e.w-12,ey+e.h-14,8,14);
      X.fillStyle='#fb7185';X.fillRect(ex+e.w-6,ey+12,10,6);
      X.fillStyle='#fff';X.fillRect(ex+6,ey+8,3,2);X.fillRect(ex+e.w-9,ey+8,3,2);
    }else{
      X.fillStyle='#22d3ee';
      X.fillRect(ex+6,ey+4,e.w-12,e.h-8);
      X.fillStyle='#0a0e1a';X.fillRect(ex+8,ey+6,3,3);
      X.fillStyle='#22d3ee';
      var wOff=Math.sin(frame*0.15)*8;
      X.beginPath();X.moveTo(ex+e.w/2,ey+e.h/2);X.lineTo(ex-8,ey+wOff);X.lineTo(ex+4,ey+e.h/2);X.fill();
      X.beginPath();X.moveTo(ex+e.w/2,ey+e.h/2);X.lineTo(ex+e.w+8,ey+wOff);X.lineTo(ex+e.w-4,ey+e.h/2);X.fill();
    }
  }
  // Player
  if(!P.dead){
    var px=P.x,py=P.y;
    // Shield glow
    if(P.pwType==='shield'&&P.pwTimer>0){
      X.strokeStyle='rgba(52,211,153,.4)';X.lineWidth=3;
      X.beginPath();X.arc(px+P.w/2,py+P.h/2,P.w+8,0,6.28);X.stroke();
      X.lineWidth=1;
    }
    // Invincibility flash
    if((P.inv>0||P.pwType==='shield')&&Math.floor(P.inv/4)%2===0){X.globalAlpha=0.5;}
    // Skateboard
    X.fillStyle='#e8a87c';
    X.fillRect(px+2,py+P.h-6,P.w-4,6);
    X.fillStyle='#a78bfa';
    X.fillRect(px+4,py+P.h-8,4,3);X.fillRect(px+P.w-8,py+P.h-8,4,3);
    // Body
    X.fillStyle=P.pwType==='size'?'#22d3ee':'#e8a87c';
    X.fillRect(px+4,py+14,P.w-8,P.h-20);
    // Head
    X.fillStyle='#f5d0a9';
    X.fillRect(px+5,py+4,P.w-10,12);
    // Hair
    X.fillStyle='#4a3728';
    X.fillRect(px+4,py+2,P.w-8,5);
    // Eyes
    X.fillStyle='#0a0e1a';
    if(P.dir>0){X.fillRect(px+14,py+7,3,3);}else{X.fillRect(px+9,py+7,3,3);}
    // Helmet
    X.fillStyle=P.laserActive?'#fb7185':'#a78bfa';
    X.fillRect(px+3,py,P.w-10,5);
    // Legs
    var legOff=P.og?0:Math.sin(P.f*1.5)*4;
    X.fillStyle='#3a4a6a';
    X.fillRect(px+5,py+P.h-14+legOff,7,14);X.fillRect(px+P.w-12,py+P.h-14-legOff,7,14);
    // Arms
    X.fillStyle='#f5d0a9';
    var armOff=P.duck?4:Math.sin(P.f*1.5)*3;
    X.fillRect(px-2,py+16+armOff,5,10);X.fillRect(px+P.w-3,py+16-armOff,5,10);
    X.globalAlpha=1;
  }
  // Particles
  for(var i=0;i<ps.length;i++){
    var p=ps[i];X.fillStyle=p.col;X.globalAlpha=p.life/50;X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }X.globalAlpha=1;
  X.restore();
  // HUD
  document.getElementById('sc').textContent=score;
  document.getElementById('cn').textContent=coins;
  document.getElementById('lv').textContent='♥'.repeat(Math.max(0,lives));
  document.getElementById('tm').textContent=Math.max(0,Math.floor((18000-frame)/60)));
}

// ═══ GAME LOOP ═══
var lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=now;return;}
  var dt=now-lastTime;lastTime=now;
  if(dt>100)dt=33;
  frame++;
  if(state==='play'){
    updatePlayer();updateEnemies();updateCoins();updateP();updateLasers();
    camX=P.x-W/2+13;if(camX<0)camX=0;
    time=Math.max(0,Math.floor((18000-frame)/60));
    if(time<=0)die();
  }
  draw();
}

// ═══ INPUT ═══
document.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(e.code==='KeyP'&&state==='play')state='pause';
  else if(e.code==='KeyP'&&state==='pause')state='play';
  // Laser shooting with X key
  if(e.code==='KeyX'&&P.laserActive&&state==='play')shootLaser();
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0)e.preventDefault();
});
document.addEventListener('keyup',function(e){keys[e.code]=false;});

// ═══ START ═══
document.getElementById('startBtn').addEventListener('click',startGame);
function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('powerBar').classList.remove('hidden');
  buildLevel();
  P.x=64;P.y=300;P.vx=0;P.vy=0;P.dead=false;P.inv=60;
  P.w=26;P.h=42;P.jp=-10.5;P.pwType=null;P.pwTimer=0;
  P.laserActive=false;P.laserTimer=0;
  P.pwCounts={size:0,jump:0,shield:0};
  score=0;coins=0;lives=3;frame=0;camX=0;ps=[];lasers=[];
  state='play';
  updatePowerBar();
}

// ═══ GAME OVER / WIN ═══
var origDraw=draw;
draw=function(){
  origDraw();
  if(state==='over'){
    X.fillStyle='rgba(10,14,26,.85)';X.fillRect(0,0,W,H);
    X.fillStyle='#fb7185';X.font='28px monospace';X.textAlign='center';X.fillText('GAME OVER',W/2,H/2-20);
    X.fillStyle='#e0f2fe';X.font='12px monospace';X.fillText('SCORE: '+score,W/2,H/2+16);
    X.fillStyle='#94a3b8';X.font='10px monospace';X.fillText('Press START to try again',W/2,H/2+40);
    var btn=document.getElementById('startBtn');
    btn.textContent='TRY AGAIN';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('powerBar').classList.add('hidden');
    btn.onclick=function(){btn.textContent='START GAME';btn.onclick=startGame;startGame();};
  }
  if(state==='win'){
    X.fillStyle='rgba(10,14,26,.85)';X.fillRect(0,0,W,H);
    X.fillStyle='#a3e635';X.font='28px monospace';X.textAlign='center';X.fillText('LEVEL COMPLETE!',W/2,H/2-20);
    X.fillStyle='#e0f2fe';X.font='12px monospace';X.fillText('SCORE: '+score,W/2,H/2+16);
    X.fillStyle='#fbbf24';X.font='11px monospace';X.fillText('COINS: '+coins+' / TIME: '+time+'s',W/2,H/2+36);
    X.fillStyle='#94a3b8';X.font='10px monospace';X.fillText('Press START for next level',W/2,H/2+60);
    var btn=document.getElementById('startBtn');
    btn.textContent='NEXT LEVEL';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('powerBar').classList.add('hidden');
    btn.onclick=function(){btn.textContent='START GAME';btn.onclick=startGame;startGame();};
  }
  if(state==='pause'){
    X.fillStyle='rgba(10,14,26,.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#a78bfa';X.font='24px monospace';X.textAlign='center';X.fillText('PAUSED',W/2,H/2);
    X.fillStyle='#94a3b8';X.font='10px monospace';X.fillText('Press P to resume',W/2,H/2+24);
  }
};

buildLevel();
loop();
</script>
</body>
