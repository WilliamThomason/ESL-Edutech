<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Friends — Topic Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #ff8f00;
            --text: #1b5e20;
            --font-display: 'Fredoka One', cursive;
            --font-main: 'Quicksand', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-main);
            color: var(--text);
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(27,94,32,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(76,175,80,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(200,230,201,0.3) 0%, transparent 70%),
                linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 40%, #a5d6a7 70%, #81c784 100%);
            padding: 30px 20px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* floating forest decorations */
        body::before, body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 300px; height: 300px;
            background: radial-gradient(ellipse, rgba(46,125,50,0.08) 0%, transparent 70%);
            top: -80px; left: -80px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(ellipse, rgb(46,125,50) 0%, transparent 70%);
            bottom: -120px; right: -100px;
        }

        .forest-bg-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                /* trees silhouettes via repeating gradients */
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(46,125,50,0.03) 80px, rgba(46,125,50,0.03) 82px),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(46,125,50,0.02) 60px, rgba(46,125,50,0.02) 62px);
        }

        /* ground strip */
        .ground {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px; z-index: 0;
            background: linear-gradient(0deg, #5d4037 0%, #6d4c41 40%, transparent 100%);
            opacity: 0.25;
        }
        .ground::before {
            content: '🌿 🌱 🍂 🌿 🍄 🌱 🌿 🍂 🌱 🍄 🌿 🌱 🍂 🌿 🍄 🌱 🌿 🍂 🌱 🍄 🌿 🌱 🍂 🌿 🍄 🌱 🌿 🍂 🌱 🍄 🌿 🌱 🍂 🌿 🍄 🌱 🌿 🍂 🌱 🍄';
            position: absolute; top: -10px; left: 0; right: 0;
            font-size: 14px; letter-spacing: 18px; white-space: nowrap; overflow: hidden;
            opacity: 0.5;
        }

        .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

        .forest-header {
            text-align: center;
            font-size: clamp(28px, 5vw, 48px);
            font-family: var(--font-display);
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 3px 0 rgba(255,255,255,0.6), 0 6px 12px rgba(0,0,0,0.08);
            position: relative; z-index: 1;
        }
        .forest-sub {
            text-align: center;
            font-size: 16px;
            color: #388e3c;
            margin-bottom: 36px;
            font-weight: 600;
            position: relative; z-index: 1;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 18px;
            position: relative; z-index: 1;
        }

        .topic-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);
            padding: 22px 16px 18px;
            border-radius: 22px;
            border: 3px solid transparent;
            text-align: center;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            box-shadow: 0 8px 0 rgba(46,125,50,0.2), 0 12px 24px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .topic-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 6px;
            border-radius: 22px 22px 0 0;
        }
        .topic-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 14px 0 rgba(46,125,50,0.25), 0 20px 36px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
        .topic-card:active { transform: translateY(-2px) scale(1.01); }

        .topic-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.1));
            transition: transform 0.25s;
        }
        .topic-card:hover .topic-emoji { transform: scale(1.2) rotate(-5deg); }

        .topic-title {
            font-family: var(--font-display);
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .topic-count {
            font-size: 12px;
            color: #558b2f;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 10px;
            display: inline-block;
            font-weight: 700;
        }

        /* stripe colors per card via nth */
        .topic-card:nth-child(6n+1)::before { background: #43a047; }
        .topic-card:nth-child(6n+2)::before { background: #ff8f00; }
        .topic-card:nth-child(6n+3)::before { background: #5c6bc0; }
        .topic-card:nth-child(6n+4)::before { background: #e53935; }
        .topic-card:nth-child(6n+5)::before { background: #00897b; }
        .topic-card:nth-child(6n+6)::before { background: #f4511e; }

        /* floating leaves animation */
        @keyframes floatLeaf {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: floatLeaf linear infinite;
            font-size: 20px;
            opacity: 0;
        }
}
</style>
</head>
<body>
    <div class="forest-bg-layer"></div>
    <div class="ground"></div>

    <div class="container">
        <h1 class="forest-header">🌳 Choose Your Forest Adventure! 🌲</h1>
        <p class="forest-sub">Pick a topic and answer 20 fun English questions!</p>
        <div class="topic-grid" id="topic-grid"></div>
    </div>

    <script>
        const topics = [
            { name: "Animals",      emoji: "🐾" },
            { name: "Colors",       emoji: "🎨" },
            { name: "Numbers",      emoji: "🔢" },
            { name: "Family",       emoji: "👨‍👩‍👧‍👦" },
            { name: "Food",         emoji: "🍎" },
            { name: "School",       emoji: "🏫" },
            { name: "Home",         emoji: "🏠" },
            { name: "Clothes",      emoji: "👕" },
            { name: "Weather",      emoji: "🌤️" },
            { name: "Body",         emoji: "🧍" },
            { name: "Sports",       emoji: "⚽" },
            { name: "Music",        emoji: "🎵" },
            { name: "Nature",       emoji: "🌻" },
            { name: "Transport",    emoji: "🚗" },
            { name: "Hobbies",      emoji: "🎮" },
            { name: "States",       emoji: "😊" },
            { name: "Jobs",         emoji: "👷" },
            { name: "Time",         emoji: "🕐" },
            { name: "Feelings",     emoji: "💖" },
            { name: "Holidays",     emoji: "🎄" },
            { name: "Space",        emoji: "🚀" },
            { name: "Ocean",        emoji: "🌊" },
            { name: "Garden",       emoji: "🌷" },
            { name: "My Day",       emoji: "☀️" }
        ];

        const grid = document.getElementById('topic-grid');
        topics.forEach(t => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML =
                `<span class="topic-emoji">${t.emoji}</span>` +
                `<div class="topic-title">${t.name}</div>` +
                `<div class="topic-count">20 Questions</div>`;
            card.onclick = () => window.location.href = 'forest-friends.html?topic=' + encodeURIComponent(t.name);
            grid.appendChild(card);
        });

        // spawn floating leaves
        const leafChars = ['🍂', '🍃', '🌿', '☘️', '🌱'];
        for (let i = 0; i < 8; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.textContent = leafChars[i % leafChars.length];
            leaf.style.left = (Math.random() * 100) + '%';
            leaf.style.animationDuration = (12 + Math.random() * 18) + 's';
            leaf.style.animationDelay = (Math.random() * 15) + 's';
            document.body.appendChild(leaf);
        }
    </script>
</body>
</html>
