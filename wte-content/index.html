<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WTE — William Thomason English</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#1c1c1c;--bg2:#232323;--bg3:#2a2a2a;--bg4:#333333;--border:#3a3a3a;--border-light:#4a4a4a;--text:#e8e8f0;--text-dim:#8888a0;--text-muted:#55556a;--accent:#a3e635;--accent-dim:rgba(163,230,53,.12);--accent-glow:rgba(163,230,53,.3);--cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:16px;overflow-x:hidden}

/* ═══ TOP NAV ═══ */
.topnav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:rgba(28,28,28,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topnav-logo{font-family:'Fira Code',monospace;font-size:16px;font-weight:700;color:var(--text);letter-spacing:1px}
.topnav-logo span{color:var(--accent)}
.topnav-tabs{display:flex;gap:4px}
.topnav-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all .15s;border:none;background:none;font-family:inherit}
.topnav-tab:hover{color:var(--text);background:var(--bg3)}
.topnav-tab.active{color:var(--accent);background:var(--accent-dim)}

/* ═══ MAIN CONTENT ═══ */
.main{max-width:1100px;margin:0 auto;padding:24px}
.tab-content{display:none}.tab-content.active{display:block}

/* ═══ SECTION HEADER ═══ */
.sec-header{margin-bottom:24px}
.sec-header h1{font-size:28px;font-weight:800;margin-bottom:4px}
.sec-header p{color:var(--text-dim);font-size:14px}

/* ═══ FILTER BAR ═══ */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;outline:none;cursor:pointer;font-family:inherit;min-width:140px}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
.filter-bar label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}

/* ═══ DECK GRID ═══ */
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.deck-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:8px}
.deck-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.deck-cat{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.deck-topic{font-size:18px;font-weight:700}
.deck-level{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent)}
.deck-count{font-size:11px;color:var(--text-dim)}

/* ═══ SLIDESHOW ═══ */
.slideshow{display:none;position:fixed;inset:0;z-index:200;background:#000}
.slideshow.active{display:flex;flex-direction:column}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 8s ease-out;filter:brightness(.35) saturate(.9)}
.slide-bg.kenburns{transform:scale(1.15)}
.slide-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.slide-number{position:absolute;top:16px;left:20px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;z-index:3}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;border:1px solid rgba(163,230,53,.3);background:rgba(163,230,53,.1);color:var(--accent)}
.slide-question{font-size:2rem;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:16px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.slide-followup{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:24px;max-width:600px}

/* Vocab tooltip */
.vocab-word{border-bottom:2px dotted rgba(163,230,53,.5);cursor:pointer;color:var(--accent);font-weight:600;position:relative}
.vocab-word .tt{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;min-width:180px;font-size:12px;font-weight:400;color:var(--text);text-align:left;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:10;transition:opacity .2s;pointer-events:none}
.vocab-word:hover .tt{visibility:visible;opacity:1}

/* ═══ FUN FACT CARD ═══ */
.funfact-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;margin-bottom:16px}
.funfact-btn:hover{border-color:var(--amber);color:var(--amber)}
.funfact-card{display:none;background:rgba(255,255,255,.05);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left;font-size:14px;color:var(--amber)}
.funfact-card.show{display:block}

/* ═══ MATCH EXERCISE ═══ */
.match-exercise{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.match-exercise h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.match-col{display:flex;flex-direction:column;gap:6px}
.match-item{padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .15s;background:var(--bg3)}
.match-item:hover{border-color:var(--accent)}
.match-item.selected{border-color:var(--accent);background:var(--accent-dim)}
.match-item.correct{border-color:var(--green);background:rgba(52,211,153,.1)}
.match-item.wrong{border-color:var(--rose);background:rgba(251,113,133,.1)}
.match-score{font-size:12px;color:var(--text-dim);margin-top:8px}

/* ═══ SLIDE NAV ═══ */
.slide-nav{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:8px;align-items:center}
.slide-nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.slide-nav-btn:hover{background:rgba(255,255,255,.25)}
.slide-dots{display:flex;gap:4px}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.slide-dot.active{background:var(--accent);width:18px;border-radius:3px}
.slide-close{position:absolute;top:16px;right:20px;z-index:3;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.slide-close:hover{background:var(--rose);border-color:var(--rose)}

/* ═══ PROGRESS BAR ═══ */
.progress-bar{position:absolute;bottom:0;left:0;right:0;z-index:3;height:4px;background:rgba(255,255,255,.1)}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;border-radius:0 2px 2px 0}

</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div class="topnav-logo">W<span>T</span>E</div>
  <div class="topnav-tabs">
    <button class="topnav-tab active" onclick="switchTab('speaking')">Speaking</button>
    <button class="topnav-tab" onclick="switchTab('video')">Video Lessons</button>
    <button class="topnav-tab" onclick="switchTab('games')">Vocab Games</button>
    <button class="topnav-tab" onclick="switchTab('typing')">Typing</button>
    <button class="topnav-tab" onclick="switchTab('lessons')">Lessons</button>
  </div>
</div>

<div class="main">

  <!-- ═══ SPEAKING TAB ═══ -->
  <div class="tab-content active" id="tab-speaking">
    <div class="sec-header">
      <h1>Speaking Practice</h1>
      <p>Choose a topic and level. Each deck has 15 conversation questions with vocabulary support.</p>
    </div>
    <div class="filter-bar">
      <label>Category:</label>
      <select id="filter-cat" onchange="filterDecks()">
        <option value="all">All Categories</option>
        <option value="Food and Drink">Food and Drink</option>
        <option value="Health">Health</option>
        <option value="Looks">Looks</option>
        <option value="Nature">Nature</option>
        <option value="Special Days">Special Days</option>
        <option value="Technology">Technology</option>
        <option value="Work, Money, and Education">Work, Money, and Education</option>
      </select>
      <label>Level:</label>
      <select id="filter-level" onchange="filterDecks()">
        <option value="all">All Levels</option>
        <option value="A1">A1 — Beginner</option>
        <option value="A2">A2 — Elementary</option>
        <option value="B1">B1 — Intermediate</option>
        <option value="B2">B2 — Upper Intermediate</option>
        <option value="C1">C1 — Advanced</option>
        <option value="C2">C2 — Mastery</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search topics..." oninput="filterDecks()" style="flex:1;min-width:160px">
    </div>
    <div class="deck-grid" id="deck-grid"></div>
  </div>

  <!-- ═══ VIDEO LESSONS TAB ═══ -->
  <div class="tab-content" id="tab-video">
    <div class="sec-header">
      <h1>Video Lesson Generator</h1>
      <p>Add interactive questions to any YouTube video to create a lesson.</p>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px">
      <div style="margin-bottom:16px">
        <label style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">YouTube URL</label>
        <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=..." style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none">
      </div>
      <div id="video-preview" style="display:none;margin-bottom:16px">
        <div style="background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--text-dim)">
          <span>Video preview will appear here</span>
        </div>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">Add Question</label>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input type="text" id="q-timestamp" placeholder="Timestamp (e.g. 1:30)" style="width:120px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px;outline:none">
          <select id="q-type" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px">
            <option value="open">Open Question</option>
            <option value="choice">Multiple Choice</option>
            <option value="blank">Fill in the Blank</option>
            <option value="truefalse">True/False</option>
          </select>
        </div>
        <textarea id="q-text" placeholder="Type your question here..." rows="2" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;outline:none;resize:vertical;margin-bottom:8px;font-family:inherit"></textarea>
        <button onclick="addVideoQuestion()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer">+ Add Question</button>
      </div>
      <div id="video-questions-list" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- ═══ VOCAB GAMES TAB ═══ -->
  <div class="tab-content" id="tab-games">
    <div class="sec-header">
      <h1>Vocabulary Games</h1>
      <p>Practice synonyms, antonyms, and word recognition.</p>
    </div>
    <div class="deck-grid">
      <div class="deck-card" onclick="startGame('synonym')">
        <div class="deck-cat">Game 1</div>
        <div class="deck-topic">Synonym Match</div>
        <div style="font-size:13px;color:var(--text-dim)">Match words to their synonyms. How many can you get right?</div>
      </div>
      <div class="deck-card" onclick="startGame('antonym')">
        <div class="deck-cat">Game 2</div>
        <div class="deck-topic">Antonym Challenge</div>
        <div style="font-size:13px;color:var(--text-dim)">Find the opposite word. Test your vocabulary range.</div>
      </div>
      <div class="deck-card" onclick="startGame('context')">
        <div class="deck-cat">Game 3</div>
        <div class="deck-topic">Context Clues</div>
        <div style="font-size:13px;color:var(--text-dim)">Guess the word meaning from the sentence context.</div>
      </div>
    </div>
  </div>

  <!-- ═══ TYPING TAB ═══ -->
  <div class="tab-content" id="tab-typing">
    <div class="sec-header">
      <h1>Type Slayer</h1>
      <p>Type the words to shoot the monsters before they reach you!</p>
    </div>
    <div id="typing-game-area" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:48px;margin-bottom:16px">⚔️</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Type Slayer</div>
      <div style="font-size:14px;color:var(--text-dim);margin-bottom:24px;text-align:center">Type the words to destroy monsters. Each level gets faster!</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px">
        <button onclick="startTypingLevel(1)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 1 — Ocean</button>
        <button onclick="startTypingLevel(2)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 2 — Forest</button>
        <button onclick="startTypingLevel(3)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 3 — Desert</button>
        <button onclick="startTypingLevel(4)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 4 — Ice</button>
        <button onclick="startTypingLevel(5)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 5 — Fire</button>
        <button onclick="startTypingLevel(6)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 6 — Space</button>
      </div>
    </div>
  </div>

  <!-- ═══ LESSONS TAB ═══ -->
  <div class="tab-content" id="tab-lessons">
    <div class="sec-header">
      <h1>Lesson Content</h1>
      <p>Grammar, vocabulary, reading, and listening practice.</p>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center">
      <div style="font-size:32px;margin-bottom:12px">📚</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Coming Soon</div>
      <div style="font-size:13px;color:var(--text-dim)">Grammar explanations, vocabulary lists, reading passages, and listening exercises are being prepared.</div>
    </div>
  </div>

</div>

<!-- ═══ SLIDESHOW OVERLAY ═══ -->
<div class="slideshow" id="slideshow">
  <div class="slide-bg" id="slide-bg"></div>
  <div class="slide-number" id="slide-num">1 / 15</div>
  <button class="slide-close" onclick="closeSlideshow()">✕</button>
  <div class="slide-content">
    <span class="slide-category" id="slide-cat">Speaking Lesson</span>
    <h2 class="slide-question" id="slide-question"></h2>
    <p class="slide-followup" id="slide-followup"></p>
    <button class="funfact-btn" onclick="toggleFunFact()">💡 Show Fun Fact</button>
    <div class="funfact-card" id="funfact-card"></div>
    <div class="match-exercise" id="match-exercise" style="display:none">
      <h3>Match the Words to Their Meanings</h3>
      <div class="match-cols">
        <div class="match-col" id="match-col-a"></div>
        <div class="match-col" id="match-col-b"></div>
      </div>
      <div class="match-score" id="match-score"></div>
    </div>
  </div>
  <div class="slide-nav">
    <button class="slide-nav-btn" onclick="prevSlide()">◀</button>
    <div class="slide-dots" id="slide-dots"></div>
    <button class="slide-nav-btn" onclick="nextSlide()">▶</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

// ═══ TAB SWITCHING ═══
function switchTab(tab) {
  document.querySelectorAll('.topnav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ═══ DECK FILTERING ═══
function filterDecks() {
  var cat = document.getElementById('filter-cat').value;
  var level = document.getElementById('filter-level').value;
  var search = document.getElementById('filter-search').value.toLowerCase();
  var filtered = ALL_DECKS.filter(function(d) {
    if (cat !== 'all' && d.category !== cat) return false;
    if (level !== 'all' && d.level !== level) return false;
    if (search && d.topic.toLowerCase().indexOf(search) < 0) return false;
    return true;
  });
  renderDeckGrid(filtered);
}

function renderDeckGrid(decks) {
  var grid = document.getElementById('deck-grid');
  if (decks.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim)">No decks match your filters.</div>';
    return;
  }
  var h = '';
  decks.forEach(function(d) {
    h += '<div class="deck-card" onclick="openDeck(\"' + d.id + '\")">';
    h += '<div class="deck-cat">' + d.category + '</div>';
    h += '<div class="deck-topic">' + d.topic + '</div>';
    h += '<div><span class="deck-level">' + d.level + '</span> <span class="deck-count">' + d.questions.length + ' questions</span></div>';
    h += '</div>';
  });
  grid.innerHTML = h;
}

// ═══ SLIDESHOW ═══
var currentDeck = null;
var currentSlide = 0;
var selectedMatch = null;
var matchScore = 0;

function openDeck(deckId) {
  currentDeck = ALL_DECKS.find(function(d) { return d.id === deckId; });
  if (!currentDeck) return;
  currentSlide = 0;
  selectedMatch = null;
  matchScore = 0;
  document.getElementById('slideshow').classList.add('active');
  showSlide(0);
  // Start Ken Burns
  setTimeout(function() {
    document.getElementById('slide-bg').classList.add('kenburns');
  }, 100);
}

function closeSlideshow() {
  document.getElementById('slideshow').classList.remove('active');
  document.getElementById('slide-bg').classList.remove('kenburns');
  currentDeck = null;
}

function showSlide(n) {
  if (!currentDeck) return;
  var q = currentDeck.questions[n];
  currentSlide = n;
  document.getElementById('slide-num').textContent = (n + 1) + ' / ' + currentDeck.questions.length;
  document.getElementById('slide-cat').textContent = currentDeck.topic + ' — ' + currentDeck.level;
  document.getElementById('slide-question').textContent = q;
  document.getElementById('slide-followup').textContent = n < currentDeck.questions.length - 1 ? 'Think about: ' + currentDeck.questions[n + 1].substring(0, 80) + '...' : 'Final question! Take your time.';
  document.getElementById('progress-fill').style.width = ((n + 1) / currentDeck.questions.length * 100) + '%';
  document.getElementById('funfact-card').classList.remove('show');
  // Update dots
  var dots = '';
  for (var i = 0; i < currentDeck.questions.length; i++) {
    dots += '<div class="slide-dot' + (i === n ? ' active' : '') + '" onclick="showSlide(' + i + ')"></div>';
  }
  document.getElementById('slide-dots').innerHTML = dots;
  // Show match exercise on last slide
  if (n === currentDeck.questions.length - 1) {
    document.getElementById('match-exercise').style.display = 'block';
    renderMatchExercise();
  } else {
    document.getElementById('match-exercise').style.display = 'none';
  }
  // Change background image based on topic
  var topicSlug = currentDeck.topic.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  var keywords = currentDeck.topic.toLowerCase().split(' ').slice(0, 2).join(',');
  var imgUrl = 'https://source.unsplash.com/1600x900/?' + encodeURIComponent(keywords + ',calm,peaceful');
  document.getElementById('slide-bg').style.backgroundImage = 'url(' + imgUrl + ')';
  document.getElementById('slide-bg').classList.remove('kenburns');
  setTimeout(function() { document.getElementById('slide-bg').classList.add('kenburns'); }, 50);
}

function nextSlide() {
  if (currentSlide < currentDeck.questions.length - 1) showSlide(currentSlide + 1);
}
function prevSlide() {
  if (currentSlide > 0) showSlide(currentSlide - 1);
}

function toggleFunFact() {
  var card = document.getElementById('funfact-card');
  card.classList.toggle('show');
  if (card.classList.contains('show')) {
    var facts = currentDeck.funfacts;
    card.textContent = facts[currentSlide % facts.length];
  }
}

// ═══ MATCH EXERCISE ═══
function renderMatchExercise() {
  if (!currentDeck) return;
  var vocab = currentDeck.vocab;
  var colA = document.getElementById('match-col-a');
  var colB = document.getElementById('match-col-b');
  selectedMatch = null;
  matchScore = 0;
  document.getElementById('match-score').textContent = '';

  // Shuffle
  var indices = vocab.map(function(_, i) { return i; });
  for (var i = indices.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
  }

  var hA = '', hB = '';
  vocab.forEach(function(word, i) {
    hA += '<div class="match-item" data-word="' + word + '" data-idx="' + i + '" onclick="selectMatch(this, 'A')">' + word + '</div>';
  });
  indices.forEach(function(idx) {
    var word = vocab[idx];
    hB += '<div class="match-item" data-word="' + word + '" data-idx="' + idx + '" onclick="selectMatch(this, 'B')">' + 'Definition ' + (idx + 1) + '</div>';
  });
  colA.innerHTML = hA;
  colB.innerHTML = hB;
}

function selectMatch(el, col) {
  if (el.classList.contains('correct') || el.classList.contains('wrong')) return;
  if (col === 'A') {
    document.querySelectorAll('#match-col-a .match-item').forEach(function(e) { e.classList.remove('selected'); });
    el.classList.add('selected');
    selectedMatch = el;
  } else {
    if (!selectedMatch) return;
    var wordA = selectedMatch.getAttribute('data-word');
    var wordB = el.getAttribute('data-word');
    if (wordA === wordB) {
      selectedMatch.classList.add('correct');
      el.classList.add('correct');
      matchScore++;
      document.getElementById('match-score').textContent = 'Score: ' + matchScore + ' / ' + currentDeck.vocab.length;
    } else {
      selectedMatch.classList.add('wrong');
      el.classList.add('wrong');
      setTimeout(function() {
        selectedMatch.classList.remove('wrong');
        el.classList.remove('wrong');
      }, 800);
    }
    selectedMatch.classList.remove('selected');
    selectedMatch = null;
  }
}

var currentGame = null;
var gameQ = 0;
var gameScore = 0;

function startGame(type) {
  currentGame = type;
  gameQ = 0;
  gameScore = 0;
  showGameQuestion();
}

function showGameQuestion() {
  var data = gameData[currentGame];
  if (gameQ >= data.length) {
    showGameResult();
    return;
  }
  var q = data[gameQ];
  var area = document.getElementById('tab-games');
  var h = '<div style="max-width:500px;margin:0 auto">';
  h += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Question ' + (gameQ + 1) + ' of ' + data.length + ' — Score: ' + gameScore + '</div>';
  h += '<div style="font-size:24px;font-weight:700;margin-bottom:20px">';
  if (currentGame === 'context') {
    h += q.sentence.replace('___', '<span style="color:var(--accent)">______</span>');
  } else {
    h += '"' + q.word + '"';
  }
  h += '</div>';
  h += '<div style="display:flex;flex-direction:column;gap:8px">';
  q.options.forEach(function(opt, i) {
    h += '<button class="match-item" onclick="answerGame(' + i + ')" style="text-align:left;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;transition:all .15s">' + opt + '</button>';
  });
  h += '</div></div>';
  area.innerHTML = h;
}

function answerGame(idx) {
  var q = gameData[currentGame][gameQ];
  var buttons = document.querySelectorAll('#tab-games .match-item');
  buttons.forEach(function(btn, i) {
    btn.style.pointerEvents = 'none';
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && idx !== q.answer) btn.classList.add('wrong');
  });
  if (idx === q.answer) gameScore++;
  gameQ++;
  setTimeout(showGameQuestion, 1200);
}

function showGameResult() {
  var area = document.getElementById('tab-games');
  var pct = Math.round(gameScore / gameData[currentGame].length * 100);
  var h = '<div style="text-align:center;padding:40px">';
  h += '<div style="font-size:48px;margin-bottom:16px">' + (pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪') + '</div>';
  h += '<div style="font-size:24px;font-weight:700;margin-bottom:8px">' + gameScore + ' / ' + gameData[currentGame].length + ' correct</div>';
  h += '<div style="font-size:14px;color:var(--text-dim);margin-bottom:24px">' + pct + '% — ' + (pct >= 80 ? 'Excellent!' : pct >= 50 ? 'Good job!' : 'Keep practicing!') + '</div>';
  h += '<button onclick="startGame('' + currentGame + '')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;margin-right:8px">Play Again</button>';
  h += '<button onclick="document.getElementById('tab-games').innerHTML=renderGamesList()" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer">All Games</button>';
  h += '</div>';
  area.innerHTML = h;
}

function renderGamesList() {
  return '<div class="sec-header"><h1>Vocabulary Games</h1><p>Practice synonyms, antonyms, and word recognition.</p></div><div class="deck-grid"><div class="deck-card" onclick="startGame('synonym')"><div class="deck-cat">Game 1</div><div class="deck-topic">Synonym Match</div><div style="font-size:13px;color:var(--text-dim)">Match words to their synonyms.</div></div><div class="deck-card" onclick="startGame('antonym')"><div class="deck-cat">Game 2</div><div class="deck-topic">Antonym Challenge</div><div style="font-size:13px;color:var(--text-dim)">Find the opposite word.</div></div><div class="deck-card" onclick="startGame('context')"><div class="deck-cat">Game 3</div><div class="deck-topic">Context Clues</div><div style="font-size:13px;color:var(--text-dim)">Guess the word meaning from context.</div></div></div>';

// ═══ TYPING GAME ═══
var typingWords = {
  1: {theme: "Ocean", bg: "#0a3d62", words: ["wave", "coral", "tide", "reef", "shell", "ocean", "marine", "current", "depth", "shore", "beach", "coast", "island", "harbor", "sail"]},
  2: {theme: "Forest", bg: "#1e4d2b", words: ["tree", "leaf", "root", "branch", "bark", "moss", "fern", "grove", "canopy", "timber", "wilderness", "thicket", "undergrowth", "clearing", "trail"]},
  3: {theme: "Desert", bg: "#8b6914", words: ["sand", "dune", "oasis", "cactus", "heat", "arid", "mirage", "dust", "camel", "nomad", "sahara", "barren", "scorched", "wasteland", "sunset"]},
  4: {theme: "Ice", bg: "#2c5f7c", words: ["frost", "glacier", "blizzard", "freeze", "icicle", "snow", "arctic", "polar", "chill", "slippery", "avalanche", "permafrost", "tundra", "sleet", "hail"]},
  5: {theme: "Fire", bg: "#6b1c1c", words: ["flame", "ember", "blaze", "inferno", "spark", "ash", "smoke", "burn", "heat", "forge", "magma", "volcanic", "scorching", "wildfire", "phoenix"]},
  6: {theme: "Space", bg: "#1a1a3e", words: ["star", "planet", "galaxy", "comet", "nebula", "orbit", "cosmos", "asteroid", "meteor", "eclipse", "constellation", "supernova", "blackhole", "satellite", "nebula"]}
};

var typingState = {level: 0, score: 0, lives: 3, speed: 2, words: [], activeWord: null, wordPos: 0, monsters: []};

function startTypingLevel(level) {
  var data = typingWords[level];
  typingState = {level: level, score: 0, lives: 3, speed: 1 + level * 0.5, words: data.words.slice(), activeWord: null, wordPos: 0, monsters: [], theme: data.theme, bg: data.bg};
  renderTypingGame();
  spawnMonster();
  typingState.gameInterval = setInterval(gameTick, 100);
  typingState.spawnInterval = setInterval(spawnMonster, 3000 / typingState.speed);
}

function renderTypingGame() {
  var area = document.getElementById('typing-game-area');
  area.style.background = typingState.bg;
  area.innerHTML = '<div style="width:100%;max-width:700px;position:relative;height:350px;background:rgba(0,0,0,.3);border-radius:12px;overflow:hidden" id="typing-arena">' +
    '<div style="position:absolute;top:8px;left:12px;font-size:12px;color:rgba(255,255,255,.6)">Level ' + typingState.level + ' — ' + typingState.theme + ' | Score: <span id="tscore">0</span> | Lives: <span id="tlives">❤️❤️❤️</span></div>' +
    '<div style="position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:48px;z-index:5">⚔️</div>' +
    '<div id="monsters-layer" style="position:absolute;inset:0"></div>' +
    '<div style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;align-items:center;background:rgba(0,0,0,.5);padding:8px 16px;border-radius:8px">' +
    '<input type="text" id="typing-input" placeholder="Type here..." style="background:transparent;border:none;color:#fff;font-size:18px;outline:none;text-align:center;font-family:Fira Code,monospace;width:200px" autocomplete="off" autofocus>' +
    '</div>' +
    '<div id="active-word-display" style="position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:14px;color:rgba(255,255,255,.4)"></div>' +
    '</div>';
  document.getElementById('typing-input').focus();
  document.getElementById('typing-input').addEventListener('input', handleTypingInput);
  showNextWord();
}

function showNextWord() {
  if (typingState.words.length === 0) return;
  typingState.activeWord = typingState.words[Math.floor(Math.random() * typingState.words.length)];
  typingState.wordPos = 0;
  document.getElementById('active-word-display').textContent = 'Next: ' + typingState.activeWord;
}

function handleTypingInput(e) {
  var val = e.target.value.toLowerCase();
  var word = typingState.activeWord;
  if (!word) return;
  if (word.substring(0, val.length) === val) {
    typingState.wordPos = val.length;
    if (val === word) {
      // Word complete — shoot!
      typingState.score += word.length * 10;
      document.getElementById('tscore').textContent = typingState.score;
      e.target.value = '';
      // Find closest monster and destroy it
      var monsters = document.querySelectorAll('.monster');
      if (monsters.length > 0) {
        var target = monsters[Math.floor(Math.random() * monsters.length)];
        target.style.transition = 'all .2s';
        target.style.transform = 'scale(0) rotate(180deg)';
        target.style.opacity = '0';
        setTimeout(function() { target.remove(); }, 200);
      }
      showNextWord();
    }
  }
}

function spawnMonster() {
  if (typingState.level === 0) return;
  var arena = document.getElementById('typing-arena');
  if (!arena) return;
  var layer = document.getElementById('monsters-layer');
  var monster = document.createElement('div');
  monster.className = 'monster';
  var emojis = ['👾', '👹', '👺', '👻', '💀', '👽', '🤖', '🐙', '🦑', '🐡', '🦈', '🐊', '🦂', '🕷️', '🦇'];
  var emoji = emojis[Math.floor(Math.random() * emojis.length)];
  var startX = Math.random() * 80 + 10;
  monster.style.cssText = 'position:absolute;bottom:' + (Math.random() * 40 + 10) + '%;left:' + startX + '%;font-size:28px;transition:all ' + (3 / typingState.speed) + 's linear;z-index:3';
  monster.textContent = emoji;
  layer.appendChild(monster);

  // Animate toward center
  setTimeout(function() {
    if (monster.parentNode) {
      monster.style.bottom = '45%';
      monster.style.left = '50%';
      monster.style.fontSize = '40px';
    }
  }, 50);

  // Check if reached center
  setTimeout(function() {
    if (monster.parentNode) {
      typingState.lives--;
      document.getElementById('tlives').textContent = '❤️'.repeat(Math.max(0, typingState.lives));
      monster.remove();
      if (typingState.lives <= 0) {
        endTypingGame();
      }
    }
  }, (3 / typingState.speed) * 1000);
}

function gameTick() {
  // Check for monsters that reached the center
  var monsters = document.querySelectorAll('.monster');
  if (monsters.length > 5) {
    // Too many monsters — lose a life
    typingState.lives--;
    document.getElementById('tlives').textContent = '❤️'.repeat(Math.max(0, typingState.lives));
    monsters[0].remove();
    if (typingState.lives <= 0) endTypingGame();
  }
}

function endTypingGame() {
  clearInterval(typingState.gameInterval);
  clearInterval(typingState.spawnInterval);
  typingState.level = 0;
  var area = document.getElementById('typing-game-area');
  area.style.background = '';
  area.innerHTML = '<div style="text-align:center;padding:40px">' +
    '<div style="font-size:48px;margin-bottom:16px">💀</div>' +
    '<div style="font-size:24px;font-weight:700;margin-bottom:8px">Game Over!</div>' +
    '<div style="font-size:16px;color:var(--accent);margin-bottom:8px">Score: ' + typingState.score + '</div>' +
    '<div style="font-size:13px;color:var(--text-dim);margin-bottom:24px">The monsters got through!</div>' +
    '<button onclick="startTypingLevel(' + (typingState.level || 1) + ')" style="padding:10px 20px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;margin-right:8px">Try Again</button>' +
    '<button onclick="document.getElementById('typing-game-area').innerHTML=renderTypingMenu()" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer">Level Select</button>' +
    '</div>';
}

function renderTypingMenu() {
  return '<div style="font-size:48px;margin-bottom:16px">⚔️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Type Slayer</div><div style="font-size:14px;color:var(--text-dim);margin-bottom:24px;text-align:center">Type the words to destroy monsters. Each level gets faster!</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center"><button onclick="startTypingLevel(1)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 1 — Ocean</button><button onclick="startTypingLevel(2)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 2 — Forest</button><button onclick="startTypingLevel(3)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 3 — Desert</button><button onclick="startTypingLevel(4)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 4 — Ice</button><button onclick="startTypingLevel(5)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 5 — Fire</button><button onclick="startTypingLevel(6)" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer">Level 6 — Space</button></div>';
}

// ═══ VIDEO LESSONS ═══
var videoQuestions = [];

function addVideoQuestion() {

function renderVideoQuestions() {

    h += '<div style="display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">';

  });

}

function removeVideoQuestion(i) {
  videoQuestions.splice(i, 1);
  renderVideoQuestions();
}

  if (!currentDeck) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') closeSlideshow();
});
