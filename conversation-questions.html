<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh}
.slide{display:none;width:100vw;height:100vh;position:relative;flex-direction:column;justify-content:center;align-items:center}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.28) saturate(1.2)}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 40%,rgba(0,0,0,.55) 100%)}
.slide-content{position:relative;z-index:2;max-width:820px;padding:40px;text-align:center}
.slide-number{position:absolute;top:24px;left:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;border:1px solid}
.slide h1{font-size:3rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.slide h2{font-size:1.4rem;font-weight:600;line-height:1.4;margin-bottom:16px;color:rgba(255,255,255,.9)}
.slide p{font-size:1.05rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:600px;margin:0 auto}
.vocab-word{border-bottom:2px dotted rgba(34,211,238,.5);cursor:help;color:#22d3ee;font-weight:600;position:relative;transition:border-color .2s}
.vocab-word:hover{border-bottom-color:#22d3ee}
.vocab-word .tt{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;min-width:200px;max-width:300px;font-size:13px;font-weight:400;color:#e2e8f0;line-height:1.5;text-align:left;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;transition:opacity .25s,visibility .25s;pointer-events:none}
.vocab-word .tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
.vocab-word .tt strong{display:block;color:#22d3ee;font-weight:700;font-size:14px;margin-bottom:3px}
.vocab-word:hover .tt{visibility:visible;opacity:1}
.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-dots{display:flex;gap:6px;align-items:center;padding:0 8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#22d3ee;box-shadow:0 0 8px rgba(34,211,238,.4)}
.nav-dot:hover{background:rgba(255,255,255,.5)}
.progress{position:fixed;top:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:10px}
.progress-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#22d3ee);transition:width .5s ease-out;border-radius:0 5px 5px 0;box-shadow:0 0 14px rgba(251,191,36,.4),0 0 6px rgba(34,211,238,.3)}
.q-list{text-align:left;max-width:600px;margin:16px auto 0;display:flex;flex-direction:column;gap:10px}
.q-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 20px;font-size:15px;line-height:1.6;text-align:left}
.q-item .num{display:inline-block;width:24px;height:24px;border-radius:50%;background:rgba(34,211,238,.12);color:#22d3ee;font-size:11px;font-weight:700;text-align:center;line-height:24px;margin-right:10px;vertical-align:top;flex-shrink:0}
.q-item .q-text{display:inline}
.warmup-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(52,211,153,.12);color:#34d399;margin-bottom:16px;border:1px solid rgba(52,211,153,.25)}
.hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:16px;font-style:italic}
@media(max-width:640px){
  .slide h1{font-size:2rem}
  .slide h2{font-size:1.1rem}
  .slide p{font-size:.9rem}
  .slide-content{padding:20px}
  .q-item{font-size:13px;padding:12px 14px}
}

/* Question number circle */
.q-circle{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin:0 auto 16px;
  border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;
  backdrop-filter:blur(4px);
}
.q-circle.accent{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.3);color:#22d3ee}
.q-circle.warm{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.3);color:#fbbf24}
</style>
<link rel="stylesheet" href="eloquent-branding.css">
</head>
<body style="padding-top:48px">
<!-- Eloquenta Branded Top Bar -->
<div class="elo-bar">
  <a href="landing.html" class="elo-logo" title="Back to Eloquenta Home">
    El<span class="o">o</span>quenta
  </a>
  <span class="elo-tagline">Speaking Lesson</span>
  <div class="elo-menu">

<script>
var SLIDES=[
  {
    bg:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1920&q=80",
    cat:"Speaking Lesson",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",
    title:"English Conversation",
    subtitle:"Questions for ESL Learners",
    text:"A collection of discussion questions to improve your speaking fluency. Suitable for A2–B2 level learners.",
    isTitle:true
  },
  {
    bg:"https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?w=1920&q=80",
    cat:"Warm-up",catB:"rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25)",
    title:"Let's get started",
    subtitle:"",
    text:"",
    isWarmup:true,
    warmupQ:[
      "What's your name and where are you from?",
      "How long have you been studying English?",
      "What do you enjoy most about learning a new language?"
    ]
  },
  {
    bg:"https://images.unsplash.com/photo-1497215842964-222b430dc094?w=1920&q=80",
    cat:"About You",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",
    title:"Tell me about yourself",
    subtitle:"",
    text:"",
    questions:[
      "What do you do for work or study? Describe a typical day.",

    ]
  },
  {

    cat:"Daily Life",catB:"rgba(245,158,11,.15);color:#fbbf24;border-color:rgba(245,158,11,.3)",
    title:"Daily routines & lifestyle",
    subtitle:"",
    text:"",
    questions:[
      "What time do you usually wake up? Has your routine changed over the years?",
      "Do you prefer a structured schedule or a flexible day? Why?",
      "How do you usually spend your evenings? Has this changed since you were younger?",
      "Describe your ideal weekend. What makes it perfect for you?"
    ]
  },
  {
    bg:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80",
    cat:"Travel & Places",catB:"rgba(168,85,247,.15);color:#a78bfa;border-color:rgba(168,85,247,.3)",
    title:"Travel & places",
    subtitle:"",
    text:"",
    questions:[
      "What is the most beautiful place you have ever visited? Describe it.",
      "Do you prefer traveling alone or with others? What are the advantages of each?",
      "If you could live anywhere in the world, where would it be and why?",

    ]
  },
  {

    questions:[
      "What is a traditional dish from your country? Can you describe how it is made?",

    title:"Society & opinions",

    text:"",
    questions:[
      "Do you think social media has improved or damaged human communication? Explain.",

  {

    title:"Well done!",
    subtitle:"English Conversation Questions — Speaking Lesson",
    text:"Practice these questions with a partner. Try to speak for at least 2 minutes on each question. Don't worry about making mistakes — focus on communicating your ideas!",
    isEnd:true
  }
];

var current=0;

function renderSlides(){
  var container=document.getElementById('slides-container');
  var dots=document.getElementById('navDots');
  var html='',dotsHtml='';
  SLIDES.forEach(function(s,i){
    html+='<div class="slide'+(i===0?' active':'')+'" id="slide-'+i+'">';
    html+='<div class="slide-bg" style="background-image:url('+s.bg+')"></div>';
    html+='<span class="slide-number">'+(i+1)+' / '+SLIDES.length+'</span>';
    html+='<div class="slide-content">';
    if(s.isTitle){
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<p>'+s.text+'</p>';
    } else if(s.isWarmup){
      html+='<span class="warmup-badge">🔥 Warm-up</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.warmupQ){
        html+='<div class="q-list">';
        s.warmupQ.forEach(function(q,j){
          html+='<div class="q-item"><span class="num">'+(j+1)+'</span><span class="q-text">'+q+'</span></div>';
        });
        html+='</div>';
      }
    } else if(s.isEnd){
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<h2>'+s.subtitle+'</h2>';
      html+='<p>'+s.text+'</p>';
    } else {
      html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.subtitle) html+='<p style="color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:12px">'+s.subtitle+'</p>';
      if(s.questions){
        html+='<div class="q-list">';
        s.questions.forEach(function(q,j){
          html+='<div class="q-item"><span class="num">'+(j+1)+'</span><span class="q-text">'+q+'</span></div>';
        });
        html+='</div>';
      }
      html+='';
    }
    html+='</div>';
    html+='<div class="slide-footer"><span style="color:#fff;font-weight:700">El<span style="color:#22d3ee">o</span>quenta</span> — English Conversation Questions</div>';
    html+='</div>';
    dotsHtml+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goTo('+i+')"></div>';
  });
  container.innerHTML=html;
  dots.innerHTML=dotsHtml;
}

function showSlide(n){
  if(n<0||n>=SLIDES.length)return;
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});
  document.getElementById('slide-'+n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current=n;
  document.getElementById('progressBar').style.width=(((current+1)/SLIDES.length)*100)+'%';
}

function nextSlide(){showSlide(current+1)}
function prevSlide(){showSlide(current-1)}
function goTo(n){showSlide(n)}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide()}
});

var touchStartX=0;
document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX});
document.addEventListener('touchend',function(e){
  var diff=touchStartX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50){diff>0?nextSlide():prevSlide()}
});

renderSlides();
</script>
</body>
</html>
