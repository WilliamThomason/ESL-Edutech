<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IELTS Writing Band Scores — Eloquenta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="eloquent-branding.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;padding-top:48px}
.slide{display:none;width:100vw;height:100vh;position:relative;flex-direction:column;justify-content:center;align-items:center;padding-top:48px}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.25) saturate(1.2)}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.15) 40%,rgba(0,0,0,.5) 100%)}
.slide-content{position:relative;z-index:2;max-width:900px;padding:32px;text-align:center;max-height:calc(100vh - 120px);overflow-y:auto}
.slide-number{position:absolute;top:64px;right:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;border:1px solid}
.slide h1{font-size:2.6rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:6px}
.slide h2{font-size:1.2rem;font-weight:600;line-height:1.4;margin-bottom:14px;color:rgba(255,255,255,.85)}
.slide h3{font-size:1rem;font-weight:700;color:#fbbf24;margin:14px 0 6px;text-transform:uppercase;letter-spacing:1px}
.slide p{font-size:1rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:640px;margin:0 auto}
.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-dots{display:flex;gap:5px;align-items:center;padding:0 8px;max-width:300px;flex-wrap:wrap;justify-content:center}
.nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#22d3ee;box-shadow:0 0 8px rgba(34,211,238,.4)}
.progress{position:fixed;top:48px;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width .4s ease-out;border-radius:0 4px 4px 0}

.band-table{display:flex;gap:8px;max-width:860px;margin:14px auto 0;flex-wrap:wrap;justify-content:center}
.band-col{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;min-width:130px;max-width:150px;flex:1}
.band-col .b-score{font-size:22px;font-weight:900;margin-bottom:4px}
.band-col .b-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-bottom:6px}
.band-col .b-desc{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5}
.band-col .b-example{font-size:10px;color:#22d3ee;margin-top:6px;font-style:italic;line-height:1.4}
.band-col.highlight{background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.25)}
.band-col.highlight .b-score{color:#22d3ee}

.dialogue-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 20px;max-width:680px;margin:12px auto 0;text-align:left;font-size:14px;line-height:1.8}
.dialogue-box .speaker{font-weight:700;margin-right:6px}
.dialogue-box .examiner{color:#22d3ee}
.dialogue-box .candidate{color:#34d399}
.dialogue-box .note{color:rgba(255,255,255,.35);font-size:11px;margin-top:8px;font-style:italic;border-top:1px solid rgba(255,255,255,.06);padding-top:6px}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px;margin:12px auto 0;text-align:left}
.compare-col{background:rgba(255,255,255,.04);border-radius:10px;padding:14px 16px}
.compare-col.bad{border:1px solid rgba(251,113,133,.2)}
.compare-col.good{border:1px solid rgba(52,211,153,.2)}
.compare-col h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.compare-col.bad h4{color:#fb7185}
.compare-col.good h4{color:#34d399}
.compare-col p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.6}
.compare-col .example{font-style:italic;color:rgba(255,255,255,.45);margin-top:6px;font-size:11px}

.grammar-box{max-width:680px;margin:10px auto 0;text-align:left}
.grammar-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:13px}
.grammar-row .band-badge{min-width:32px;text-align:center;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:800;margin-top:2px}
.grammar-row .badge-low{background:rgba(251,113,133,.15);color:#fb7185}
.grammar-row .badge-mid{background:rgba(251,191,36,.15);color:#fbbf24}
.grammar-row .badge-high{background:rgba(52,211,153,.15);color:#34d399}
.grammar-row .badge-top{background:rgba(34,211,238,.15);color:#22d3ee}
.grammar-row .ex{flex:1;color:rgba(255,255,255,.7);line-height:1.5}

.tips-box{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:12px;padding:14px 18px;max-width:640px;margin:12px auto 0;text-align:left}
.tips-box h4{font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tips-box ul{list-style:none;padding:0}
.tips-box li{font-size:13px;color:rgba(255,255,255,.65);padding:3px 0;line-height:1.5}
.tips-box li::before{content:"→ ";color:#a78bfa;font-weight:700}

.score-circle{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;border:3px solid}

.quick-nav{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:4px}
.qn-btn{padding:4px 10px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.5);color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;text-align:center}
.qn-btn:hover{color:#22d3ee;border-color:rgba(34,211,230,.3)}
.qn-btn.active{background:rgba(34,211,238,.1);color:#22d3ee;border-color:rgba(34,211,238,.3)}

.slide-footer{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px}
.logo{color:#fff;font-weight:700;letter-spacing:.5px}.logo .o{color:#22d3ee}
.vocab-word{border-bottom:2px dotted rgba(34,211,238,.5);cursor:help;color:#22d3ee;font-weight:600;position:relative}
.vocab-word:hover{border-bottom-color:#22d3ee}
.vocab-word .tooltip{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;min-width:200px;max-width:300px;font-size:13px;font-weight:400;color:#e2e8f0;line-height:1.5;text-align:left;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;transition:opacity .3s;pointer-events:none}
.vocab-word .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
.vocab-word:hover .tooltip{visibility:visible;opacity:1}

/* Writing-specific: sample text boxes */
.sample-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:18px 22px;max-width:700px;margin:12px auto 0;text-align:left;font-size:13px;line-height:1.8;color:rgba(255,255,255,.7)}
.sample-box .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);margin-bottom:8px}
.sample-box .highlight-good{color:#34d399}
.sample-box .highlight-bad{color:#fb7185}
.sample-box .highlight-note{color:#fbbf24}

/* Structure diagram */
.structure-row{display:flex;gap:8px;max-width:700px;margin:10px auto 0;align-items:stretch}
.structure-block{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;text-align:center;font-size:11px}
.structure-block .sb-title{font-weight:700;font-size:10px;text-transform:uppercase;letter:1px;color:#22d3ee;margin-bottom:4px}
.structure-block .sb-desc{color:rgba(255,255,255,.5);line-height:1.4}
.structure-arrow{display:flex;align-items:center;color:rgba(255,255,255,.2);font-size:16px}

@media(max-width:640px){
  .slide h1{font-size:1.8rem}
  .slide h2{font-size:1rem}
  .slide-content{padding:16px}
  .band-table{flex-direction:column;align-items:center}
  .compare{grid-template-columns:1fr}
  .quick-nav{display:none}
  .structure-row{flex-direction:column}
}
</style>
</head>

  cat:"The 4 Criteria",catB:"rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.25)",
  title:"4 Things the Examiner Scores",subtitle:"Each one is worth 25% of your writing score",

    {icon:"📚",label:"3. Lexical Resource",desc:"Do you use a wide range of vocabulary? Are words used accurately and naturally?"},
    {icon:"📐",label:"4. Grammatical Range & Accuracy",desc:"Do you use different grammar structures? Are they correct?"}
  ]

  bg:"https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1920&q=80",
  cat:"Criterion 1",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",
  title:"Task Achievement",subtitle:"Did you answer the question?",
  text:"This is the most important criterion. You can have perfect grammar and vocabulary, but if you do not answer the question, you will not get a high score.<br><br>For <strong>Task 1</strong>: describe the key features. Do not give your opinion.<br>For <strong>Task 2</strong>: answer ALL parts of the question. State your position clearly.",

// SLIDE 4: Task Achievement by band
{
  bg:"https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1920&q=80",
  cat:"Task Achievement",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",

      '<div class="band-col"><div class="b-score" style="color:#fb7185">5</div><div class="b-label">Partial</div><div class="b-desc">Addresses the task only partially. Format is inappropriate. Key features not clearly presented.</div><div class="b-example">Task 1: Describes data but misses main trends. Adds opinion (not asked for).</div></div>'+

      '<div class="band-col"><div class="b-score" style="color:#34d399">7</div><div class="b-label">Good</div><div class="b-desc">Addresses all parts of the task. Presents a clear position throughout. Main ideas are extended and supported.</div><div class="b-example">Task 1: Clear overview, key features highlighted with data. Task 2: Well-developed arguments with examples.</div></div>'+
      '<div class="band-col"><div class="b-score" style="color:#22d3ee">8-9</div><div class="b-label">Advanced</div><div class="b-desc">Covers all requirements fully. Key features are selected, highlighted, and illustrated effectively. Position is clear, relevant, and well-supported.</div><div class="b-example">Task 1: Sophisticated overview, precise data, no irrelevant detail. Task 2: Fully developed, nuanced argument.</div></div>'+
    '</div>';
  }
},

// SLIDE 5: Task 1 structure
{
  bg:"https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1920&q=80",
  cat:"Task 1 Structure",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",
  title:"Task 1: How to Structure Your Report",subtitle:"4 paragraphs · 150+ words · 20 minutes",
  text:"",
  custom:function(){
    return '<div class="structure-row">'+
      '<div class="structure-block"><div class="sb-title">Para 1 — Introduction</div><div class="sb-desc">Paraphrase the question. Do NOT copy it word-for-word.</div></div>'+
      '<div class="structure-arrow">→</div>'+
      '<div class="structure-block"><div class="sb-title">Para 2 — Overview</div><div class="sb-desc">Describe the main trend or most important feature. No specific numbers here.</div></div>'+
      '<div class="structure-arrow">→</div>'+
      '<div class="structure-block"><div class="sb-title">Para 3 — Detail 1</div><div class="sb-desc">Describe specific data. Use numbers from the chart/graph.</div></div>'+

      '<li>Do NOT give your opinion. Just describe what you see.</li>'+
      '<li>Do NOT write a conclusion. An overview is enough.</li>'+
      '<li>Use specific data: "The figure rose from 25% to 40%" not "It went up a lot."</li>'+
      '<li>Paraphrase the question: "The graph shows..." → "The bar chart illustrates..."</li>'+
    '</ul></div>';
  }
},

// SLIDE 6: Task 2 structure
{
  bg:"https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1920&q=80",
  cat:"Task 2 Structure",catB:"rgba(34,211,238,.15);color:#22d3ee;border-color:rgba(34,211,238,.3)",
  title:"Task 2: How to Structure Your Essay",subtitle:"4-5 paragraphs · 250+ words · 40 minutes",
  text:"",
  custom:function(){
    return '<div class="structure-row">'+
      '<div class="structure-block"><div class="sb-title">Para 1 — Introduction</div><div class="sb-desc">Paraphrase the question. State your position or main idea.</div></div>'+
      '<div class="structure-arrow">→</div>'+
      '<div class="structure-block"><div class="sb-title">Para 2 — Body 1</div><div class="sb-desc">Main idea + explanation + example. One clear point per paragraph.</div></div>'+
      '<div class="structure-arrow">→</div>'+
      '<div class="structure-block"><div class="sb-title">Para 3 — Body 2</div><div class="sb-desc">Second main idea + explanation + example. Or address the other side.</div></div>'+
      '<div class="structure-arrow">→</div>'+
      '<div class="structure-block"><div class="sb-title">Para 4 — Conclusion</div><div class="sb-desc">Summarise your position. Do NOT add new ideas here.</div></div>'+
    '</div>'+
    '<div class="tips-box" style="margin-top:14px"><h4>Task 2 Rules</h4><ul>'+
      '<li>Answer ALL parts of the question. Underline the key words before you start.</li>'+
      '<li>State your position clearly in the introduction and keep it throughout.</li>'+
      '<li>One idea per paragraph. Start each paragraph with a topic sentence.</li>'+
      '<li>Do NOT use bullet points or lists. Write in full paragraphs.</li>'+
    '</ul></div>';
  }
},

// SLIDE 7: Task 2 question types
{
  bg:"https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1920&q=80",

      '<li><strong>Memorise a flexible essay structure.</strong> 4-5 paragraphs. Do NOT memorise full essays.</li>'+
      '<li><strong>Build your collocation list.</strong> Learn 2-3 new collocations every day.</li>'+
      '<li><strong>Proofread.</strong> Leave 3-5 minutes. Check: subject-verb agreement, articles (a/an/the), spelling, word count.</li>'+
      '<li><strong>Write clearly.</strong> If the examiner cannot read your writing, you will get a lower score.</li>'+
    '</ul></div>'+
    '<div style="margin-top:16px"><p style="font-size:18px;color:#fff;font-weight:700">Good luck with your IELTS exam! 🎯</p></div>';
  }
},

// SLIDE 27: Well done
{
  bg:"https://images.unsplash.com/photo-1455390582262-044cdead277a?w=1920&q=80",
  cat:"Complete",catB:"rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25)",
  title:"Well Done!",subtitle:"You now understand the IELTS Writing band criteria",
  text:"Practice writing one Task 1 and one Task 2 every week. Compare your work to the band descriptors.",
  isTitle:true
}

];

/* ═══════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════ */

function renderSlides(){
  var container=document.getElementById('slides-container');
  var dots=document.getElementById('navDots');
  var qnav=document.getElementById('quickNav');
  var html='';
  var dotsHtml='';
  var qnavHtml='';
  var currentSection='';

  SLIDES.forEach(function(s,i){
    if(s.cat && s.cat!==currentSection && !s.isTitle){
      currentSection=s.cat;
      qnavHtml+='<div class="qn-btn" onclick="goToSlide('+i+')">'+s.cat.substring(0,12)+'</div>';
    }

    html+='<div class="slide'+(i===0?' active':'')+'" id="slide'+i+'">';
    html+='<div class="slide-bg" style="background-image:url(\''+s.bg+'\')"></div>';
    html+='<div class="slide-content">';
    html+='<div class="slide-number">'+(i+1)+' / '+SLIDES.length+'</div>';
    html+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';

    if(s.isTitle){
      html+='<h1>'+s.title+'</h1>';
      if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
      if(s.text) html+='<p>'+s.text+'</p>';
    } else if(s.isAim){
      html+='<h1>'+s.title+'</h1>';
      if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
      if(s.text) html+='<p>'+s.text+'</p>';
      if(s.goals){
        html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-width:750px;margin:16px auto 0;text-align:left">';
        s.goals.forEach(function(g){
          html+='<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px">';
          html+='<div style="font-size:13px;font-weight:700;margin-bottom:4px">'+g.icon+' '+g.label+'</div>';
          html+='<div style="font-size:11px;color:rgba(255,255,255,.5);line-height:1.5">'+g.desc+'</div>';
          html+='</div>';
        });
        html+='</div>';
      }
    } else if(s.custom){
      html+='<h1>'+s.title+'</h1>';
      if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
      if(s.text) html+='<p>'+s.text+'</p>';
      html+=s.custom();
    } else {
      html+='<h1>'+s.title+'</h1>';
      if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
      if(s.text) html+='<p>'+s.text+'</p>';
    }

    html+='<div class="slide-footer"><span class="logo">El<span class="o">o</span>quenta</span> — IELTS Writing</div>';
    html+='</div></div>';
    dotsHtml+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goToSlide('+i+')"></div>';
  });

  container.innerHTML=html;
  dots.innerHTML=dotsHtml;
  qnav.innerHTML=qnavHtml;
}

var currentSlide=0;
function goToSlide(n){
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});
  document.getElementById('slide'+n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  currentSlide=n;
  document.getElementById('progressBar').style.width=((n+1)/SLIDES.length*100)+'%';
}
function nextSlide(){if(currentSlide<SLIDES.length-1)goToSlide(currentSlide+1);}
function prevSlide(){if(currentSlide>0)goToSlide(currentSlide-1);}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ')nextSlide();
  if(e.key==='ArrowLeft')prevSlide();
});

renderSlides();
</script>
</body>
</html>
